<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <link rel="icon" type="image/png" href="/favicon.png" sizes="32x32">
    <title>🧠 Vocabulary Match — English For Cool Dudes</title>
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
    :root {
        --green:#58CC02;  --green-shadow:#58A700;  --green-light:rgba(88,204,2,.1);
        --blue:#1CB0F6;   --blue-shadow:#1899D6;
        --yellow:#FFC800; --yellow-shadow:#E5B400;
        --punch:#FF4B4B;  --punch-shadow:#EA2B2B;
        --purple:#CE82FF; --purple-shadow:#A559D9;
        --teal:#2BDECC;   --teal-shadow:#1FBFAF;
        --orange:#FF9600; --orange-shadow:#E07800;
        --bg:#F7F9FA;     --white:#FFFFFF;
        --ink:#4B4B4B;    --ink-bold:#111827; --ink-3:#AFAFAF;
        --border:#E5E5E5; --border-heavy:#CECECE;
        --r:24px; --rsm:16px; --rxs:10px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-text-size-adjust:100%;scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--ink);font-family:'Nunito',system-ui,sans-serif;line-height:1.5;overflow-x:hidden;padding-bottom:40px;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;}
    a{color:inherit;text-decoration:none;}
    button{font-family:inherit;cursor:pointer;border:none;background:none;}

    @keyframes up       {from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes popin    {0%{opacity:0;transform:scale(.7) rotate(-4deg)}60%{transform:scale(1.08) rotate(1deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
    @keyframes shake    {0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
    @keyframes heartbeat{0%,100%{transform:scale(1)}14%{transform:scale(1.18)}28%{transform:scale(1)}42%{transform:scale(1.1)}}
    @keyframes confetti {0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(140px) rotate(420deg)}}
    @keyframes xpPop    {0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.5)}}
    @keyframes fadeIn   {from{opacity:0}to{opacity:1}}
    @keyframes megaConf {0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(200px) rotate(540deg)}}
    @keyframes float    {0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes wiggle   {0%,100%{transform:rotate(0)}25%{transform:rotate(-6deg)}75%{transform:rotate(6deg)}}
    @keyframes matchPop {0%{transform:scale(1)}30%{transform:scale(1.08)}60%{transform:scale(.97)}100%{transform:scale(1)}}
    @keyframes slideUp  {from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes shimmer2 {0%{left:-80%}100%{left:130%}}
    @keyframes glowGold {0%,100%{box-shadow:0 0 24px rgba(255,200,0,.5),0 8px 32px rgba(0,0,0,.15)}50%{box-shadow:0 0 55px rgba(255,200,0,.9),0 8px 32px rgba(0,0,0,.2)}}
    @keyframes badgeDrop{0%{opacity:0;transform:translateY(-40px) scale(.7)}60%{transform:translateY(6px) scale(1.06)}80%{transform:translateY(-2px) scale(.98)}100%{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes bounce   {0%,100%{transform:translateY(0)}40%{transform:translateY(-14px)}60%{transform:translateY(-6px)}}

    /* ── HEADER ── */
    .header{background:var(--white);border-bottom:3px solid var(--green);padding:0 20px;height:60px;position:sticky;top:0;z-index:300;display:flex;align-items:center;box-shadow:0 4px 12px rgba(88,204,2,.12);}
    .header-inner{max-width:860px;width:100%;margin:0 auto;display:flex;align-items:center;justify-content:space-between;}
    .logo-link{display:flex;align-items:center;gap:10px;}
    .logo-box{width:38px;height:38px;background:var(--yellow);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;border:2px solid var(--yellow-shadow);box-shadow:0 3px 0 var(--yellow-shadow);}
    .site-name{font-size:15px;font-weight:900;color:var(--ink-bold);letter-spacing:-.3px;}
    @media(max-width:420px){.site-name{display:none}}

    /* ── PAGE ── */
    .page{max-width:700px;margin:0 auto;padding:20px 14px 40px;display:flex;flex-direction:column;gap:14px;}

    /* ── HERO ── */
    .hero{background:var(--green);border:2px solid var(--green-shadow);border-bottom:6px solid var(--green-shadow);border-radius:var(--r);padding:28px 22px 24px;position:relative;overflow:hidden;text-align:center;}
    .hero::after{content:'🧠';position:absolute;bottom:-20px;right:6px;font-size:140px;opacity:.1;pointer-events:none;animation:wiggle 4s ease-in-out infinite;}
    .hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.4);border-radius:8px;padding:4px 12px;margin-bottom:10px;font-size:11px;font-weight:900;color:var(--white);text-transform:uppercase;letter-spacing:1.5px;}
    .hero-title{font-size:clamp(28px,8vw,48px);font-weight:900;color:var(--white);letter-spacing:-1.5px;line-height:1;margin-bottom:6px;text-shadow:0 3px 0 var(--green-shadow);position:relative;z-index:1;}
    .hero-sub{font-size:14px;font-weight:700;color:rgba(255,255,255,.9);line-height:1.5;position:relative;z-index:1;}

    /* ── SETUP ── */
    .setup-card{background:var(--white);border:2px solid var(--border-heavy);border-bottom:6px solid var(--border-heavy);border-radius:var(--r);padding:22px;animation:up .4s ease both;}
    .setup-label{font-size:11px;font-weight:900;color:var(--ink-3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;display:block;}
    .chip-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;}
    .chip{padding:9px 14px;background:var(--white);border:2px solid var(--border-heavy);border-bottom:4px solid var(--border-heavy);border-radius:99px;font-size:13px;font-weight:900;color:var(--ink-bold);cursor:pointer;transition:all .1s;font-family:inherit;}
    .chip:active{border-bottom-width:2px;transform:translateY(2px);}
    .chip.sel-green {background:var(--green);color:var(--white);border-color:var(--green-shadow);}
    .chip.sel-blue  {background:var(--blue);color:var(--white);border-color:var(--blue-shadow);}
    .chip.sel-purple{background:var(--purple);color:var(--white);border-color:var(--purple-shadow);}
    .start-btn{width:100%;padding:16px;background:var(--green);color:var(--white);border:2px solid var(--green-shadow);border-bottom:6px solid var(--green-shadow);border-radius:var(--rsm);font-size:17px;font-weight:900;cursor:pointer;transition:all .1s;font-family:inherit;}
    .start-btn:active{border-bottom-width:2px;transform:translateY(3px);}

    /* ── GAME AREA ── */
    .game-area{display:none;flex-direction:column;gap:12px;}
    .game-area.active{display:flex;}

    /* Score bar */
    .score-bar{background:var(--white);border:2px solid var(--border-heavy);border-bottom:4px solid var(--border-heavy);border-radius:var(--r);padding:12px 18px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;text-align:center;gap:8px;}
    .sb-label{font-size:10px;font-weight:900;color:var(--ink-3);text-transform:uppercase;letter-spacing:1px;}
    .sb-val{font-size:22px;font-weight:900;color:var(--green-shadow);line-height:1.1;margin-top:2px;}

    /* Progress pips */
    .pip-row{display:flex;gap:6px;background:var(--white);border:2px solid var(--border-heavy);border-radius:var(--rsm);padding:12px 18px;align-items:center;}
    .pip-label{font-size:12px;font-weight:900;color:var(--ink-3);text-transform:uppercase;letter-spacing:1px;white-space:nowrap;margin-right:4px;}
    .pip{flex:1;height:8px;border-radius:99px;background:var(--border-heavy);transition:background .3s;}
    .pip.matched{background:var(--green);}
    .pip.active{background:rgba(88,204,2,.3);}

    /* Cards grid */
    .cards-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
    @media(max-width:500px){.cards-grid{grid-template-columns:repeat(2,1fr);gap:8px;}}

    .match-card{
        background:var(--white);
        border:2px solid var(--border-heavy);
        border-bottom:4px solid var(--border-heavy);
        border-radius:var(--rsm);
        padding:14px 10px;
        font-size:13px;font-weight:900;
        color:var(--ink-bold);
        cursor:pointer;
        transition:all .12s;
        text-align:center;
        line-height:1.4;
        min-height:64px;
        display:flex;align-items:center;justify-content:center;
        position:relative;
        user-select:none;
        animation:up .3s ease both;
    }
    .match-card:active{border-bottom-width:2px;transform:translateY(2px);}
    .match-card.selected{
        background:rgba(28,176,246,.08);
        border-color:var(--blue);
        border-bottom-color:var(--blue-shadow);
        color:var(--blue-shadow);
        transform:translateY(-3px);
        box-shadow:0 6px 16px rgba(28,176,246,.2);
    }
    .match-card.matched{
        background:var(--green);
        border-color:var(--green-shadow);
        color:var(--white);
        cursor:default;
        pointer-events:none;
        animation:matchPop .4s ease both;
    }
    .match-card.wrong{
        background:rgba(255,75,75,.08);
        border-color:var(--punch);
        color:var(--punch-shadow);
        animation:shake .4s;
    }
    .match-card.matched::after{
        content:'✓';
        position:absolute;top:4px;right:7px;
        font-size:12px;font-weight:900;
        color:rgba(255,255,255,.7);
    }

    /* Action row */
    .action-row{display:flex;gap:10px;}
    .btn-menu{flex:1;padding:13px;background:var(--white);color:var(--ink-bold);border:2px solid var(--border-heavy);border-bottom:4px solid var(--border-heavy);border-radius:var(--rsm);font-size:14px;font-weight:900;cursor:pointer;transition:all .1s;font-family:inherit;text-align:center;}
    .btn-menu:active{border-bottom-width:2px;transform:translateY(2px);}
    .btn-next{flex:2;padding:13px;background:var(--green);color:var(--white);border:2px solid var(--green-shadow);border-bottom:4px solid var(--green-shadow);border-radius:var(--rsm);font-size:14px;font-weight:900;cursor:pointer;transition:all .1s;font-family:inherit;text-align:center;display:none;}
    .btn-next:active{border-bottom-width:2px;transform:translateY(2px);}

    /* Combo flash */
    .combo-flash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(36px,8vw,56px);font-weight:900;color:var(--green);text-shadow:0 4px 0 var(--green-shadow);pointer-events:none;z-index:9997;animation:popin .5s ease both;}

    /* ── RESULT OVERLAY ── */
    .result-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;justify-content:center;align-items:center;z-index:500;padding:20px;overflow-y:auto;}
    .result-overlay.show{display:flex;animation:fadeIn .25s ease both;}
    .result-card{background:var(--white);border:3px solid var(--green);border-bottom:8px solid var(--green-shadow);border-radius:var(--r);padding:32px 24px;max-width:440px;width:100%;text-align:center;margin:auto;box-shadow:0 0 40px rgba(88,204,2,.2);}
    .rc-badge{width:130px;height:130px;border-radius:50%;background:linear-gradient(145deg,#fffde7,#fff8c5,#fffde7);border:5px solid var(--yellow-shadow);display:flex;align-items:center;justify-content:center;font-size:72px;margin:0 auto 16px;animation:badgeDrop .8s cubic-bezier(.175,.885,.32,1.275) both,glowGold 2.5s ease-in-out infinite .9s;box-shadow:0 0 30px rgba(255,200,0,.5),0 8px 32px rgba(0,0,0,.15);position:relative;overflow:hidden;}
    .rc-badge::before{content:'';position:absolute;top:-10%;left:-80%;width:50%;height:120%;background:linear-gradient(to right,transparent,rgba(255,255,255,.75),transparent);transform:skewX(-20deg);animation:shimmer2 2s ease-in-out infinite;animation-delay:.8s;}
    .rc-title{font-size:26px;font-weight:900;color:var(--green-shadow);letter-spacing:-1px;margin-bottom:4px;}
    .rc-sub{font-size:14px;font-weight:700;color:var(--ink-3);margin-bottom:16px;}
    .rc-xp{background:var(--green);border:2px solid var(--green-shadow);border-bottom:6px solid var(--green-shadow);border-radius:var(--r);padding:16px;margin-bottom:14px;}
    .rc-xp-num{font-size:48px;font-weight:900;color:var(--white);line-height:1;}
    .rc-xp-label{font-size:11px;font-weight:900;color:rgba(255,255,255,.85);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
    .rc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
    .rc-stat{background:rgba(88,204,2,.07);border:2px solid rgba(88,167,0,.18);border-radius:var(--rsm);padding:12px 8px;}
    .rc-stat-n{font-size:22px;font-weight:900;color:var(--green-shadow);}
    .rc-stat-l{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-3);margin-top:2px;}
    .rc-btns{display:flex;flex-direction:column;gap:10px;}
    .rc-btn{width:100%;padding:14px;border-radius:var(--rsm);font-size:15px;font-weight:900;font-family:inherit;cursor:pointer;border:2px solid;border-bottom:5px solid;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;}
    .rc-btn:active{border-bottom-width:2px;transform:translateY(3px);}
    .rc-btn.primary{background:var(--green);color:var(--white);border-color:var(--green-shadow);}
    .rc-btn.secondary{background:var(--white);color:var(--green-shadow);border-color:var(--green);}

    /* ── BADGES + CONFETTI ── */
    .badge-wrap{position:fixed;top:68px;right:12px;display:flex;flex-direction:column;gap:8px;z-index:999;pointer-events:none;}
    .badge{background:var(--white);border:2px solid var(--border-heavy);border-bottom:4px solid var(--border-heavy);border-left:4px solid var(--green);padding:10px 14px;border-radius:var(--rsm);display:flex;align-items:center;gap:8px;transform:translateX(240px);opacity:0;transition:transform .4s,opacity .4s;box-shadow:0 4px 14px rgba(0,0,0,.08);}
    .badge.show{transform:translateX(0);opacity:1;}
    .badge-icon{font-size:22px;}
    .badge-text{font-size:13px;font-weight:900;color:var(--ink-bold);}
    .confetti-dot{position:fixed;width:10px;height:10px;border-radius:3px;pointer-events:none;z-index:9999;animation:confetti .9s ease-out both;}
    .xp-float{position:fixed;font-size:20px;font-weight:900;color:var(--yellow-shadow);text-shadow:0 2px 0 rgba(0,0,0,.12);pointer-events:none;z-index:9998;animation:xpPop .85s ease-out forwards;}
    .mega-conf-dot{position:fixed;pointer-events:none;z-index:9999;border-radius:4px;animation:megaConf 1.4s ease-out both;}
    </style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <a href="/breakroom/" class="logo-link">
            <div class="logo-box">😎</div>
            <span class="site-name">English For Cool Dudes</span>
        </a>
    </div>
</header>

<div class="badge-wrap" id="badge-wrap"></div>

<div class="result-overlay" id="result-overlay">
    <div class="result-card">
        <div class="rc-badge">🧠</div>
        <div class="rc-title" id="rc-title">Brilliant!</div>
        <div class="rc-sub" id="rc-sub">You matched them all!</div>
        <div class="rc-xp">
            <div class="rc-xp-num" id="rc-xp">+0</div>
            <div class="rc-xp-label">⚡ XP Earned</div>
        </div>
        <div class="rc-stats">
            <div class="rc-stat"><div class="rc-stat-n" id="rc-pairs">8</div><div class="rc-stat-l">Pairs</div></div>
            <div class="rc-stat"><div class="rc-stat-n" id="rc-moves">0</div><div class="rc-stat-l">Moves</div></div>
            <div class="rc-stat"><div class="rc-stat-n" id="rc-combo">0</div><div class="rc-stat-l">Best Combo</div></div>
        </div>
        <div class="rc-btns">
            <button class="rc-btn primary" onclick="playAgainSame()">🔄 Play Again</button>
            <button class="rc-btn secondary" onclick="backToSetup()">⚙️ Change Settings</button>
        </div>
    </div>
</div>

<div class="page">
    <div class="hero u1">
        <div class="hero-badge">🧠 Break Room Game</div>
        <div class="hero-title">Vocabulary Match 🔗</div>
        <div class="hero-sub">Tap the word · tap the match · clear the board!</div>
    </div>

    <!-- SETUP -->
    <div class="setup-card" id="setup-card">
        <span class="setup-label">Topic</span>
        <div class="chip-grid" id="topic-chips"></div>
        <span class="setup-label">Level</span>
        <div class="chip-grid" id="level-chips"></div>
        <span class="setup-label">Pairs per round</span>
        <div class="chip-grid" id="pairs-chips"></div>
        <button class="start-btn" onclick="startGame()">🧠 Start Matching!</button>
    </div>

    <!-- GAME -->
    <div class="game-area" id="game-area">
        <div class="score-bar">
            <div><div class="sb-label">Pairs Left</div><div class="sb-val" id="sb-left">8</div></div>
            <div><div class="sb-label">Moves</div><div class="sb-val" id="sb-moves">0</div></div>
            <div><div class="sb-label">Combo</div><div class="sb-val" id="sb-combo">0</div></div>
            <div><div class="sb-label">XP</div><div class="sb-val" id="sb-xp">0</div></div>
        </div>
        <div class="pip-row">
            <span class="pip-label">Progress</span>
            <div id="pip-track" style="display:flex;flex:1;gap:6px;"></div>
        </div>
        <div class="cards-grid" id="cards-grid"></div>
        <div class="action-row">
            <button class="btn-menu" onclick="backToSetup()">⚙️ Menu</button>
            <button class="btn-next" id="btn-next" onclick="playAgainSame()">Next Round →</button>
        </div>
    </div>
</div>

<script>
'use strict';

/* ══════ VOCABULARY DATA ══════ */
const VOCAB = {

/* ══════ CONFIG ══════ */
const TOPICS = [
    {id:'business', label:'📈 Business'},
    {id:'tax',      label:'📊 Tax'},
    {id:'legal',    label:'⚖️ Legal'},
    {id:'travel',   label:'✈️ Travel'},
    {id:'workplace',label:'💼 Workplace'},
    {id:'geography',label:'🌍 Geography'},
];
const LEVELS = [
    {id:'beginner',    label:'🌱 Beginner'},
    {id:'intermediate',label:'📘 Intermediate'},
    {id:'advanced',    label:'🔴 Advanced'},
];
const PAIR_OPTS = [
    {id:6,  label:'6 pairs'},
    {id:8,  label:'8 pairs'},
    {id:10, label:'10 pairs'},
];

/* ══════ STATE ══════ */
const G = {
    topic:'business', level:'beginner', pairsCount:8,
    moves:0, pairsLeft:0, combo:0, bestCombo:0, xp:0,
    selected:null,  // currently selected card element
    deck:[], used:new Set(),
};

/* ══════ SETUP UI ══════ */
function buildSetup(){
    buildChips('topic-chips', TOPICS, 'topic', 'sel-green', G.topic);
    buildChips('level-chips', LEVELS, 'level', 'sel-blue', G.level);
    buildPairChips();
}
function buildChips(containerId, items, key, selClass, defaultVal){
    const c = document.getElementById(containerId);
    c.innerHTML='';
    items.forEach(item=>{
        const btn = document.createElement('button');
        btn.className = 'chip' + (item.id===defaultVal?' '+selClass:'');
        btn.dataset.val = item.id;
        btn.textContent = item.label;
        btn.onclick = ()=>{
            c.querySelectorAll('.chip').forEach(b=>b.className='chip');
            btn.className='chip '+selClass;
            G[key]=item.id;
        };
        c.appendChild(btn);
    });
}
function buildPairChips(){
    const c = document.getElementById('pairs-chips');
    c.innerHTML='';
    PAIR_OPTS.forEach(item=>{
        const btn = document.createElement('button');
        btn.className='chip'+(item.id===G.pairsCount?' sel-purple':'');
        btn.textContent=item.label;
        btn.onclick=()=>{
            c.querySelectorAll('.chip').forEach(b=>b.className='chip');
            btn.className='chip sel-purple';
            G.pairsCount=item.id;
        };
        c.appendChild(btn);
    });
}

/* ══════ GAME START ══════ */
function startGame(){
    G.moves=0; G.xp=0; G.combo=0; G.bestCombo=0; G.selected=null;
    document.getElementById('setup-card').style.display='none';
    document.getElementById('game-area').classList.add('active');
    document.getElementById('btn-next').style.display='none';
    loadRound();
}

function loadRound(){
    G.selected=null;
    const pool = VOCAB[G.topic][G.level];
    // Shuffle pool
    const shuffled=[...pool];
    for(let i=shuffled.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];}
    const pairs = shuffled.slice(0, G.pairsCount);
    G.pairsLeft = G.pairsCount;

    // Build pip track
    const pt = document.getElementById('pip-track');
    pt.innerHTML = pairs.map((_,i)=>`<div class="pip active" id="pip-${i}"></div>`).join('');

    // Build cards array — word + match for each pair
    let cards = [];
    pairs.forEach((pair,i)=>{
        cards.push({text:pair.w, pairId:i, type:'word'});
        cards.push({text:pair.m, pairId:i, type:'match'});
    });
    // Fisher-Yates shuffle cards
    for(let i=cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cards[i],cards[j]]=[cards[j],cards[i]];}

    // Render
    const grid = document.getElementById('cards-grid');
    grid.innerHTML='';
    // Responsive cols
    const cols = G.pairsCount<=6 ? 'repeat(3,1fr)' : G.pairsCount<=8 ? 'repeat(4,1fr)' : 'repeat(4,1fr)';
    grid.style.gridTemplateColumns = cols;
    cards.forEach((card,idx)=>{
        const el=document.createElement('div');
        el.className='match-card';
        el.style.animationDelay=(idx*.03)+'s';
        el.dataset.pairId=card.pairId;
        el.dataset.type=card.type;
        el.textContent=card.text;
        el.onclick=()=>tapCard(el);
        grid.appendChild(el);
    });
    updateScoreBar();
}

/* ══════ CARD INTERACTION ══════ */
function tapCard(el){
    if(el.classList.contains('matched')) return;

    // Deselect if tapping same card
    if(el===G.selected){
        el.classList.remove('selected');
        G.selected=null;
        return;
    }

    // If nothing selected yet
    if(!G.selected){
        el.classList.add('selected');
        G.selected=el;
        return;
    }

    // Second tap — check match
    const first=G.selected;
    G.selected=null;
    first.classList.remove('selected');
    G.moves++;

    if(first.dataset.pairId===el.dataset.pairId && first.dataset.type!==el.dataset.type){
        // MATCH!
        first.classList.add('matched');
        el.classList.add('matched');
        G.pairsLeft--;
        G.combo++;
        G.bestCombo=Math.max(G.bestCombo,G.combo);
        const pts=10+(G.combo>1?(G.combo-1)*3:0);
        G.xp+=pts;
        confettiBurstAt(el);
        if(G.combo===3){toast('🔥','3 in a row! Combo!'); comboFlash('🧠 3!!');}
        if(G.combo===5){toast('⚡','5 combo — ELECTRIC!'); comboFlash('⚡ 5!!');}
        if(G.combo>5){comboFlash('🧠 '+G.combo+'!!');}
        // Update pip
        const matchedCount=G.pairsCount-G.pairsLeft;
        const pip=document.getElementById('pip-'+(matchedCount-1));
        if(pip){pip.classList.remove('active');pip.classList.add('matched');}
        updateScoreBar();
        if(G.pairsLeft===0) setTimeout(finishRound,500);
    } else {
        // WRONG
        first.classList.add('wrong');
        el.classList.add('wrong');
        G.combo=0;
        updateScoreBar();
        setTimeout(()=>{
            first.classList.remove('wrong');
            el.classList.remove('wrong');
        },450);
        toast('❌','Not a match — keep going!');
    }
    updateScoreBar();
}

function finishRound(){
    // Bonus XP for efficiency
    const efficiency = Math.max(0, G.pairsCount*2 - G.moves);
    G.xp += efficiency*2;
    megaConfettiBurst();
    showResult();
}

/* ══════ RESULT ══════ */
function showResult(){
    const perfect = G.moves <= G.pairsCount;
    document.getElementById('rc-title').textContent = perfect ? '🏆 Perfect Round!' : '🧠 Well done!';
    document.getElementById('rc-sub').textContent = perfect
        ? 'Matched every pair first time!'
        : `Cleared in ${G.moves} moves!`;
    document.getElementById('rc-xp').textContent='+'+G.xp;
    document.getElementById('rc-pairs').textContent=G.pairsCount;
    document.getElementById('rc-moves').textContent=G.moves;
    document.getElementById('rc-combo').textContent=G.bestCombo;
    document.getElementById('result-overlay').classList.add('show');
}

function playAgainSame(){
    document.getElementById('result-overlay').classList.remove('show');
    G.moves=0; G.xp=0; G.combo=0; G.bestCombo=0; G.selected=null;
    document.getElementById('btn-next').style.display='none';
    loadRound();
}

function backToSetup(){
    document.getElementById('result-overlay').classList.remove('show');
    document.getElementById('game-area').classList.remove('active');
    document.getElementById('setup-card').style.display='block';
}

/* ══════ SCORE BAR ══════ */
function updateScoreBar(){
    document.getElementById('sb-left').textContent=G.pairsLeft;
    document.getElementById('sb-moves').textContent=G.moves;
    document.getElementById('sb-combo').textContent=G.combo;
    document.getElementById('sb-xp').textContent=G.xp;
}

/* ══════ EFFECTS ══════ */
function confettiBurstAt(el){
    const r=el.getBoundingClientRect();
    const x=r.left+r.width/2, y=r.top+r.height/2;
    const colors=['#58CC02','#FFC800','#1CB0F6','#FF4B4B','#CE82FF','#2BDECC'];
    for(let i=0;i<14;i++){
        const d=document.createElement('div'); d.className='confetti-dot';
        d.style.cssText=`left:${x+Math.random()*60-30}px;top:${y+Math.random()*20-10}px;background:${colors[i%colors.length]};animation-delay:${Math.random()*.2}s;animation-duration:${.6+Math.random()*.4}s;transform:rotate(${Math.random()*360}deg)`;
        document.body.appendChild(d); setTimeout(()=>d.remove(),1000);
    }
    // XP float
    const xp=document.createElement('div'); xp.className='xp-float';
    xp.textContent=`+${10+(G.combo>1?(G.combo-1)*3:0)} XP`;
    xp.style.cssText=`left:${x-24}px;top:${y-10}px`;
    document.body.appendChild(xp); setTimeout(()=>xp.remove(),900);
}

function megaConfettiBurst(){
    const colors=['#58CC02','#FFC800','#1CB0F6','#CE82FF','#2BDECC','#FF4B4B'];
    for(let i=0;i<60;i++){
        const d=document.createElement('div'); d.className='mega-conf-dot';
        const sz=8+Math.random()*12;
        d.style.cssText=`left:${Math.random()*100}vw;top:${-10+Math.random()*20}px;width:${sz}px;height:${sz}px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-delay:${Math.random()*.8}s;animation-duration:${1+Math.random()*.8}s;border-radius:${Math.random()>.5?'50%':'3px'};transform:rotate(${Math.random()*360}deg)`;
        document.body.appendChild(d); setTimeout(()=>d.remove(),2200);
    }
}

function comboFlash(msg){
    const el=document.createElement('div'); el.className='combo-flash'; el.textContent=msg;
    document.body.appendChild(el); setTimeout(()=>el.remove(),800);
}

function toast(icon,text){
    const wrap=document.getElementById('badge-wrap');
    const b=document.createElement('div'); b.className='badge';
    b.innerHTML=`<span class="badge-icon">${icon}</span><span class="badge-text">${text}</span>`;
    wrap.appendChild(b);
    setTimeout(()=>b.classList.add('show'),50);
    setTimeout(()=>{ b.classList.remove('show'); setTimeout(()=>b.remove(),500); },3500);
}

/* ══════ INIT ══════ */

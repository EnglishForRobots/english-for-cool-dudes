<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="icon" type="image/png" href="/favicon.png" sizes="32x32">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">
    <link rel="manifest" href="/manifest.json">
    <title>Login — English For Cool Dudes</title>
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/init-auth.js"></script>
    <style>
    :root {
        --blue:#1CB0F6;   --blue-shadow:#1899D6;
        --green:#58CC02;  --green-shadow:#58A700;
        --yellow:#FFC800; --yellow-shadow:#E5B400;
        --punch:#FF4B4B;  --punch-shadow:#EA2B2B;
        --bg:#F7F9FA;     --white:#FFFFFF;
        --ink:#4B4B4B;    --ink-bold:#111827; --ink-3:#AFAFAF;
        --border:#E5E5E5; --border-heavy:#CECECE;
        --r:24px; --rsm:16px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-text-size-adjust:100%;}
    body{background:var(--bg);color:var(--ink);font-family:'Nunito',system-ui,sans-serif;line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;}
    a{color:inherit;text-decoration:none;}
    button,input{font-family:inherit;}

    @keyframes up    {from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}

    /* ── HEADER ── */
    .header{background:var(--white);border-bottom:3px solid var(--blue);padding:0 20px;height:60px;position:sticky;top:0;z-index:200;display:flex;align-items:center;box-shadow:0 4px 12px rgba(28,176,246,.1);}
    .header-inner{max-width:860px;width:100%;margin:0 auto;display:flex;align-items:center;justify-content:space-between;}
    .logo-link{display:flex;align-items:center;gap:10px;}
    .logo-box{width:38px;height:38px;background:var(--yellow);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;border:2px solid var(--yellow-shadow);box-shadow:0 3px 0 var(--yellow-shadow);}
    .site-name{font-size:15px;font-weight:900;color:var(--ink-bold);letter-spacing:-.3px;}
    @media(max-width:420px){.site-name{display:none}}
    .header-signup{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--green);color:var(--white);font-size:14px;font-weight:900;border-radius:var(--rsm);border:2px solid var(--green-shadow);border-bottom:4px solid var(--green-shadow);transition:all .1s;}
    .header-signup:active{border-bottom-width:2px;transform:translateY(2px);}

    /* ── PAGE ── */
    .page{max-width:480px;margin:0 auto;padding:32px 16px 60px;}

    /* ── HERO ── */
    .login-hero{background:var(--blue);border:2px solid var(--blue-shadow);border-bottom:6px solid var(--blue-shadow);border-radius:var(--r) var(--r) 0 0;padding:28px 24px 24px;text-align:center;position:relative;overflow:hidden;animation:up .4s ease both;}
    .login-hero::after{content:'😎';position:absolute;bottom:-16px;right:8px;font-size:110px;opacity:.1;pointer-events:none;animation:wiggle 4s ease-in-out infinite;}
    .hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.4);border-radius:8px;padding:4px 12px;margin-bottom:12px;font-size:11px;font-weight:900;color:var(--white);text-transform:uppercase;letter-spacing:1.5px;}
    .hero-title{font-size:clamp(22px,6vw,30px);font-weight:900;color:var(--white);letter-spacing:-1px;line-height:1.15;margin-bottom:6px;text-shadow:0 2px 0 var(--blue-shadow);position:relative;z-index:1;}
    .hero-sub{font-size:14px;font-weight:700;color:rgba(255,255,255,.9);position:relative;z-index:1;line-height:1.55;}

    /* ── FORM CARD ── */
    .form-card{background:var(--white);border:2px solid var(--border-heavy);border-top:none;border-bottom:6px solid var(--border-heavy);border-radius:0 0 var(--r) var(--r);padding:24px;animation:up .4s ease both .1s;opacity:0;animation-fill-mode:both;}

    /* Field */
    .field{margin-bottom:16px;}
    .field label{display:block;font-size:13px;font-weight:900;color:var(--ink-bold);margin-bottom:6px;letter-spacing:-.2px;}
    .field input{width:100%;padding:13px 16px;border:2px solid var(--border-heavy);border-bottom:4px solid var(--border-heavy);border-radius:var(--rsm);font-size:15px;font-weight:700;color:var(--ink-bold);background:var(--white);transition:border-color .15s,box-shadow .15s;outline:none;font-family:inherit;}
    .field input:focus{border-color:var(--blue);border-bottom-color:var(--blue-shadow);box-shadow:0 0 0 3px rgba(28,176,246,.15);}
    .field input::placeholder{color:var(--ink-3);font-weight:700;}
    .field input.error{border-color:var(--punch);border-bottom-color:var(--punch-shadow);}

    /* Submit */
    .submit-btn{width:100%;padding:16px;background:var(--blue);color:var(--white);font-size:17px;font-weight:900;border:2px solid var(--blue-shadow);border-bottom:6px solid var(--blue-shadow);border-radius:var(--rsm);cursor:pointer;transition:all .1s;font-family:inherit;letter-spacing:-.3px;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;}
    .submit-btn:active:not(:disabled){border-bottom-width:2px;transform:translateY(3px);}
    .submit-btn:disabled{opacity:.6;cursor:not-allowed;}

    /* Message */
    .msg{padding:12px 16px;border-radius:var(--rsm);font-size:14px;font-weight:800;border:2px solid;display:none;margin-bottom:16px;line-height:1.5;animation:up .2s ease both;}
    .msg.show.ok {display:block;background:rgba(88,204,2,.1);color:var(--green-shadow);border-color:rgba(88,167,0,.3);}
    .msg.show.err{display:block;background:rgba(255,75,75,.1);color:var(--punch-shadow);border-color:rgba(255,75,75,.3);}

    /* Divider */
    .divider{display:flex;align-items:center;gap:12px;margin:18px 0 4px;}
    .divider-line{flex:1;height:2px;background:var(--border);}
    .divider-text{font-size:12px;font-weight:900;color:var(--ink-3);text-transform:uppercase;letter-spacing:1px;}

    /* Links */
    .links-row{display:flex;flex-direction:column;gap:8px;text-align:center;margin-top:14px;}
    .links-row a{font-size:14px;font-weight:800;color:var(--blue-shadow);border-bottom:2px solid rgba(28,176,246,.3);}
    .links-row a:hover{border-bottom-color:var(--blue-shadow);}
    .signup-nudge{text-align:center;margin-top:8px;font-size:14px;font-weight:700;color:var(--ink-3);}
    .signup-nudge a{color:var(--green-shadow);font-weight:900;border-bottom:2px solid rgba(88,167,0,.3);}
    .signup-nudge a:hover{border-bottom-color:var(--green-shadow);}
    </style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <a href="/" class="logo-link">
            <div class="logo-box">😎</div>
            <span class="site-name">English For Cool Dudes</span>
        </a>
        <a href="/signup/" class="header-signup">Sign Up Free →</a>
    </div>
</header>

<div class="page">

    <div class="login-hero">
        <div class="hero-badge">👋 Welcome back</div>
        <div class="hero-title">Log In to Your Account</div>
        <div class="hero-sub">Your XP, streaks and badges are waiting for you.</div>
    </div>

    <div class="form-card">

        <div class="msg" id="msg"></div>

        <div class="field">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>

        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Your password" required autocomplete="current-password">
        </div>

        <button class="submit-btn" id="submit-btn" onclick="handleLogin()">
            ⚡ Sign In
        </button>

        <div class="links-row">
            <a href="/forgot-password/">Forgot your password?</a>
        </div>

        <div class="divider"><div class="divider-line"></div><div class="divider-text">new here?</div><div class="divider-line"></div></div>

        <div class="signup-nudge">
            Don't have an account? <a href="/signup/">Sign up free →</a>
        </div>

    </div>
</div>

<script src="/tickerData.js"></script>
<script>
'use strict';

function showMsg(text, isError) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg show ' + (isError ? 'err' : 'ok');
}

function clearMsg() {
    document.getElementById('msg').className = 'msg';
}

async function handleLogin() {
    clearMsg();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('submit-btn');

    if (!email || !password) {
        showMsg('⚠️ Please enter your email and password.', true);
        return;
    }

    btn.disabled = true;
    btn.textContent = '⏳ Signing in...';

    try {
        const { data, error } = await window.efcdSupabaseClient.auth.signInWithPassword({ email, password });

        if (error) {
            btn.disabled = false;
            btn.innerHTML = '⚡ Sign In';
            if (error.message.toLowerCase().includes('invalid') ||
                error.message.toLowerCase().includes('credentials')) {
                showMsg('⚠️ Wrong email or password — try again!', true);
            } else if (error.message.toLowerCase().includes('confirmed')) {
                showMsg('⚠️ Please confirm your email first — check your inbox!', true);
            } else {
                showMsg('⚠️ ' + error.message, true);
            }
            return;
        }

        showMsg('✅ Welcome back! Taking you to your dashboard...', false);
        setTimeout(() => { window.location.href = '/dashboard-gamified/'; }, 1000);

    } catch (err) {
        console.error('Login error:', err);
        btn.disabled = false;
        btn.innerHTML = '⚡ Sign In';
        showMsg('⚠️ Something went wrong. Please try again.', true);
    }
}

// Enter key submits
document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
});

// Ticker
if (typeof startTickerAnimation === 'function') startTickerAnimation();

// Service worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js', { scope: '/' })
        .catch(err => console.log('SW:', err.message));
}
</script>
</body>
</html>

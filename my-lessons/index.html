<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
<link rel="icon" type="image/png" href="/favicon.png" sizes="32x32">
<title>My Lessons — English For Cool Dudes</title>
<link rel="preconnect" href="https://fonts.bunny.net">
<link href="https://fonts.bunny.net/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/init-auth.js"></script>
<script src="/lesson-data-registry.js"></script>
<style>
:root {
  --blue:#1CB0F6;    --bs:#1899D6;
  --yellow:#FFC800;  --ys:#E5B400;
  --green:#58CC02;   --gs:#58A700;
  --punch:#FF4B4B;   --ps:#EA2B2B;
  --purple:#CE82FF;  --pus:#A559D9;
  --teal:#2BDECC;    --ts:#1FBFAF;
  --orange:#FF9600;  --os:#E07800;
  --bg:#F7F9FA;      --white:#fff;
  --ink:#4B4B4B;     --ink-bold:#111827; --ink-3:#AFAFAF;
  --border:#E5E5E5;  --border-heavy:#CECECE;
  --navy:#1a2e5a;
  --r:22px; --rsm:14px; --rxs:9px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:'Nunito',system-ui,sans-serif;line-height:1.5;overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}

@keyframes up       {from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes popin    {0%{opacity:0;transform:scale(.7)}60%{transform:scale(1.06)}100%{opacity:1;transform:scale(1)}}
@keyframes fadeIn   {from{opacity:0}to{opacity:1}}
@keyframes float    {0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes shimmer  {0%{left:-80%}100%{left:130%}}
@keyframes glowBadge{0%,100%{box-shadow:0 0 18px rgba(255,200,0,.4)}50%{box-shadow:0 0 40px rgba(255,200,0,.8)}}
@keyframes badgeDrop{0%{opacity:0;transform:translateY(-30px) scale(.7)}60%{transform:translateY(4px) scale(1.05)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes shake    {0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}60%{transform:translateX(6px)}}
@keyframes heartbeat{0%,100%{transform:scale(1)}14%{transform:scale(1.18)}28%{transform:scale(1)}42%{transform:scale(1.1)}}
@keyframes bounce   {0%,100%{transform:translateY(0)}40%{transform:translateY(-12px)}60%{transform:translateY(-5px)}}
@keyframes revealUp {0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
@keyframes slideUp  {from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes confetti {0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(150px) rotate(500deg)}}

/* ── HEADER ── */
.header{background:var(--white);border-bottom:3px solid var(--border);position:sticky;top:0;z-index:300;height:60px;display:flex;align-items:center;padding:0 20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.hc{max-width:900px;width:100%;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px}
.hl{display:flex;align-items:center;gap:10px}
.logo{width:40px;height:40px;border-radius:12px;background:var(--yellow);border:2px solid var(--ys);border-bottom:4px solid var(--ys);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.site-title{font-size:17px;font-weight:900;color:var(--ink-bold);letter-spacing:-.4px}
@media(max-width:380px){.site-title{display:none}}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-pill{background:var(--bg);border:2px solid var(--border-heavy);border-radius:99px;padding:5px 12px;font-size:13px;font-weight:900;color:var(--ink-bold);display:flex;align-items:center;gap:4px}
.btn-signout{display:none;align-items:center;justify-content:center;width:36px;height:36px;background:rgba(255,75,75,.08);border:2px solid rgba(255,75,75,.25);border-bottom:4px solid rgba(255,75,75,.3);border-radius:10px;font-size:18px;cursor:pointer}
.btn-signout.show{display:inline-flex}

/* ── PAGE ── */
.page{max-width:900px;margin:0 auto;padding:24px 14px 80px;display:flex;flex-direction:column;gap:20px}

/* ── HERO STRIP ── */
.hero-strip{background:var(--navy);border:2px solid rgba(255,255,255,.08);border-bottom:6px solid #0d1a35;border-radius:var(--r);padding:24px 22px;position:relative;overflow:hidden;animation:up .4s ease both}
.hero-strip::after{content:'📚';position:absolute;bottom:-14px;right:8px;font-size:110px;opacity:.08;pointer-events:none;animation:float 5s ease-in-out infinite}
.hero-eyebrow{font-size:11px;font-weight:900;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.hero-name{font-size:clamp(24px,5vw,36px);font-weight:900;color:#fff;letter-spacing:-1px;margin-bottom:4px;line-height:1.1}
.hero-sub{font-size:14px;font-weight:700;color:rgba(255,255,255,.65);margin-bottom:18px;line-height:1.6}
.hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;position:relative;z-index:1}
.hstat{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.12);border-radius:var(--rsm);padding:12px 10px;text-align:center}
.hstat-n{font-size:clamp(18px,4vw,26px);font-weight:900;color:var(--yellow);line-height:1;display:block}
.hstat-l{font-size:10px;font-weight:900;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px;margin-top:3px;display:block}

/* ── SKELETON ── */
.skeleton{background:linear-gradient(90deg,#e8e8e8 25%,#f5f5f5 50%,#e8e8e8 75%);background-size:400px 100%;animation:shimmer 1.4s infinite;border-radius:var(--rsm)}
.skel-hero{height:180px;border-radius:var(--r);margin-bottom:0}

/* ── SECTION LABEL ── */
.sec-label{font-size:11px;font-weight:900;color:var(--ink-3);text-transform:uppercase;letter-spacing:2px;display:flex;align-items:center;gap:10px}
.sec-label::after{content:'';flex:1;height:2px;background:var(--border);border-radius:2px}

/* ── BADGE GRID ── */
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
@media(max-width:480px){.badge-grid{grid-template-columns:repeat(2,1fr)}}

/* ── BADGE CARD ── */
.badge-card{background:var(--white);border:2px solid var(--border-heavy);border-bottom:5px solid var(--border-heavy);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;cursor:pointer;transition:transform .15s,box-shadow .15s;animation:up .4s ease both;position:relative}
.badge-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.1)}
.badge-card:active{transform:translateY(2px)}
.badge-card-strip{height:6px;flex-shrink:0}
.badge-card-body{padding:16px 12px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;flex:1}
.badge-face{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;position:relative;overflow:hidden;flex-shrink:0;border:3px solid rgba(0,0,0,.08)}
.badge-face::before{content:'';position:absolute;top:-10%;left:-80%;width:50%;height:120%;background:linear-gradient(to right,transparent,rgba(255,255,255,.5),transparent);transform:skewX(-20deg);animation:shimmer 3s ease-in-out infinite;pointer-events:none}
.badge-card-title{font-size:13px;font-weight:900;color:var(--ink-bold);line-height:1.3;letter-spacing:-.2px}
.badge-card-level{font-size:10px;font-weight:900;color:var(--ink-3);text-transform:uppercase;letter-spacing:1px}
.badge-card-date{font-size:10px;font-weight:700;color:var(--ink-3)}
.badge-card-btn{display:flex;align-items:center;justify-content:center;gap:5px;width:calc(100% - 24px);margin:0 12px 12px;padding:9px;font-size:12px;font-weight:900;border-radius:var(--rsm);border:2px solid;border-bottom:3px solid;transition:all .1s;font-family:inherit}
.badge-card-btn:active{border-bottom-width:2px;transform:translateY(2px)}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:48px 24px;animation:up .4s ease both}
.empty-icon{font-size:72px;display:block;margin-bottom:16px;animation:float 3s ease-in-out infinite}
.empty-title{font-size:22px;font-weight:900;color:var(--ink-bold);margin-bottom:8px}
.empty-sub{font-size:14px;font-weight:700;color:var(--ink-3);margin-bottom:24px;line-height:1.6;max-width:340px;margin-left:auto;margin-right:auto}
.empty-btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:var(--yellow);color:var(--ink-bold);font-size:15px;font-weight:900;border-radius:var(--r);border:2px solid var(--ys);border-bottom:5px solid var(--ys);transition:all .1s;font-family:inherit;cursor:pointer}
.empty-btn:active{border-bottom-width:2px;transform:translateY(3px)}

/* ── GUEST STATE ── */
.guest-card{background:var(--white);border:2px solid var(--border-heavy);border-bottom:6px solid var(--border-heavy);border-radius:var(--r);padding:36px 24px;text-align:center;animation:up .4s ease both}
.guest-icon{font-size:64px;display:block;margin-bottom:14px;animation:float 3s ease-in-out infinite}
.guest-title{font-size:22px;font-weight:900;color:var(--ink-bold);margin-bottom:8px}
.guest-sub{font-size:14px;font-weight:700;color:var(--ink-3);margin-bottom:24px;line-height:1.6;max-width:360px;margin-left:auto;margin-right:auto}
.guest-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-primary{display:inline-flex;align-items:center;gap:8px;padding:13px 24px;background:var(--yellow);color:var(--ink-bold);font-size:15px;font-weight:900;border-radius:var(--rsm);border:2px solid var(--ys);border-bottom:4px solid var(--ys);transition:all .1s;font-family:inherit;cursor:pointer}
.btn-primary:active{border-bottom-width:2px;transform:translateY(2px)}
.btn-secondary{display:inline-flex;align-items:center;gap:8px;padding:13px 20px;background:var(--white);color:var(--ink-bold);font-size:15px;font-weight:900;border-radius:var(--rsm);border:2px solid var(--border-heavy);border-bottom:4px solid var(--border-heavy);transition:all .1s;font-family:inherit;cursor:pointer}
.btn-secondary:active{border-bottom-width:2px;transform:translateY(2px)}

/* ── REVIEW MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:600;display:none;align-items:flex-end;justify-content:center}
@media(min-width:640px){.modal-overlay{align-items:center}}
.modal-overlay.open{display:flex}
.modal-sheet{background:var(--white);border-radius:var(--r) var(--r) 0 0;max-width:640px;width:100%;max-height:92vh;overflow-y:auto;border:2px solid var(--border-heavy);border-bottom:none;animation:slideUp .35s cubic-bezier(.175,.885,.32,1.275) both}
@media(min-width:640px){.modal-sheet{border-radius:var(--r);border-bottom:6px solid var(--border-heavy);max-height:88vh}}
.modal-handle{width:36px;height:4px;background:var(--border-heavy);border-radius:2px;margin:12px auto 0}
@media(min-width:640px){.modal-handle{display:none}}
.modal-head{padding:16px 18px 14px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:12px;position:sticky;top:0;background:var(--white);z-index:10}
.modal-badge-face{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;border:3px solid rgba(0,0,0,.08);position:relative;overflow:hidden}
.modal-badge-face::before{content:'';position:absolute;top:-10%;left:-80%;width:50%;height:120%;background:linear-gradient(to right,transparent,rgba(255,255,255,.5),transparent);transform:skewX(-20deg);animation:shimmer 2.5s ease-in-out infinite;pointer-events:none}
.modal-title{font-size:16px;font-weight:900;color:var(--ink-bold);line-height:1.25}
.modal-subtitle{font-size:12px;font-weight:700;color:var(--ink-3);margin-top:2px}
.modal-close{width:34px;height:34px;background:var(--bg);border:2px solid var(--border-heavy);border-radius:var(--rxs);font-size:18px;font-weight:900;color:var(--ink-3);display:flex;align-items:center;justify-content:center;cursor:pointer;margin-left:auto;flex-shrink:0;font-family:inherit}
.modal-body{padding:18px}

/* ── REVIEW TABS ── */
.review-tabs{display:flex;gap:6px;margin-bottom:18px;overflow-x:auto;padding-bottom:2px}
.review-tab{padding:8px 14px;font-size:12px;font-weight:900;border-radius:99px;border:2px solid var(--border-heavy);background:var(--white);color:var(--ink-3);cursor:pointer;white-space:nowrap;transition:all .12s;font-family:inherit;flex-shrink:0}
.review-tab.active{background:var(--yellow);color:var(--ink-bold);border-color:var(--ys)}
.review-panel{display:none}
.review-panel.active{display:block;animation:revealUp .25s ease both}

/* ── VOCAB FLASHCARDS ── */
.vocab-grid{display:flex;flex-direction:column;gap:10px}
.vocab-item{background:var(--bg);border:2px solid var(--border);border-radius:var(--rsm);padding:14px 16px;cursor:pointer;transition:border-color .15s}
.vocab-item:hover{border-color:var(--ys)}
.vocab-item.open{border-color:var(--yellow);background:rgba(255,200,0,.05)}
.vocab-word{font-size:16px;font-weight:900;color:var(--ink-bold);letter-spacing:-.3px}
.vocab-type{font-size:10px;font-weight:900;color:var(--ink-3);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.vocab-def{font-size:14px;font-weight:700;color:var(--ink);line-height:1.6;margin-top:10px;padding-top:10px;border-top:2px solid var(--border);display:none}
.vocab-item.open .vocab-def{display:block;animation:revealUp .2s ease both}
.vocab-example{font-size:13px;font-weight:700;color:var(--ink-3);font-style:italic;margin-top:6px}

/* ── QUIZ (vocab gap-fill style) ── */
.quiz-progress-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.quiz-pips{display:flex;gap:5px;flex:1}
.quiz-pip{flex:1;height:6px;border-radius:99px;background:var(--border-heavy);transition:background .3s}
.quiz-pip.right{background:var(--green)}
.quiz-pip.wrong{background:var(--punch)}
.quiz-pip.active{background:var(--yellow)}
.quiz-score{font-size:13px;font-weight:900;color:var(--ink-3);margin-left:12px;white-space:nowrap}
.quiz-word-display{background:linear-gradient(135deg,var(--navy),#1a3358);border-radius:var(--rsm);padding:20px;margin-bottom:14px;text-align:center;position:relative;overflow:hidden}
.quiz-word-display::before{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(to right,transparent,rgba(255,255,255,.06),transparent);animation:shimmer 3s ease-in-out infinite}
.quiz-word{font-size:clamp(20px,5vw,28px);font-weight:900;color:#fff;letter-spacing:-.5px;position:relative;z-index:1}
.quiz-word-type{font-size:10px;font-weight:900;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:2px;margin-top:4px;position:relative;z-index:1}
.quiz-sentence{font-size:13px;font-weight:700;color:rgba(255,255,255,.85);margin-top:10px;font-style:italic;background:rgba(0,0,0,.2);border-radius:var(--rxs);padding:9px 12px;position:relative;z-index:1;line-height:1.55}
.quiz-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.quiz-opt{padding:13px 15px;font-size:14px;font-weight:800;background:var(--white);color:var(--ink);border:2px solid var(--border-heavy);border-bottom:4px solid var(--border-heavy);border-radius:var(--rsm);cursor:pointer;font-family:inherit;text-align:left;line-height:1.4;transition:all .1s}
.quiz-opt:active{border-bottom-width:2px;transform:translateY(2px)}
.quiz-opt:hover:not(:disabled){border-color:var(--blue);color:var(--bs)}
.quiz-opt.correct{background:var(--green)!important;color:#fff!important;border-color:var(--gs)!important;animation:heartbeat .5s ease}
.quiz-opt.wrong{background:var(--punch)!important;color:#fff!important;border-color:var(--ps)!important;animation:shake .4s}
.quiz-opt.show-ok{background:rgba(88,204,2,.1)!important;color:var(--gs)!important;border-color:var(--gs)!important}
.quiz-opt:disabled{cursor:default}
.quiz-feedback{padding:12px 14px;border-radius:var(--rsm);font-size:14px;font-weight:700;line-height:1.6;border:2px solid;display:none;margin-bottom:10px}
.quiz-feedback.show.right{display:block;background:rgba(88,204,2,.1);color:var(--gs);border-color:rgba(88,167,0,.3);animation:revealUp .2s ease both}
.quiz-feedback.show.wrong{display:block;background:rgba(255,75,75,.1);color:var(--ps);border-color:rgba(255,75,75,.3);animation:revealUp .2s ease both}
.quiz-next{display:none;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;background:var(--yellow);color:var(--ink-bold);font-size:14px;font-weight:900;font-family:inherit;border:2px solid var(--ys);border-bottom:5px solid var(--ys);border-radius:var(--rsm);transition:all .1s;cursor:pointer}
.quiz-next.show{display:flex;animation:revealUp .2s ease both}
.quiz-next:active{border-bottom-width:2px;transform:translateY(3px)}

/* ── GRAMMAR QUIZ ── */
.gram-explainer{background:var(--bg);border:2px solid var(--border);border-left:5px solid var(--green);border-radius:0 var(--rsm) var(--rsm) 0;padding:14px 16px;margin-bottom:14px;font-size:14px;font-weight:700;color:var(--ink-bold);line-height:1.7}
.gram-explainer strong{color:var(--gs)}
.gram-explainer code{background:rgba(88,204,2,.12);padding:2px 6px;border-radius:4px;font-family:inherit;font-size:13px;font-weight:900;color:var(--gs)}
.gram-sent-card{background:var(--bg);border:2px solid var(--border);border-left:5px solid var(--green);border-radius:0 var(--rsm) var(--rsm) 0;padding:14px 16px;margin-bottom:12px}
.gram-sent-num{font-size:10px;font-weight:900;color:var(--gs);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}
.gram-sent-text{font-size:clamp(14px,3.8vw,16px);font-weight:800;color:var(--ink-bold);line-height:1.55}
.gram-sent-hint{font-size:12px;font-weight:700;color:var(--ink-3);font-style:italic;margin-top:5px}
.gram-word-btns{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.gram-word-btn{padding:9px 16px;background:var(--white);color:var(--ink-bold);border:2px solid var(--border-heavy);border-bottom:4px solid var(--border-heavy);border-radius:var(--rsm);font-size:13px;font-weight:900;font-family:inherit;transition:all .1s;cursor:pointer}
.gram-word-btn:active{border-bottom-width:2px;transform:translateY(2px)}
.gram-word-btn:hover:not(:disabled){border-color:var(--green);color:var(--gs)}
.gram-word-btn.correct{background:var(--green)!important;color:#fff!important;border-color:var(--gs)!important;animation:heartbeat .5s ease}
.gram-word-btn.wrong{background:var(--punch)!important;color:#fff!important;border-color:var(--ps)!important;animation:shake .4s}
.gram-word-btn.show-ok{background:rgba(88,204,2,.12)!important;color:var(--gs)!important;border-color:var(--gs)!important}
.gram-word-btn:disabled{cursor:default}

/* ── TRUE / FALSE ── */
.tf-stat-card{background:var(--bg);border:2px solid var(--border);border-left:5px solid var(--yellow);border-radius:0 var(--rsm) var(--rsm) 0;padding:16px 16px;margin-bottom:12px}
.tf-stat-num{font-size:10px;font-weight:900;color:var(--ys);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
.tf-stat-text{font-size:clamp(14px,3.8vw,16px);font-weight:800;color:var(--ink-bold);line-height:1.5}
.tf-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.tf-btn{padding:14px 12px;font-size:14px;font-weight:900;border:2px solid var(--border-heavy);border-bottom:4px solid var(--border-heavy);border-radius:var(--rsm);cursor:pointer;font-family:inherit;text-align:center;background:var(--white);color:var(--ink-bold);transition:all .1s}
.tf-btn:active{border-bottom-width:2px;transform:translateY(2px)}
.tf-btn.t-btn:hover:not(:disabled){border-color:var(--gs);background:rgba(88,204,2,.07)}
.tf-btn.f-btn:hover:not(:disabled){border-color:var(--ps);background:rgba(255,75,75,.07)}
.tf-btn.correct{background:var(--green)!important;color:#fff!important;border-color:var(--gs)!important;animation:heartbeat .5s ease}
.tf-btn.wrong{background:var(--punch)!important;color:#fff!important;border-color:var(--ps)!important;animation:shake .4s}
.tf-btn.show-ok{background:rgba(88,204,2,.1)!important;border-color:var(--gs)!important;color:var(--gs)!important}
.tf-btn:disabled{cursor:default}
.tf-reveal{display:none;background:var(--bg);border:2px solid var(--border);border-radius:var(--rsm);padding:12px 14px;font-size:14px;font-weight:700;color:var(--ink-bold);line-height:1.65;margin-bottom:10px}
.tf-reveal.show{display:block;animation:revealUp .2s ease both}

/* ── QUIZ DONE ── */
.quiz-done{text-align:center;padding:24px 16px;animation:popin .4s cubic-bezier(.175,.885,.32,1.275) both}
.quiz-done-icon{font-size:56px;display:block;margin-bottom:10px;animation:bounce 1.5s ease-in-out infinite}
.quiz-done-title{font-size:20px;font-weight:900;color:var(--ink-bold);margin-bottom:6px}
.quiz-done-sub{font-size:14px;font-weight:700;color:var(--ink-3);margin-bottom:18px;line-height:1.5}
.quiz-done-btn{display:inline-flex;align-items:center;gap:8px;padding:13px 24px;background:var(--yellow);color:var(--ink-bold);font-size:15px;font-weight:900;border-radius:var(--rsm);border:2px solid var(--ys);border-bottom:4px solid var(--ys);cursor:pointer;font-family:inherit;transition:all .1s}
.quiz-done-btn:active{border-bottom-width:2px;transform:translateY(2px)}

</style>
</head>
<body>

<header class="header">
  <div class="hc">
    <div class="hl">
      <a href="/" class="logo">😎</a>
      <a href="/" class="site-title">English For Cool Dudes</a>
    </div>
    <div class="hdr-right">
      <div class="hdr-pill">🔥 <span id="hdr-streak">0</span></div>
      <div class="hdr-pill">⚡ <span id="hdr-xp">0</span></div>
      <button class="btn-signout" id="btn-signout" onclick="handleSignOut()">👋</button>
    </div>
  </div>
</header>

<!-- REVIEW MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal-sheet" id="modal-sheet">
    <div id="modal-content"></div>
  </div>
</div>

<div class="page" id="page-content">
  <!-- content rendered by JS -->
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/init-auth.js"></script>
<script src="/supabase-auth-gamified.js"></script>
<script>
'use strict';

/* ══════════════════════════════════════════════
   LESSON LINK → REGISTRY ID MAP
   Maps lesson_link from Supabase → LESSON_DATA_REGISTRY key
══════════════════════════════════════════════ */
const LINK_TO_ID = {
  '/corgis/':         'royal-corgis-beginner',
  '/tube/':           'london-underground-beginner',
  '/crown-estate/':   'crown-estate-intermediate',
  '/ikea/':           'ikea-effect-intermediate',
  '/saudimachine/':   'saudi-machine-deal-tax',
};

/* ══════════════════════════════════════════════
   TRACK COLOURS — for badge cards
   Keyed by lesson_level
══════════════════════════════════════════════ */
const LEVEL_THEME = {
  'Beginner':      { strip:'#58CC02', bg:'linear-gradient(135deg,#1a3a0a,#2d5e14)', glow:'rgba(88,204,2,.5)' },
  'Intermediate':  { strip:'#1CB0F6', bg:'linear-gradient(135deg,#0a2240,#1a3a5e)', glow:'rgba(28,176,246,.5)' },
  'Advanced':      { strip:'#FF4B4B', bg:'linear-gradient(135deg,#3a0a0a,#5e1414)', glow:'rgba(255,75,75,.5)' },
  'Tax English':   { strip:'#FF9600', bg:'linear-gradient(135deg,#1C1410,#2D1F10)', glow:'rgba(255,150,0,.5)' },
  'Business':      { strip:'#CE82FF', bg:'linear-gradient(135deg,#1a0a3a,#2d145e)', glow:'rgba(206,130,255,.5)' },
  'Legal English': { strip:'#2BDECC', bg:'linear-gradient(135deg,#0a2a28,#14403c)', glow:'rgba(43,222,204,.5)' },
};
function themeFor(level){ return LEVEL_THEME[level] || LEVEL_THEME['Intermediate']; }

/* ══════════════════════════════════════════════
   FORMAT DATE
══════════════════════════════════════════════ */
function fmtDate(ts){
  if(!ts) return '';
  const d = new Date(ts);
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}
function timeAgo(ts){
  if(!ts) return '';
  const diff = Date.now() - new Date(ts).getTime();
  const days = Math.floor(diff / 86400000);
  if(days === 0) return 'Today';
  if(days === 1) return 'Yesterday';
  if(days < 7)  return `${days} days ago`;
  if(days < 30) return `${Math.floor(days/7)} week${Math.floor(days/7)>1?'s':''} ago`;
  return fmtDate(ts);
}

/* ══════════════════════════════════════════════
   CONFETTI
══════════════════════════════════════════════ */
const CONF_COLOURS = ['#FFC800','#58CC02','#1CB0F6','#FF4B4B','#CE82FF','#2BDECC'];
function burst(){
  for(let i=0;i<20;i++){
    const d=document.createElement('div');d.className='conf-dot';
    const sz=8+Math.random()*10;
    d.style.cssText=`left:${20+Math.random()*60}vw;top:${10+Math.random()*30}vh;width:${sz}px;height:${sz}px;background:${CONF_COLOURS[~~(Math.random()*CONF_COLOURS.length)]};animation-delay:${Math.random()*.4}s;animation-duration:${.8+Math.random()*.6}s;border-radius:${Math.random()>.5?'50%':'3px'};transform:rotate(${Math.random()*360}deg)`;
    document.body.appendChild(d);setTimeout(()=>d.remove(),1600);
  }
}

/* ══════════════════════════════════════════════
   RENDER PAGE
══════════════════════════════════════════════ */
function renderPage(user, stats, lessons){
  const page = document.getElementById('page-content');

  if(!user){
    page.innerHTML = `
      <div class="guest-card">
        <span class="guest-icon">📚</span>
        <div class="guest-title">Your Lesson Library</div>
        <div class="guest-sub">Create a free account to save your badges and review any lesson you've completed — vocabulary, grammar and more — any time you like.</div>
        <div class="guest-btns">
          <a href="/signup/" class="btn-primary">🚀 Create Free Account</a>
          <a href="/" class="btn-secondary">← Browse Lessons</a>
        </div>
      </div>`;
    return;
  }

  const firstName = (stats?.full_name || user.email?.split('@')[0] || 'Dude').split(' ')[0];
  const totalXP = stats?.xp || 0;
  const streak  = stats?.streak || 0;
  const count   = lessons.length;

  // ── Hero ──
  const heroHTML = `
    <div class="hero-strip">
      <div class="hero-eyebrow">📚 My Lesson Library</div>
      <div class="hero-name">${firstName}'s Collection</div>
      <div class="hero-sub">${count > 0 ? `${count} badge${count!==1?'s':''} earned — tap any badge to review the lesson` : 'Complete your first lesson to start your collection'}</div>
      <div class="hero-stats">
        <div class="hstat"><span class="hstat-n">${count}</span><span class="hstat-l">Badges</span></div>
        <div class="hstat"><span class="hstat-n">${streak}🔥</span><span class="hstat-l">Streak</span></div>
        <div class="hstat"><span class="hstat-n">⚡${totalXP}</span><span class="hstat-l">Total XP</span></div>
      </div>
    </div>`;

  if(count === 0){
    page.innerHTML = heroHTML + `
      <div class="empty-state">
        <span class="empty-icon">🎯</span>
        <div class="empty-title">No badges yet!</div>
        <div class="empty-sub">Complete your first lesson and your badge appears here — with vocabulary flashcards, grammar exercises and quiz games so you can review it any time.</div>
        <a href="/" class="empty-btn">🚀 Find a lesson →</a>
      </div>`;
    return;
  }

  // ── Badge grid ──
  const grid = lessons.map((l, i) => {
    const theme = themeFor(l.lesson_level);
    const registryId = LINK_TO_ID[l.lesson_link] || null;
    const hasReview = !!registryId;
    return `
      <div class="badge-card" style="animation-delay:${i*0.06}s" onclick="openReview(${i})">
        <div class="badge-card-strip" style="background:${theme.strip}"></div>
        <div class="badge-card-body">
          <div class="badge-face" style="background:${theme.bg};box-shadow:0 0 18px ${theme.glow}">${l.badge_icon || '🏅'}</div>
          <div class="badge-card-title">${l.badge_name || l.lesson_title}</div>
          <div class="badge-card-level">${l.lesson_level}</div>
          <div class="badge-card-date">${timeAgo(l.completed_at)}</div>
        </div>
        <button class="badge-card-btn" style="background:${hasReview?theme.strip:'var(--bg)'};color:${hasReview?'#fff':'var(--ink-3)'};border-color:${hasReview?theme.strip:'var(--border-heavy)'}">
          ${hasReview ? '▶ Review' : '📖 View'}
        </button>
      </div>`;
  }).join('');

  page.innerHTML = heroHTML + `
    <div class="sec-label">🏅 Your Badges</div>
    <div class="badge-grid">${grid}</div>`;
}

/* ══════════════════════════════════════════════
   OPEN REVIEW MODAL
══════════════════════════════════════════════ */
let _lessons = [];

function openReview(idx){
  const l = _lessons[idx];
  if(!l) return;
  const registryId = LINK_TO_ID[l.lesson_link] || null;
  const theme = themeFor(l.lesson_level);
  const reg = registryId && window.LESSON_DATA_REGISTRY ? window.LESSON_DATA_REGISTRY[registryId] : null;

  // Build vocab from registry or fall back to saved vocabulary jsonb
  const vocabData = reg?.vocab || (Array.isArray(l.vocabulary) ? l.vocabulary.map(v=>({word:v.word,definition:v.definition})) : []);

  // Decide which tabs to show
  const tabs = [];
  if(vocabData.length)          tabs.push({id:'vocab',    label:'📖 Vocabulary'});
  if(reg?.vocab?.length)           tabs.push({id:'quiz',        label:'🎯 Quiz'});
  if(reg?.grammar)                 tabs.push({id:'grammar',     label:'✏️ Grammar'});
  if(reg?.sentences?.length)       tabs.push({id:'sentences',   label:'🔀 Sentences'});
  if(reg?.word_builder?.length)    tabs.push({id:'wordBuilder', label:'🔤 Words'});
  if(reg?.true_false?.length)      tabs.push({id:'trueFalse',   label:'✅ True/False'});

  if(!tabs.length){
    tabs.push({id:'vocab', label:'📖 Vocabulary'});
  }

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div class="modal-badge-face" style="background:${theme.bg};box-shadow:0 0 14px ${theme.glow}">${l.badge_icon||'🏅'}</div>
      <div>
        <div class="modal-title">${l.lesson_title}</div>
        <div class="modal-subtitle">${l.badge_name||''} · ${fmtDate(l.completed_at)}</div>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="review-tabs" id="review-tabs">
        ${tabs.map((t,i)=>`<button class="review-tab${i===0?' active':''}" onclick="switchTab('${t.id}')" data-tab="${t.id}">${t.label}</button>`).join('')}
      </div>
      ${tabs.map((t,i)=>`<div class="review-panel${i===0?' active':''}" id="panel-${t.id}"></div>`).join('')}
    </div>`;

  if(document.getElementById('panel-vocab'))       renderVocabPanel(vocabData, reg);
  if(document.getElementById('panel-quiz'))        renderQuizPanel(reg);
  if(document.getElementById('panel-grammar'))     renderGrammarPanel(reg);
  if(document.getElementById('panel-sentences'))   renderSentencePanel(reg);
  if(document.getElementById('panel-wordBuilder')) renderWordBuilderPanel(reg);
  if(document.getElementById('panel-trueFalse'))   renderTFPanel(reg);

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function handleOverlayClick(e){
  if(e.target === document.getElementById('modal-overlay')) closeModal();
}

function switchTab(id){
  document.querySelectorAll('.review-tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===id));
  document.querySelectorAll('.review-panel').forEach(p=>p.classList.toggle('active', p.id===`panel-${id}`));
}

/* ── VOCAB PANEL ── */
function renderVocabPanel(vocabData, reg){
  const el = document.getElementById('panel-vocab');
  if(!el || !vocabData.length){ if(el) el.innerHTML = '<p style="color:var(--ink-3);font-size:14px;font-weight:700">No vocabulary saved for this lesson.</p>'; return; }
  el.innerHTML = `<div class="vocab-grid">${vocabData.map((v,i)=>`
    <div class="vocab-item" onclick="toggleVocab(this)">
      <div class="vocab-word">${v.word}</div>
      ${v.type?`<div class="vocab-type">${v.type}</div>`:''}
      <div class="vocab-def">${v.definition}${v.example?`<div class="vocab-example">"${v.example.replace('___','______')}"</div>`:''}
      </div>
    </div>`).join('')}</div>
    <p style="font-size:12px;font-weight:700;color:var(--ink-3);text-align:center;margin-top:14px">Tap any word to see the definition</p>`;
}
window.toggleVocab = function(el){ el.classList.toggle('open'); };

/* ── QUIZ PANEL ── */
function renderQuizPanel(reg){
  const el = document.getElementById('panel-quiz');
  if(!el || !reg?.vocab?.length){ if(el) el.innerHTML = comingSoon('Vocabulary quiz'); return; }

  const questions = reg.vocab.filter(v=>v.example && v.distractors?.length);
  if(!questions.length){ el.innerHTML = comingSoon('Vocabulary quiz'); return; }

  let qIdx = 0, score = 0, done = false;

  function renderQ(){
    const pips = questions.map((_,i)=>`<div class="quiz-pip${i<qIdx?' right':i===qIdx?' active':''}" id="qpip-${i}"></div>`).join('');
    const q = questions[qIdx];
    const allOpts = [q.word, ...(q.distractors||[])].sort(()=>Math.random()-.5);
    const correct = allOpts.indexOf(q.word);
    el.innerHTML = `
      <div class="quiz-progress-row"><div class="quiz-pips">${pips}</div><div class="quiz-score" id="qscore">${score}/${questions.length}</div></div>
      <div class="quiz-word-display">
        <div class="quiz-word">${q.word}</div>
        ${q.type?`<div class="quiz-word-type">${q.type}</div>`:''}
        <div class="quiz-sentence">"${q.example}"</div>
      </div>
      <p style="font-size:13px;font-weight:700;color:var(--ink-3);margin-bottom:10px">Which sentence fits <strong style="color:var(--ink-bold)">"${q.word}"</strong>?</p>
      <div class="quiz-opts">${allOpts.map((o,i)=>`<button class="quiz-opt" onclick="answerQuiz(this,${i},${correct})">${o}</button>`).join('')}</div>
      <div class="quiz-feedback" id="qfb"></div>
      <button class="quiz-next" id="qnxt" onclick="nextQuiz()">Next →</button>`;
  }

  window.answerQuiz = function(btn, chosen, correct){
    if(done) return;
    document.querySelectorAll('.quiz-opt').forEach(b=>b.disabled=true);
    const ok = chosen === correct;
    btn.classList.add(ok?'correct':'wrong');
    if(!ok) document.querySelectorAll('.quiz-opt')[correct].classList.add('show-ok');
    if(ok){ score++; burst(); }
    const q = questions[qIdx];
    const fb = document.getElementById('qfb');
    if(fb){ fb.innerHTML = (ok?'✅ ':'💡 ') + q.definition; fb.className = `quiz-feedback show ${ok?'right':'wrong'}`; }
    const nxt = document.getElementById('qnxt');
    if(nxt){ nxt.classList.add('show'); nxt.textContent = qIdx+1 < questions.length ? 'Next →' : 'See score! 🎉'; }
    const pip = document.getElementById(`qpip-${qIdx}`);
    if(pip) pip.classList.add(ok?'right':'wrong');
  };

  window.nextQuiz = function(){
    qIdx++;
    if(qIdx >= questions.length){
      done = true;
      const perfect = score === questions.length;
      if(perfect) burst();
      el.innerHTML = `<div class="quiz-done">
        <span class="quiz-done-icon">${perfect?'🏆':'⭐'}</span>
        <div class="quiz-done-title">${score}/${questions.length} correct! ${perfect?'Perfect! 🎉':''}</div>
        <div class="quiz-done-sub">${perfect?'Flawless recall — this vocabulary is locked in.':'Keep reviewing and it\'ll stick!'}</div>
        <button class="quiz-done-btn" onclick="renderQuizPanel(window._currentReg)">↺ Try Again</button>
      </div>`;
    } else {
      renderQ();
    }
  };

  window._currentReg = reg;
  renderQ();
}

/* ── GRAMMAR PANEL ── */
function renderGrammarPanel(reg){
  const el = document.getElementById('panel-grammar');
  if(!el || !reg?.grammar?.exercises?.length){ if(el) el.innerHTML = comingSoon('Grammar exercises'); return; }

  const g = reg.grammar;
  let gIdx = 0, gScore = 0;

  function renderG(){
    const q = g.exercises[gIdx];
    const opts = [q.answer, ...(q.wrong||[])].sort(()=>Math.random()-.5);
    const correct = opts.indexOf(q.answer);
    const pips = g.exercises.map((_,i)=>`<div class="quiz-pip${i<gIdx?' right':i===gIdx?' active':''}" id="gpip-${i}"></div>`).join('');
    el.innerHTML = `
      <div class="gram-explainer"><strong>${g.topic}</strong><br><br>${g.rule.replace(/\n/g,'<br>')}</div>
      <div class="quiz-progress-row"><div class="quiz-pips">${pips}</div><div class="quiz-score">${gScore}/${g.exercises.length}</div></div>
      <div class="gram-sent-card">
        <div class="gram-sent-num">Sentence ${gIdx+1} of ${g.exercises.length}</div>
        <div class="gram-sent-text">${q.sentence.replace('___','<span style="background:rgba(88,204,2,.15);border:2px dashed var(--gs);border-radius:6px;padding:1px 10px;color:var(--gs)">___</span>')}</div>
        ${q.hint?`<div class="gram-sent-hint">💡 ${q.hint}</div>`:''}
      </div>
      <div class="gram-word-btns">${opts.map((o,i)=>`<button class="gram-word-btn" onclick="answerGram(this,${i},${correct},'${escQ(q.explain||q.answer)}')">${o}</button>`).join('')}</div>
      <div class="quiz-feedback" id="gfb"></div>
      <button class="quiz-next" id="gnxt" onclick="nextGram()">Next →</button>`;
  }

  window.answerGram = function(btn, chosen, correct, explain){
    document.querySelectorAll('.gram-word-btn').forEach(b=>b.disabled=true);
    const ok = chosen === correct;
    btn.classList.add(ok?'correct':'wrong');
    if(!ok) document.querySelectorAll('.gram-word-btn')[correct].classList.add('show-ok');
    if(ok){ gScore++; burst(); }
    const fb = document.getElementById('gfb');
    if(fb){ fb.textContent = explain; fb.className = `quiz-feedback show ${ok?'right':'wrong'}`; }
    const nxt = document.getElementById('gnxt');
    if(nxt){ nxt.classList.add('show'); nxt.textContent = gIdx+1 < g.exercises.length ? 'Next →' : 'Done! 🎉'; }
    const pip = document.getElementById(`gpip-${gIdx}`);
    if(pip) pip.classList.add(ok?'right':'wrong');
  };

  window.nextGram = function(){
    gIdx++;
    if(gIdx >= g.exercises.length){
      const perfect = gScore === g.exercises.length;
      if(perfect) burst();
      el.innerHTML = `<div class="quiz-done">
        <span class="quiz-done-icon">${perfect?'🏆':'⭐'}</span>
        <div class="quiz-done-title">${gScore}/${g.exercises.length} correct! ${perfect?'Perfect!':''}</div>
        <div class="quiz-done-sub">${g.topic} — ${perfect?'mastered!':'keep practising!'}</div>
        <button class="quiz-done-btn" onclick="renderGrammarPanel(window._currentReg)">↺ Try Again</button>
      </div>`;
    } else {
      renderG();
    }
  };

  renderG();
}

/* ── TRUE/FALSE PANEL ── */
function renderTFPanel(reg){
  const el = document.getElementById('panel-trueFalse');
  if(!el || !reg?.true_false?.length){ if(el) el.innerHTML = comingSoon('True/False quiz'); return; }

  const questions = reg.true_false;
  let tfIdx = 0, tfScore = 0;

  function renderTF(){
    const q = questions[tfIdx];
    const pips = questions.map((_,i)=>`<div class="quiz-pip${i<tfIdx?' right':i===tfIdx?' active':''}" id="tfpip-${i}"></div>`).join('');
    el.innerHTML = `
      <div class="quiz-progress-row"><div class="quiz-pips">${pips}</div><div class="quiz-score">${tfScore}/${questions.length}</div></div>
      <div class="tf-stat-card">
        <div class="tf-stat-num">Statement ${tfIdx+1} of ${questions.length}</div>
        <div class="tf-stat-text">${q.statement}</div>
      </div>
      <div class="tf-btns">
        <button class="tf-btn t-btn" onclick="answerTF(true,this)">✅ TRUE</button>
        <button class="tf-btn f-btn" onclick="answerTF(false,this)">❌ FALSE</button>
      </div>
      <div class="tf-reveal" id="tf-rev"></div>
      <button class="quiz-next" id="tfnxt" onclick="nextTF()">${tfIdx+1<questions.length?'Next →':'Done! 🎉'}</button>`;
  }

  window.answerTF = function(chosen, btn){
    document.querySelectorAll('.tf-btn').forEach(b=>b.disabled=true);
    const q = questions[tfIdx];
    const ok = chosen === q.correct;
    btn.classList.add(ok?'correct':'wrong');
    if(!ok)(btn.classList.contains('t-btn')?document.querySelector('.f-btn'):document.querySelector('.t-btn')).classList.add('show-ok');
    if(ok){ tfScore++; burst(); }
    const rev = document.getElementById('tf-rev');
    if(rev){ rev.textContent = q.reveal; rev.classList.add('show'); }
    const pip = document.getElementById(`tfpip-${tfIdx}`);
    if(pip) pip.classList.add(ok?'right':'wrong');
    const nxt = document.getElementById('tfnxt');
    if(nxt) nxt.classList.add('show');
  };

  window.nextTF = function(){
    tfIdx++;
    if(tfIdx >= questions.length){
      const perfect = tfScore === questions.length;
      if(perfect) burst();
      el.innerHTML = `<div class="quiz-done">
        <span class="quiz-done-icon">${perfect?'🏆':'⭐'}</span>
        <div class="quiz-done-title">${tfScore}/${questions.length} correct! ${perfect?'Perfect!':''}</div>
        <div class="quiz-done-sub">${perfect?'You know this topic inside out!':'Review the answers above to lock in the facts.'}</div>
        <button class="quiz-done-btn" onclick="renderTFPanel(window._currentReg)">↺ Try Again</button>
      </div>`;
    } else {
      renderTF();
    }
  };

  window._currentReg = reg;
  renderTF();
}

/* ── SENTENCE BUILDER PANEL ── */
function renderSentencePanel(reg){
  const el = document.getElementById('panel-sentences');
  if(!el || !reg?.sentences?.length){ if(el) el.innerHTML = comingSoon('Sentence builder'); return; }

  let sIdx = 0, sScore = 0;

  function renderS(){
    const q = reg.sentences[sIdx];
    const shuffled = [...q.words].sort(()=>Math.random()-.5);
    const pips = reg.sentences.map((_,i)=>`<div class="quiz-pip${i<sIdx?' right':i===sIdx?' active':''}" id="spip-${i}"></div>`).join('');
    el.innerHTML = `
      <div class="quiz-progress-row"><div class="quiz-pips">${pips}</div><div class="quiz-score">${sScore}/${reg.sentences.length}</div></div>
      <div class="gram-sent-card">
        <div class="gram-sent-num">Sentence ${sIdx+1} of ${reg.sentences.length}</div>
        <div class="gram-sent-text" style="color:var(--ink-3);font-style:italic">${q.hint||'Put the words in the right order'}</div>
      </div>
      <div style="min-height:44px;background:var(--bg);border:2px dashed var(--border-heavy);border-radius:var(--rsm);padding:10px 12px;margin-bottom:12px;font-size:14px;font-weight:800;color:var(--ink-bold);line-height:1.6" id="s-answer-box">Tap words below to build the sentence →</div>
      <div class="gram-word-btns" id="s-word-pool">${shuffled.map((w,i)=>`<button class="gram-word-btn" id="sw-${i}" onclick="tapSWord(this,'${escQ(w)}')">${w}</button>`).join('')}</div>
      <div class="quiz-feedback" id="sfb"></div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="quiz-next" id="scheck" onclick="checkSentence('${escQ(q.answer)}')" style="display:flex;flex:1;background:var(--blue);border-color:var(--bs)">Check ✓</button>
        <button style="padding:10px 14px;border:2px solid var(--border-heavy);border-bottom:4px solid var(--border-heavy);border-radius:var(--rsm);font-size:12px;font-weight:900;font-family:inherit;cursor:pointer;background:var(--white);color:var(--ink-3)" onclick="clearSentence()">✕ Clear</button>
      </div>
      <button class="quiz-next" id="snxt" onclick="nextSentence()" style="margin-top:8px">${sIdx+1<reg.sentences.length?'Next →':'Done! 🎉'}</button>`;

    let built = [];
    window._sBuilt = built;

    window.tapSWord = function(btn, word){
      if(btn.disabled) return;
      btn.disabled = true;
      btn.style.opacity = '.3';
      built.push(word);
      const box = document.getElementById('s-answer-box');
      if(box) box.textContent = built.join(' ');
    };

    window.clearSentence = function(){
      built.length = 0;
      document.querySelectorAll('[id^="sw-"]').forEach(b=>{ b.disabled=false; b.style.opacity='1'; });
      const box = document.getElementById('s-answer-box');
      if(box) box.textContent = 'Tap words below to build the sentence →';
      const fb = document.getElementById('sfb'); if(fb) fb.className='quiz-feedback';
    };
  }

  window.checkSentence = function(answer){
    const built = window._sBuilt || [];
    if(!built.length) return;
    const attempt = built.join(' ').toLowerCase().replace(/[^a-z0-9 ]/g,'').trim();
    const correct = answer.toLowerCase().replace(/[^a-z0-9 ]/g,'').trim();
    const ok = attempt === correct;
    if(ok){ sScore++; burst(); }
    const fb = document.getElementById('sfb');
    if(fb){ fb.textContent = ok ? '✅ Perfect!' : `💡 Answer: "${answer}"`; fb.className = `quiz-feedback show ${ok?'right':'wrong'}`; }
    document.querySelectorAll('[id^="sw-"]').forEach(b=>b.disabled=true);
    document.getElementById('scheck').style.display='none';
    const pip = document.getElementById(`spip-${sIdx}`); if(pip) pip.classList.add(ok?'right':'wrong');
    const nxt = document.getElementById('snxt'); if(nxt) nxt.classList.add('show');
  };

  window.nextSentence = function(){
    sIdx++;
    if(sIdx >= reg.sentences.length){
      const perfect = sScore === reg.sentences.length;
      if(perfect) burst();
      el.innerHTML = `<div class="quiz-done">
        <span class="quiz-done-icon">${perfect?'🏆':'⭐'}</span>
        <div class="quiz-done-title">${sScore}/${reg.sentences.length} correct!</div>
        <div class="quiz-done-sub">${perfect?'Every sentence nailed!':'Keep practising — sentence structure is key.'}</div>
        <button class="quiz-done-btn" onclick="renderSentencePanel(window._currentReg)">↺ Try Again</button>
      </div>`;
    } else { renderS(); }
  };

  window._currentReg = reg;
  renderS();
}

/* ── WORD BUILDER PANEL ── */
function renderWordBuilderPanel(reg){
  const el = document.getElementById('panel-wordBuilder');
  if(!el || !reg?.word_builder?.length){ if(el) el.innerHTML = comingSoon('Word builder'); return; }

  let wIdx = 0, wScore = 0;

  function renderW(){
    const q = reg.word_builder[wIdx];
    const letters = q.word.toUpperCase().split('').sort(()=>Math.random()-.5);
    const pips = reg.word_builder.map((_,i)=>`<div class="quiz-pip${i<wIdx?' right':i===wIdx?' active':''}" id="wpip-${i}"></div>`).join('');
    el.innerHTML = `
      <div class="quiz-progress-row"><div class="quiz-pips">${pips}</div><div class="quiz-score">${wScore}/${reg.word_builder.length}</div></div>
      <div class="quiz-word-display">
        <div style="font-size:12px;font-weight:900;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px">Word ${wIdx+1} of ${reg.word_builder.length}</div>
        <div style="font-size:14px;font-weight:700;color:rgba(255,255,255,.85);line-height:1.6;position:relative;z-index:1">${q.definition}</div>
      </div>
      <div style="min-height:52px;background:var(--bg);border:2px dashed var(--border-heavy);border-radius:var(--rsm);padding:10px 12px;margin-bottom:12px;font-size:18px;font-weight:900;color:var(--ink-bold);letter-spacing:2px;text-align:center" id="w-answer-box">_ _ _</div>
      <div class="gram-word-btns" style="justify-content:center" id="w-letter-pool">${letters.map((l,i)=>`<button class="gram-word-btn" id="wl-${i}" onclick="tapLetter(this,'${l}')" style="min-width:40px;text-align:center;font-size:16px">${l}</button>`).join('')}</div>
      <div class="quiz-feedback" id="wfb"></div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="quiz-next" id="wcheck" onclick="checkWord('${q.word.toUpperCase()}')" style="display:flex;flex:1;background:var(--purple);border-color:var(--pus)">Check ✓</button>
        <button style="padding:10px 14px;border:2px solid var(--border-heavy);border-bottom:4px solid var(--border-heavy);border-radius:var(--rsm);font-size:12px;font-weight:900;font-family:inherit;cursor:pointer;background:var(--white);color:var(--ink-3)" onclick="clearWord()">✕ Clear</button>
      </div>
      <button class="quiz-next" id="wnxt" onclick="nextWord()" style="margin-top:8px;background:var(--purple);border-color:var(--pus)">${wIdx+1<reg.word_builder.length?'Next →':'Done! 🎉'}</button>`;

    let wBuilt = [];
    window._wBuilt = wBuilt;

    window.tapLetter = function(btn, letter){
      if(btn.disabled) return;
      btn.disabled = true;
      btn.style.opacity = '.3';
      wBuilt.push(letter);
      const box = document.getElementById('w-answer-box');
      if(box) box.textContent = wBuilt.join(' ');
    };

    window.clearWord = function(){
      wBuilt.length = 0;
      document.querySelectorAll('[id^="wl-"]').forEach(b=>{ b.disabled=false; b.style.opacity='1'; });
      const box = document.getElementById('w-answer-box'); if(box) box.textContent = '_ _ _';
      const fb = document.getElementById('wfb'); if(fb) fb.className = 'quiz-feedback';
    };
  }

  window.checkWord = function(answer){
    const built = (window._wBuilt||[]).join('');
    if(!built) return;
    const ok = built === answer;
    if(ok){ wScore++; burst(); }
    const fb = document.getElementById('wfb');
    if(fb){ fb.textContent = ok ? `✅ ${answer} — correct!` : `💡 The word is: ${answer}`; fb.className = `quiz-feedback show ${ok?'right':'wrong'}`; }
    document.querySelectorAll('[id^="wl-"]').forEach(b=>b.disabled=true);
    document.getElementById('wcheck').style.display='none';
    const pip = document.getElementById(`wpip-${wIdx}`); if(pip) pip.classList.add(ok?'right':'wrong');
    const nxt = document.getElementById('wnxt'); if(nxt) nxt.classList.add('show');
  };

  window.nextWord = function(){
    wIdx++;
    if(wIdx >= reg.word_builder.length){
      const perfect = wScore === reg.word_builder.length;
      if(perfect) burst();
      el.innerHTML = `<div class="quiz-done">
        <span class="quiz-done-icon">${perfect?'🏆':'⭐'}</span>
        <div class="quiz-done-title">${wScore}/${reg.word_builder.length} words correct!</div>
        <div class="quiz-done-sub">${perfect?'Spelling mastered! 🔤':'These words are worth drilling until they stick.'}</div>
        <button class="quiz-done-btn" onclick="renderWordBuilderPanel(window._currentReg)" style="background:var(--purple);border-color:var(--pus)">↺ Try Again</button>
      </div>`;
    } else { renderW(); }
  };

  window._currentReg = reg;
  renderW();
}

function comingSoon(label){
  return `<div class="coming-soon"><span class="coming-soon-icon">🛠️</span><div class="coming-soon-text"><strong>${label}</strong> for this lesson is coming soon.<br>The vocabulary tab is ready to use now!</div></div>`;
}

function escQ(s){ return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

/* ══════════════════════════════════════════════
   SIGN OUT
══════════════════════════════════════════════ */
async function handleSignOut(){
  if(window.EFCD_Auth?.signOut) await window.EFCD_Auth.signOut();
  else if(window.efcdSupabaseClient){ await window.efcdSupabaseClient.auth.signOut(); window.location.href='/'; }
}

/* ══════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════ */
async function boot(){
  const page = document.getElementById('page-content');
  page.innerHTML = `<div class="skeleton skel-hero"></div>`;

  try {
    if(window.efcdReady) await window.efcdReady;
    if(!window.EFCD_Auth) throw new Error('no auth');
    await window.EFCD_Auth.initAuth();
    const user = window.EFCD_Auth.getCurrentUser();

    if(!user){ renderPage(null, null, []); return; }

    // Update header
    const stats = window.EFCD_Auth.getUserStats();
    const xpEl = document.getElementById('hdr-xp');     if(xpEl) xpEl.textContent = stats?.xp || 0;
    const stEl = document.getElementById('hdr-streak'); if(stEl) stEl.textContent = stats?.streak || 0;
    const soBtn = document.getElementById('btn-signout'); if(soBtn) soBtn.classList.add('show');

    // Fetch lessons from Supabase, newest first, deduplicated by lesson_link
    const { data: rawLessons, error } = await window.efcdSupabaseClient
      .from('lessons')
      .select('lesson_title, lesson_link, lesson_level, badge_icon, badge_name, vocabulary, grammar, completed_at')
      .eq('user_id', user.id)
      .order('completed_at', { ascending: false });

    if(error) console.warn('[my-lessons] lessons query error:', error);

    // Fetch name directly from profiles table
    let firstName = user.email?.split('@')[0] || 'Dude';
    try {
      const { data: profile } = await window.efcdSupabaseClient
        .from('profiles')
        .select('full_name')
        .eq('id', user.id)
        .single();
      if(profile?.full_name) {
        firstName = profile.full_name.split(' ')[0];
        firstName = firstName.charAt(0).toUpperCase() + firstName.slice(1);
      }
    } catch(_) {}

    // Pass firstName through stats so renderPage can use it
    const statsWithName = { ...(stats || {}), full_name: firstName };

    // Deduplicate — keep most recent completion per lesson_link
    const seen = new Set();
    const lessons = (rawLessons || []).filter(l => {
      if(seen.has(l.lesson_link)) return false;
      seen.add(l.lesson_link);
      return true;
    });

    _lessons = lessons;
    renderPage(user, statsWithName, lessons);

  } catch(e) {
    console.warn('[my-lessons] boot error:', e);
    // If we have a user but something else failed, still show their page
    const user = window.EFCD_Auth?.getCurrentUser?.();
    const stats = window.EFCD_Auth?.getUserStats?.();
    if(user) {
      renderPage(user, stats, []);
    } else {
      renderPage(null, null, []);
    }
  }
}

document.addEventListener('DOMContentLoaded', boot);
</script>

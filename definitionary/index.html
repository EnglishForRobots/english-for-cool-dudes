<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <link rel="icon" type="image/png" href="/favicon.png" sizes="32x32">
    <title>📚 Definitionary — English For Cool Dudes</title>
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
    :root {
        --orange:#FF9600; --orange-shadow:#E07800; --orange-light:rgba(255,150,0,.1);
        --blue:#1CB0F6;   --blue-shadow:#1899D6;
        --green:#58CC02;  --green-shadow:#58A700;
        --yellow:#FFC800; --yellow-shadow:#E5B400;
        --punch:#FF4B4B;  --punch-shadow:#EA2B2B;
        --purple:#CE82FF; --purple-shadow:#A559D9;
        --teal:#2BDECC;   --teal-shadow:#1FBFAF;
        --bg:#F7F9FA;     --white:#FFFFFF;
        --ink:#4B4B4B;    --ink-bold:#111827; --ink-3:#AFAFAF;
        --border:#E5E5E5; --border-heavy:#CECECE;
        --r:24px; --rsm:16px; --rxs:10px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-text-size-adjust:100%;scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--ink);font-family:'Nunito',system-ui,sans-serif;line-height:1.5;overflow-x:hidden;padding-bottom:40px;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;}
    a{color:inherit;text-decoration:none;}
    button{font-family:inherit;cursor:pointer;border:none;background:none;}

    @keyframes up       {from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes popin    {0%{opacity:0;transform:scale(.7) rotate(-4deg)}60%{transform:scale(1.08) rotate(1deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
    @keyframes shake    {0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
    @keyframes heartbeat{0%,100%{transform:scale(1)}14%{transform:scale(1.18)}28%{transform:scale(1)}42%{transform:scale(1.1)}}
    @keyframes confetti {0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(140px) rotate(420deg)}}
    @keyframes xpPop    {0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.5)}}
    @keyframes fadeIn   {from{opacity:0}to{opacity:1}}
    @keyframes megaConf {0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(200px) rotate(540deg)}}
    @keyframes float    {0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes wiggle   {0%,100%{transform:rotate(0)}25%{transform:rotate(-6deg)}75%{transform:rotate(6deg)}}
    @keyframes slideIn  {from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes shimmer2 {0%{left:-80%}100%{left:130%}}
    @keyframes glowGold {0%,100%{box-shadow:0 0 24px rgba(255,200,0,.5),0 8px 32px rgba(0,0,0,.15)}50%{box-shadow:0 0 55px rgba(255,200,0,.9),0 8px 32px rgba(0,0,0,.2)}}
    @keyframes badgeDrop{0%{opacity:0;transform:translateY(-40px) scale(.7)}60%{transform:translateY(6px) scale(1.06)}80%{transform:translateY(-2px) scale(.98)}100%{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes bounce   {0%,100%{transform:translateY(0)}40%{transform:translateY(-14px)}60%{transform:translateY(-6px)}}
    @keyframes defReveal{0%{opacity:0;transform:scale(.95)}100%{opacity:1;transform:scale(1)}}

    /* ── HEADER ── */
    .header{background:var(--white);border-bottom:3px solid var(--orange);padding:0 20px;height:60px;position:sticky;top:0;z-index:300;display:flex;align-items:center;box-shadow:0 4px 12px rgba(255,150,0,.15);}
    .header-inner{max-width:860px;width:100%;margin:0 auto;display:flex;align-items:center;justify-content:space-between;}
    .logo-link{display:flex;align-items:center;gap:10px;}
    .logo-box{width:38px;height:38px;background:var(--yellow);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;border:2px solid var(--yellow-shadow);box-shadow:0 3px 0 var(--yellow-shadow);}
    .site-name{font-size:15px;font-weight:900;color:var(--ink-bold);letter-spacing:-.3px;}
    @media(max-width:420px){.site-name{display:none}}

    /* ── PAGE ── */
    .page{max-width:620px;margin:0 auto;padding:20px 14px 40px;display:flex;flex-direction:column;gap:14px;}

    /* ── HERO ── */
    .hero{background:var(--orange);border:2px solid var(--orange-shadow);border-bottom:6px solid var(--orange-shadow);border-radius:var(--r);padding:28px 22px 24px;position:relative;overflow:hidden;text-align:center;}
    .hero::after{content:'📚';position:absolute;bottom:-20px;right:6px;font-size:140px;opacity:.1;pointer-events:none;animation:wiggle 4s ease-in-out infinite;}
    .hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.4);border-radius:8px;padding:4px 12px;margin-bottom:10px;font-size:11px;font-weight:900;color:var(--white);text-transform:uppercase;letter-spacing:1.5px;}
    .hero-title{font-size:clamp(28px,8vw,48px);font-weight:900;color:var(--white);letter-spacing:-1.5px;line-height:1;margin-bottom:6px;text-shadow:0 3px 0 var(--orange-shadow);position:relative;z-index:1;}
    .hero-sub{font-size:14px;font-weight:700;color:rgba(255,255,255,.95);line-height:1.5;position:relative;z-index:1;}

    /* ── SETUP ── */
    .setup-card{background:var(--white);border:2px solid var(--border-heavy);border-bottom:6px solid var(--border-heavy);border-radius:var(--r);padding:22px;animation:up .4s ease both;}
    .setup-label{font-size:11px;font-weight:900;color:var(--ink-3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;display:block;}
    .chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;}
    .chip{padding:9px 14px;background:var(--white);border:2px solid var(--border-heavy);border-bottom:4px solid var(--border-heavy);border-radius:99px;font-size:13px;font-weight:900;color:var(--ink-bold);cursor:pointer;transition:all .1s;font-family:inherit;}
    .chip:active{border-bottom-width:2px;transform:translateY(2px);}
    .chip.sel-orange{background:var(--orange);color:var(--white);border-color:var(--orange-shadow);}
    .chip.sel-blue  {background:var(--blue);color:var(--white);border-color:var(--blue-shadow);}
    .chip.sel-purple{background:var(--purple);color:var(--white);border-color:var(--purple-shadow);}
    .start-btn{width:100%;padding:16px;background:var(--orange);color:var(--white);border:2px solid var(--orange-shadow);border-bottom:6px solid var(--orange-shadow);border-radius:var(--rsm);font-size:17px;font-weight:900;cursor:pointer;transition:all .1s;font-family:inherit;}
    .start-btn:active{border-bottom-width:2px;transform:translateY(3px);}

    /* ── GAME ── */
    .game-area{display:none;flex-direction:column;gap:12px;}
    .game-area.active{display:flex;}

    /* Score bar */
    .score-bar{background:var(--white);border:2px solid var(--border-heavy);border-bottom:4px solid var(--border-heavy);border-radius:var(--r);padding:12px 18px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;text-align:center;gap:8px;}
    .sb-label{font-size:10px;font-weight:900;color:var(--ink-3);text-transform:uppercase;letter-spacing:1px;}
    .sb-val{font-size:22px;font-weight:900;color:var(--orange-shadow);line-height:1.1;margin-top:2px;}

    /* Pip track */
    .pip-row{display:flex;gap:6px;background:var(--white);border:2px solid var(--border-heavy);border-radius:var(--rsm);padding:12px 18px;align-items:center;}
    .pip-label{font-size:12px;font-weight:900;color:var(--ink-3);text-transform:uppercase;letter-spacing:1px;white-space:nowrap;margin-right:4px;}
    .pip{flex:1;height:8px;border-radius:99px;background:var(--border-heavy);transition:background .3s;}
    .pip.done  {background:var(--yellow);}
    .pip.active{background:var(--orange);}

    /* Definition card */
    .def-card{background:var(--white);border:2px solid var(--border-heavy);border-bottom:6px solid var(--border-heavy);border-radius:var(--r);overflow:hidden;}
    .def-card-head{background:linear-gradient(135deg,var(--orange),#ff6600);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
    .def-card-label{font-size:12px;font-weight:900;color:rgba(255,255,255,.85);text-transform:uppercase;letter-spacing:1.5px;}
    .def-round-badge{background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.4);border-radius:99px;padding:3px 14px;font-size:12px;font-weight:900;color:var(--white);}
    .def-topic-badge{display:inline-flex;align-items:center;gap:5px;background:var(--orange-light);border:2px solid rgba(255,150,0,.3);border-radius:8px;padding:4px 12px;font-size:11px;font-weight:900;color:var(--orange-shadow);text-transform:uppercase;letter-spacing:1px;margin:14px 18px 0;}
    .def-text{font-size:clamp(18px,5vw,26px);font-weight:800;color:var(--ink-bold);line-height:1.5;padding:16px 20px 20px;text-align:center;animation:defReveal .3s ease both;}
    .attempts-row{display:flex;align-items:center;justify-content:center;gap:6px;padding:0 20px 14px;}
    .attempt-dot{width:12px;height:12px;border-radius:50%;background:var(--border-heavy);transition:background .2s;}
    .attempt-dot.used{background:var(--punch);}

    /* Options grid */
    .options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 18px 18px;}
    .opt-btn{padding:16px 12px;font-size:clamp(14px,3.5vw,17px);font-weight:900;background:var(--white);color:var(--ink-bold);border:2px solid var(--border-heavy);border-bottom:5px solid var(--border-heavy);border-radius:var(--rsm);cursor:pointer;transition:all .12s;font-family:inherit;text-align:center;line-height:1.3;min-height:60px;display:flex;align-items:center;justify-content:center;}
    .opt-btn:active{border-bottom-width:2px;transform:translateY(3px);}
    .opt-btn:hover:not(:disabled){border-color:var(--orange);color:var(--orange-shadow);}
    .opt-btn.correct{background:var(--green);color:var(--white);border-color:var(--green-shadow);animation:heartbeat .5s ease;cursor:default;}
    .opt-btn.wrong  {background:var(--punch);color:var(--white);border-color:var(--punch-shadow);animation:shake .4s;cursor:default;}
    .opt-btn.show-correct{background:rgba(88,204,2,.1);border-color:var(--green-shadow);color:var(--green-shadow);}
    .opt-btn:disabled{cursor:default;opacity:.6;}

    /* Feedback strip */
    .feedback-strip{margin:0 18px 4px;padding:12px 14px;border-radius:var(--rsm);font-size:14px;font-weight:800;border:2px solid;display:none;line-height:1.6;}
    .feedback-strip.show.right{display:block;background:rgba(88,204,2,.1);color:var(--green-shadow);border-color:rgba(88,167,0,.3);animation:up .2s ease both;}
    .feedback-strip.show.wrong{display:block;background:rgba(255,75,75,.1);color:var(--punch-shadow);border-color:rgba(255,75,75,.3);animation:up .2s ease both;}
    .feedback-strip.show.info {display:block;background:rgba(255,150,0,.08);color:var(--orange-shadow);border-color:rgba(255,150,0,.3);animation:up .2s ease both;}

    /* Next button */
    .btn-next{display:none;width:calc(100% - 36px);margin:0 18px 18px;padding:14px;background:var(--orange);color:var(--white);border:2px solid var(--orange-shadow);border-bottom:5px solid var(--orange-shadow);border-radius:var(--rsm);font-size:15px;font-weight:900;cursor:pointer;transition:all .1s;font-family:inherit;text-align:center;}
    .btn-next:active{border-bottom-width:2px;transform:translateY(3px);}
    .btn-menu-link{display:block;text-align:center;padding:6px;font-size:13px;font-weight:900;color:var(--ink-3);cursor:pointer;font-family:inherit;}

    /* Combo flash */
    .combo-flash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(36px,8vw,56px);font-weight:900;color:var(--orange);text-shadow:0 4px 0 var(--orange-shadow);pointer-events:none;z-index:9997;animation:popin .5s ease both;}

    /* ── RESULT OVERLAY ── */
    .result-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;justify-content:center;align-items:center;z-index:500;padding:20px;overflow-y:auto;}
    .result-overlay.show{display:flex;animation:fadeIn .25s ease both;}
    .result-card{background:var(--white);border:3px solid var(--orange);border-bottom:8px solid var(--orange-shadow);border-radius:var(--r);padding:32px 24px;max-width:440px;width:100%;text-align:center;margin:auto;box-shadow:0 0 40px rgba(255,150,0,.2);}
    .rc-badge{width:130px;height:130px;border-radius:50%;background:linear-gradient(145deg,#fff8ee,#ffe8c5,#fff8ee);border:5px solid var(--yellow-shadow);display:flex;align-items:center;justify-content:center;font-size:72px;margin:0 auto 16px;animation:badgeDrop .8s cubic-bezier(.175,.885,.32,1.275) both,glowGold 2.5s ease-in-out infinite .9s;box-shadow:0 0 30px rgba(255,200,0,.5),0 8px 32px rgba(0,0,0,.15);position:relative;overflow:hidden;}
    .rc-badge::before{content:'';position:absolute;top:-10%;left:-80%;width:50%;height:120%;background:linear-gradient(to right,transparent,rgba(255,255,255,.75),transparent);transform:skewX(-20deg);animation:shimmer2 2s ease-in-out infinite;animation-delay:.8s;}
    .rc-title{font-size:26px;font-weight:900;color:var(--orange-shadow);letter-spacing:-1px;margin-bottom:4px;}
    .rc-sub{font-size:14px;font-weight:700;color:var(--ink-3);margin-bottom:16px;}
    .rc-xp{background:var(--orange);border:2px solid var(--orange-shadow);border-bottom:6px solid var(--orange-shadow);border-radius:var(--r);padding:16px;margin-bottom:14px;}
    .rc-xp-num{font-size:48px;font-weight:900;color:var(--white);line-height:1;}
    .rc-xp-label{font-size:11px;font-weight:900;color:rgba(255,255,255,.9);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
    .rc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
    .rc-stat{background:var(--orange-light);border:2px solid rgba(255,150,0,.25);border-radius:var(--rsm);padding:12px 8px;}
    .rc-stat-n{font-size:22px;font-weight:900;color:var(--orange-shadow);}
    .rc-stat-l{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-3);margin-top:2px;}
    .rc-btns{display:flex;flex-direction:column;gap:10px;}
    .rc-btn{width:100%;padding:14px;border-radius:var(--rsm);font-size:15px;font-weight:900;font-family:inherit;cursor:pointer;border:2px solid;border-bottom:5px solid;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;}
    .rc-btn:active{border-bottom-width:2px;transform:translateY(3px);}
    .rc-btn.primary  {background:var(--orange);color:var(--white);border-color:var(--orange-shadow);}
    .rc-btn.secondary{background:var(--white);color:var(--orange-shadow);border-color:var(--orange);}

    /* ── BADGES + CONFETTI ── */
    .badge-wrap{position:fixed;top:68px;right:12px;display:flex;flex-direction:column;gap:8px;z-index:999;pointer-events:none;}
    .badge{background:var(--white);border:2px solid var(--border-heavy);border-bottom:4px solid var(--border-heavy);border-left:4px solid var(--orange);padding:10px 14px;border-radius:var(--rsm);display:flex;align-items:center;gap:8px;transform:translateX(240px);opacity:0;transition:transform .4s,opacity .4s;box-shadow:0 4px 14px rgba(0,0,0,.08);}
    .badge.show{transform:translateX(0);opacity:1;}
    .badge-icon{font-size:22px;}
    .badge-text{font-size:13px;font-weight:900;color:var(--ink-bold);}
    .confetti-dot{position:fixed;width:10px;height:10px;border-radius:3px;pointer-events:none;z-index:9999;animation:confetti .9s ease-out both;}
    .xp-float{position:fixed;font-size:20px;font-weight:900;color:var(--yellow-shadow);text-shadow:0 2px 0 rgba(0,0,0,.12);pointer-events:none;z-index:9998;animation:xpPop .85s ease-out forwards;}
    .mega-conf-dot{position:fixed;pointer-events:none;z-index:9999;border-radius:4px;animation:megaConf 1.4s ease-out both;}
    </style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <a href="/breakroom/" class="logo-link">
            <div class="logo-box">😎</div>
            <span class="site-name">English For Cool Dudes</span>
        </a>
    </div>
</header>

<div class="badge-wrap" id="badge-wrap"></div>

<div class="result-overlay" id="result-overlay">
    <div class="result-card">
        <div class="rc-badge">📚</div>
        <div class="rc-title" id="rc-title">Brilliant!</div>
        <div class="rc-sub" id="rc-sub">You know your words!</div>
        <div class="rc-xp">
            <div class="rc-xp-num" id="rc-xp">+0</div>
            <div class="rc-xp-label">⚡ XP Earned</div>
        </div>
        <div class="rc-stats">
            <div class="rc-stat"><div class="rc-stat-n" id="rc-score">0</div><div class="rc-stat-l">Correct</div></div>
            <div class="rc-stat"><div class="rc-stat-n" id="rc-first">0</div><div class="rc-stat-l">First Try</div></div>
            <div class="rc-stat"><div class="rc-stat-n" id="rc-combo">0</div><div class="rc-stat-l">Best Combo</div></div>
        </div>
        <div class="rc-btns">
            <button class="rc-btn primary" onclick="playAgainSame()">🔄 Play Again</button>
            <button class="rc-btn secondary" onclick="backToSetup()">⚙️ Change Settings</button>
        </div>
    </div>
</div>

<div class="page">
    <div class="hero u1">
        <div class="hero-badge">📚 Break Room Game</div>
        <div class="hero-title">Definitionary!</div>
        <div class="hero-sub">Read the definition · pick the right word · don't get fooled!</div>
    </div>

    <!-- SETUP -->
    <div class="setup-card" id="setup-card">
        <span class="setup-label">Topic</span>
        <div class="chip-row" id="topic-chips"></div>
        <span class="setup-label">Level</span>
        <div class="chip-row" id="level-chips"></div>
        <span class="setup-label">Rounds</span>
        <div class="chip-row" id="rounds-chips"></div>
        <button class="start-btn" onclick="startGame()">📚 Start Definitionary!</button>
    </div>

    <!-- GAME -->
    <div class="game-area" id="game-area">
        <div class="score-bar">
            <div><div class="sb-label">Round</div><div class="sb-val" id="sb-round">1</div></div>
            <div><div class="sb-label">Score</div><div class="sb-val" id="sb-score">0</div></div>
            <div><div class="sb-label">Combo</div><div class="sb-val" id="sb-combo">0</div></div>
            <div><div class="sb-label">XP</div><div class="sb-val" id="sb-xp">0</div></div>
        </div>

        <div class="pip-row">
            <span class="pip-label">Progress</span>
            <div id="pip-track" style="display:flex;flex:1;gap:5px;"></div>
        </div>

        <div class="def-card">
            <div class="def-card-head">
                <div class="def-card-label">📖 What word means…</div>
                <div class="def-round-badge" id="round-badge">1 / 10</div>
            </div>
            <div class="def-topic-badge" id="topic-badge">📈 Business</div>
            <div class="def-text" id="def-text">—</div>
            <div class="attempts-row" id="attempts-row"></div>
            <div class="options-grid" id="options-grid"></div>
            <div class="feedback-strip" id="feedback-strip"></div>
            <button class="btn-next" id="btn-next" onclick="nextRound()">Next →</button>
        </div>

        <button class="btn-menu-link" onclick="backToSetup()">⚙️ Menu</button>
    </div>
</div>

<script>
'use strict';

/* ══════ VOCABULARY ══════ */
const VOCAB = {
    business:{
        beginner:[
            {w:"Boss",m:"Your manager — the person in charge"},{w:"Salary",m:"Fixed monthly pay from an employer"},
            {w:"Invoice",m:"A document requesting payment for goods or services"},{w:"Budget",m:"A plan for how money will be spent"},
            {w:"Client",m:"A person or company that buys services"},{w:"Profit",m:"Money left after all costs are paid"},
            {w:"Meeting",m:"When people gather to discuss something"},{w:"Deadline",m:"The final date something must be done by"},
            {w:"Contract",m:"A legally binding agreement between two parties"},{w:"Receipt",m:"Proof that a payment has been made"},
            {w:"Bonus",m:"Extra pay on top of a regular salary"},{w:"Sales",m:"The act of selling goods or services"},
            {w:"Market",m:"The place or system where goods are bought and sold"},{w:"Cost",m:"The amount of money needed to buy something"},
            {w:"Goal",m:"A target or aim you are working towards"},{w:"Risk",m:"The possibility that something bad might happen"},
            {w:"Brand",m:"The name and image of a company or product"},{w:"Stock",m:"Goods a shop or company has ready to sell"},
            {w:"Debt",m:"Money that you owe to someone else"},{w:"Income",m:"Money received regularly from work or investments"},
        ],
        intermediate:[
            {w:"Agenda",m:"A list of items to be discussed at a meeting"},{w:"Merger",m:"When two separate companies join together as one"},
            {w:"Revenue",m:"The total amount of money a business earns"},{w:"Stakeholder",m:"Anyone with an interest in a company's success or failure"},
            {w:"Equity",m:"The value of ownership in a company after debts are paid"},{w:"Turnover",m:"The total value of sales made in a period"},
            {w:"Strategy",m:"A long-term plan for achieving a major goal"},{w:"Marketing",m:"The activity of promoting and selling products"},
            {w:"Forecast",m:"A prediction about future events based on data"},{w:"Competitor",m:"A company selling similar products in the same market"},
            {w:"Outsource",m:"To hire an external company to do work"},{w:"Startup",m:"A newly created business in its early stages"},

/* ══════ CONFIG ══════ */
const TOPICS = [
    {id:'business', label:'📈 Business'},
    {id:'tax',      label:'📊 Tax'},
    {id:'legal',    label:'⚖️ Legal'},
    {id:'travel',   label:'✈️ Travel'},
    {id:'workplace',label:'💼 Workplace'},
    {id:'geography',label:'🌍 Geography'},
];
const LEVELS=[
    {id:'beginner',    label:'🌱 Beginner'},
    {id:'intermediate',label:'📘 Intermediate'},
    {id:'advanced',    label:'🔴 Advanced'},
];
const ROUND_OPTS=[{id:8,label:'8 rounds'},{id:10,label:'10 rounds'},{id:15,label:'15 rounds'}];

/* ══════ STATE ══════ */
const G = {
    topic:'business', level:'beginner', totalRounds:10,
    round:0, score:0, xp:0, combo:0, bestCombo:0, firstTryCount:0,
    deck:[], current:null, attempts:0, processing:false,
};

/* ══════ SETUP UI ══════ */
function buildSetup(){
    buildChips('topic-chips', TOPICS, 'topic', 'sel-orange', G.topic);
    buildChips('level-chips', LEVELS, 'level', 'sel-blue', G.level);
    buildRoundChips();
}
function buildChips(cid, items, key, selClass, def){
    const c=document.getElementById(cid); c.innerHTML='';
    items.forEach(item=>{
        const btn=document.createElement('button');
        btn.className='chip'+(item.id===def?' '+selClass:'');
        btn.dataset.val=item.id; btn.textContent=item.label;
        btn.onclick=()=>{ c.querySelectorAll('.chip').forEach(b=>b.className='chip'); btn.className='chip '+selClass; G[key]=item.id; };
        c.appendChild(btn);
    });
}
function buildRoundChips(){
    const c=document.getElementById('rounds-chips'); c.innerHTML='';
    ROUND_OPTS.forEach(item=>{
        const btn=document.createElement('button');
        btn.className='chip'+(item.id===G.totalRounds?' sel-purple':'');
        btn.textContent=item.label;
        btn.onclick=()=>{ c.querySelectorAll('.chip').forEach(b=>b.className='chip'); btn.className='chip sel-purple'; G.totalRounds=item.id; };
        c.appendChild(btn);
    });
}

/* ══════ GAME START ══════ */
function startGame(){
    G.round=0; G.score=0; G.xp=0; G.combo=0; G.bestCombo=0; G.firstTryCount=0;
    const pool=[...VOCAB[G.topic][G.level]];
    for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
    G.deck=pool.slice(0,G.totalRounds);

    document.getElementById('setup-card').style.display='none';
    document.getElementById('game-area').classList.add('active');

    // Build pips
    const pt=document.getElementById('pip-track');
    pt.innerHTML=G.deck.map((_,i)=>`<div class="pip active" id="pip-${i}"></div>`).join('');

    loadRound();
}

function loadRound(){
    if(G.round>=G.deck.length){ finishGame(); return; }
    G.current=G.deck[G.round];
    G.attempts=0; G.processing=false;

    // Update header bits
    document.getElementById('sb-round').textContent=G.round+1;
    document.getElementById('round-badge').textContent=`${G.round+1} / ${G.totalRounds}`;
    const topic=TOPICS.find(t=>t.id===G.topic);
    document.getElementById('topic-badge').textContent=topic?topic.label:'📚';

    // Definition — animate it in
    const dt=document.getElementById('def-text');
    dt.style.animation='none'; void dt.offsetWidth;
    dt.style.animation='defReveal .3s ease both';
    dt.textContent=G.current.m;

    // Attempt dots (2 attempts before reveal)
    const ar=document.getElementById('attempts-row');
    ar.innerHTML='<div class="attempt-dot" id="dot-0"></div><div class="attempt-dot" id="dot-1"></div>';

    // Reset feedback & next button
    const fs=document.getElementById('feedback-strip'); fs.className='feedback-strip';
    document.getElementById('btn-next').style.display='none';

    // Build 4 options — 1 correct + 3 distractors
    buildOptions();
    updateScoreBar();
}

function buildOptions(){
    const pool=VOCAB[G.topic][G.level];
    // Distractors: other words from pool, prioritise ones with similar-length definitions
    const distractors=pool.filter(p=>p.w!==G.current.w)
        .sort(()=>Math.random()-.5)
        .slice(0,3);
    const opts=[G.current,...distractors].sort(()=>Math.random()-.5);

    const grid=document.getElementById('options-grid');
    grid.innerHTML='';
    opts.forEach(opt=>{
        const btn=document.createElement('button');
        btn.className='opt-btn';
        btn.textContent=opt.w;
        btn.onclick=()=>pickAnswer(btn, opt.w);
        grid.appendChild(btn);
    });
}

/* ══════ ANSWER LOGIC ══════ */
function pickAnswer(btn, word){
    if(G.processing) return;
    const correct = word===G.current.w;
    const fs=document.getElementById('feedback-strip');

    if(correct){
        G.processing=true;
        btn.classList.add('correct');
        // Disable all buttons
        document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);

        G.score++;
        if(G.attempts===0) G.firstTryCount++;
        const pts = G.attempts===0 ? 15 : 8;
        G.xp+=pts;
        G.combo++;
        G.bestCombo=Math.max(G.bestCombo,G.combo);

        confettiBurstAt(btn);
        xpFloatFrom(btn, pts);

        if(G.combo===3){toast('🔥','3 in a row!'); comboFlash('📚 3!!');}
        if(G.combo===5){toast('⚡','5 combo — on fire!'); comboFlash('⚡ 5!!');}
        if(G.combo>5) comboFlash('📚 '+G.combo+'!!');

        fs.className='feedback-strip show right';
        fs.innerHTML=`✅ <strong>${G.current.w}</strong> — ${G.current.m}`;

        // Pip done
        const pip=document.getElementById('pip-'+G.round);
        if(pip){pip.classList.remove('active');pip.classList.add('done');}

        updateScoreBar();
        setTimeout(()=>{ G.round++; loadRound(); }, 1600);

    } else {
        // WRONG
        btn.classList.add('wrong');
        btn.disabled=true;
        G.combo=0;
        G.attempts++;

        // Mark attempt dot
        const dot=document.getElementById('dot-'+(G.attempts-1));
        if(dot) dot.classList.add('used');

        updateScoreBar();

        setTimeout(()=>btn.classList.remove('wrong'), 450);

        if(G.attempts>=2){
            // 2 wrong — reveal answer and move on
            G.processing=true;
            document.querySelectorAll('.opt-btn').forEach(b=>{
                b.disabled=true;
                if(b.textContent===G.current.w) b.classList.add('show-correct');
            });
            fs.className='feedback-strip show info';
            fs.innerHTML=`💡 The answer was <strong>${G.current.w}</strong> — ${G.current.m}`;
            const pip=document.getElementById('pip-'+G.round);
            if(pip){pip.classList.remove('active');}
            document.getElementById('btn-next').style.display='block';
        } else {
            fs.className='feedback-strip show wrong';
            fs.textContent='❌ Not quite — try again!';
        }
    }
}

function nextRound(){
    G.round++;
    loadRound();
}

/* ══════ FINISH ══════ */
function finishGame(){
    megaConfettiBurst();
    const perfect=G.score===G.totalRounds;
    document.getElementById('rc-title').textContent = perfect ? '🏆 Perfect Score!' : '📚 Well done!';
    document.getElementById('rc-sub').textContent = perfect
        ? `${G.totalRounds}/${G.totalRounds} — you know every word!`
        : `${G.score}/${G.totalRounds} correct — great effort!`;
    document.getElementById('rc-xp').textContent='+'+G.xp;
    document.getElementById('rc-score').textContent=G.score;
    document.getElementById('rc-first').textContent=G.firstTryCount;
    document.getElementById('rc-combo').textContent=G.bestCombo;
    document.getElementById('result-overlay').classList.add('show');
}

function playAgainSame(){
    document.getElementById('result-overlay').classList.remove('show');
    startGame();
}
function backToSetup(){
    document.getElementById('result-overlay').classList.remove('show');
    document.getElementById('game-area').classList.remove('active');
    document.getElementById('setup-card').style.display='block';
}

/* ══════ SCORE BAR ══════ */
function updateScoreBar(){
    document.getElementById('sb-round').textContent=G.round+1;
    document.getElementById('sb-score').textContent=G.score;
    document.getElementById('sb-combo').textContent=G.combo;
    document.getElementById('sb-xp').textContent=G.xp;
}

/* ══════ EFFECTS ══════ */
function confettiBurstAt(el){
    const r=el.getBoundingClientRect();
    const x=r.left+r.width/2, y=r.top;
    const colors=['#FF9600','#FFC800','#58CC02','#1CB0F6','#FF4B4B','#CE82FF'];
    for(let i=0;i<16;i++){
        const d=document.createElement('div'); d.className='confetti-dot';
        d.style.cssText=`left:${x+Math.random()*60-30}px;top:${y+Math.random()*20}px;background:${colors[i%colors.length]};animation-delay:${Math.random()*.2}s;animation-duration:${.6+Math.random()*.4}s;transform:rotate(${Math.random()*360}deg)`;
        document.body.appendChild(d); setTimeout(()=>d.remove(),1000);
    }
}
function xpFloatFrom(el, pts){
    const r=el.getBoundingClientRect();
    const xpEl=document.createElement('div'); xpEl.className='xp-float';
    xpEl.textContent=`+${pts} XP`;
    xpEl.style.cssText=`left:${r.left+r.width/2-24}px;top:${r.top-10}px`;
    document.body.appendChild(xpEl); setTimeout(()=>xpEl.remove(),900);
}
function megaConfettiBurst(){
    const colors=['#FF9600','#FFC800','#58CC02','#1CB0F6','#CE82FF','#FF4B4B'];
    for(let i=0;i<60;i++){
        const d=document.createElement('div'); d.className='mega-conf-dot';
        const sz=8+Math.random()*12;
        d.style.cssText=`left:${Math.random()*100}vw;top:${-10+Math.random()*20}px;width:${sz}px;height:${sz}px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-delay:${Math.random()*.8}s;animation-duration:${1+Math.random()*.8}s;border-radius:${Math.random()>.5?'50%':'3px'};transform:rotate(${Math.random()*360}deg)`;
        document.body.appendChild(d); setTimeout(()=>d.remove(),2200);
    }
}
function comboFlash(msg){
    const el=document.createElement('div'); el.className='combo-flash'; el.textContent=msg;
    document.body.appendChild(el); setTimeout(()=>el.remove(),800);
}
function toast(icon,text){
    const wrap=document.getElementById('badge-wrap');
    const b=document.createElement('div'); b.className='badge';
    b.innerHTML=`<span class="badge-icon">${icon}</span><span class="badge-text">${text}</span>`;
    wrap.appendChild(b);
    setTimeout(()=>b.classList.add('show'),50);
    setTimeout(()=>{ b.classList.remove('show'); setTimeout(()=>b.remove(),500); },3500);
}

/* ══════ INIT ══════ */
buildSetup();

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <link rel="icon" type="image/png" href="/favicon.png" sizes="32x32">
    <title>🤔 What Am I? — English For Cool Dudes</title>
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
    :root {
        --orange:#FF9600; --orange-shadow:#E07800; --orange-light:rgba(255,150,0,.1);
        --blue:#1CB0F6;   --blue-shadow:#1899D6;
        --green:#58CC02;  --green-shadow:#58A700;
        --punch:#FF4B4B;  --punch-shadow:#EA2B2B;
        --yellow:#FFC800; --yellow-shadow:#E5B400;
        --purple:#CE82FF; --purple-shadow:#A559D9;
        --teal:#2BDECC;   --teal-shadow:#1FBFAF;
        --bg:#F7F9FA;     --white:#FFFFFF;
        --ink:#4B4B4B;    --ink-bold:#111827; --ink-3:#AFAFAF;
        --border:#E5E5E5; --border-heavy:#CECECE;
        --r:24px; --rsm:16px; --rxs:10px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-text-size-adjust:100%;scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--ink);font-family:'Nunito',system-ui,sans-serif;line-height:1.5;overflow-x:hidden;padding-bottom:40px;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;}
    a{color:inherit;text-decoration:none;}
    button{font-family:inherit;cursor:pointer;border:none;background:none;}

    @keyframes up      {from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes popin   {0%{opacity:0;transform:scale(.7) rotate(-4deg)}60%{transform:scale(1.08) rotate(1deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
    @keyframes float   {0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes shake   {0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
    @keyframes heartbeat{0%,100%{transform:scale(1)}14%{transform:scale(1.18)}28%{transform:scale(1)}42%{transform:scale(1.1)}}
    @keyframes confetti{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(140px) rotate(420deg)}}
    @keyframes xpPop   {0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.5)}}
    @keyframes fadeIn  {from{opacity:0}to{opacity:1}}
    @keyframes megaConf{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(200px) rotate(540deg)}}
    @keyframes clueIn  {0%{opacity:0;transform:translateX(-20px)}100%{opacity:1;transform:translateX(0)}}
    @keyframes lockPop {0%{transform:scale(.6)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
    @keyframes shimmer {0%{left:-80%}100%{left:130%}}
    @keyframes bounce  {0%,100%{transform:translateY(0)}40%{transform:translateY(-14px)}60%{transform:translateY(-6px)}}
    @keyframes wiggle  {0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}
    @keyframes timerPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

    /* ── HEADER ── */
    .header{background:var(--white);border-bottom:3px solid var(--orange);padding:0 20px;height:60px;position:sticky;top:0;z-index:300;display:flex;align-items:center;box-shadow:0 4px 12px rgba(255,150,0,.15);}
    .header-inner{max-width:860px;width:100%;margin:0 auto;display:flex;align-items:center;justify-content:space-between;}
    .logo-link{display:flex;align-items:center;gap:10px;text-decoration:none;}
    .logo-box{width:38px;height:38px;background:var(--yellow);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;border:2px solid var(--yellow-shadow);box-shadow:0 3px 0 var(--yellow-shadow);}
    .site-name{font-size:15px;font-weight:900;color:var(--ink-bold);letter-spacing:-.3px;}
    @media(max-width:420px){.site-name{display:none}}

    /* ── PAGE ── */
    .page{max-width:600px;margin:0 auto;padding:20px 14px 40px;display:flex;flex-direction:column;gap:14px;}

    /* ── HERO BANNER ── */
    .hero{background:var(--orange);border:2px solid var(--orange-shadow);border-bottom:6px solid var(--orange-shadow);border-radius:var(--r);padding:28px 22px 24px;position:relative;overflow:hidden;text-align:center;}
    .hero::after{content:'🤔';position:absolute;bottom:-20px;right:6px;font-size:140px;opacity:.1;pointer-events:none;animation:wiggle 4s ease-in-out infinite;}
    .hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.4);border-radius:8px;padding:4px 12px;margin-bottom:10px;font-size:11px;font-weight:900;color:var(--white);text-transform:uppercase;letter-spacing:1.5px;}
    .hero-title{font-size:clamp(28px,8vw,48px);font-weight:900;color:var(--white);letter-spacing:-1.5px;line-height:1;margin-bottom:6px;text-shadow:0 3px 0 var(--orange-shadow);position:relative;z-index:1;}
    .hero-sub{font-size:14px;font-weight:700;color:rgba(255,255,255,.9);line-height:1.5;position:relative;z-index:1;}

    /* ── SETUP CARD ── */
    .setup-card{background:var(--white);border:2px solid var(--border-heavy);border-bottom:6px solid var(--border-heavy);border-radius:var(--r);padding:22px;animation:up .4s ease both;}
    .setup-section{margin-bottom:18px;}
    .setup-label{font-size:11px;font-weight:900;color:var(--ink-3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;display:block;}
    .cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
    .cat-btn{padding:10px 6px;background:var(--white);border:2px solid var(--border-heavy);border-bottom:4px solid var(--border-heavy);border-radius:var(--rsm);font-size:12px;font-weight:900;color:var(--ink-bold);cursor:pointer;transition:all .1s;text-align:center;line-height:1.3;font-family:inherit;}
    .cat-btn:active{border-bottom-width:2px;transform:translateY(2px);}
    .cat-btn.selected{background:var(--orange);color:var(--white);border-color:var(--orange-shadow);}
    .level-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
    .level-btn{padding:12px 8px;background:var(--white);border:2px solid var(--border-heavy);border-bottom:4px solid var(--border-heavy);border-radius:var(--rsm);font-size:13px;font-weight:900;color:var(--ink-bold);cursor:pointer;transition:all .1s;text-align:center;font-family:inherit;}
    .level-btn:active{border-bottom-width:2px;transform:translateY(2px);}
    .level-btn.selected{border-color:var(--orange-shadow);}
    .level-btn.sel-beginner{background:#f0fff4;color:var(--green-shadow);border-color:var(--green-shadow);}
    .level-btn.sel-intermediate{background:#eff6ff;color:var(--blue-shadow);border-color:var(--blue-shadow);}
    .level-btn.sel-advanced{background:#fdf4ff;color:var(--purple-shadow);border-color:var(--purple-shadow);}
    .mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .mode-btn{padding:14px;background:var(--white);border:2px solid var(--border-heavy);border-bottom:4px solid var(--border-heavy);border-radius:var(--rsm);font-size:14px;font-weight:900;color:var(--ink-bold);cursor:pointer;transition:all .1s;text-align:center;font-family:inherit;}
    .mode-btn:active{border-bottom-width:2px;transform:translateY(2px);}
    .mode-btn.selected{background:var(--orange);color:var(--white);border-color:var(--orange-shadow);}
    .player-setup{margin-top:12px;padding:14px;background:var(--bg);border:2px solid var(--border-heavy);border-radius:var(--rsm);display:none;}
    .player-setup.show{display:block;animation:up .25s ease both;}
    .player-input-row{display:flex;gap:8px;margin-bottom:10px;}
    .player-input{flex:1;padding:11px 14px;border:2px solid var(--border-heavy);border-radius:var(--rsm);font-size:14px;font-weight:700;font-family:inherit;background:var(--white);}
    .player-input:focus{outline:none;border-color:var(--orange);}
    .add-player-btn{padding:11px 16px;background:var(--orange);color:var(--white);border:2px solid var(--orange-shadow);border-bottom:4px solid var(--orange-shadow);border-radius:var(--rsm);font-size:14px;font-weight:900;font-family:inherit;cursor:pointer;white-space:nowrap;transition:all .1s;}
    .add-player-btn:active{border-bottom-width:2px;transform:translateY(2px);}
    .player-chips{display:flex;flex-wrap:wrap;gap:6px;}
    .player-chip{display:inline-flex;align-items:center;gap:6px;background:var(--orange);color:var(--white);padding:6px 12px;border-radius:99px;font-size:13px;font-weight:900;}
    .player-chip-remove{cursor:pointer;opacity:.7;font-size:16px;line-height:1;}
    .start-btn{width:100%;padding:16px;background:var(--orange);color:var(--white);border:2px solid var(--orange-shadow);border-bottom:6px solid var(--orange-shadow);border-radius:var(--rsm);font-size:17px;font-weight:900;cursor:pointer;transition:all .1s;font-family:inherit;margin-top:4px;}
    .start-btn:active{border-bottom-width:2px;transform:translateY(3px);}
    .start-btn:disabled{opacity:.45;cursor:default;}

    /* ── GAME AREA ── */
    .game-area{display:none;flex-direction:column;gap:12px;}
    .game-area.active{display:flex;}

    /* Score bar */
    .score-bar{background:var(--white);border:2px solid var(--border-heavy);border-bottom:4px solid var(--border-heavy);border-radius:var(--r);padding:14px 18px;display:grid;grid-template-columns:1fr 1fr 1fr;text-align:center;gap:8px;}
    .sb-item{}
    .sb-label{font-size:10px;font-weight:900;color:var(--ink-3);text-transform:uppercase;letter-spacing:1px;}
    .sb-val{font-size:22px;font-weight:900;color:var(--orange-shadow);line-height:1.1;margin-top:2px;}
    .sb-val.player-name{font-size:16px;}

    /* Player turn banner */
    .turn-banner{background:var(--orange);border:2px solid var(--orange-shadow);border-bottom:4px solid var(--orange-shadow);border-radius:var(--rsm);padding:10px 16px;font-size:14px;font-weight:900;color:var(--white);text-align:center;display:none;}
    .turn-banner.show{display:block;animation:up .3s ease both;}

    /* Clues card */
    .clues-card{background:var(--white);border:2px solid var(--border-heavy);border-bottom:6px solid var(--border-heavy);border-radius:var(--r);overflow:hidden;}
    .clues-card-head{background:linear-gradient(135deg,var(--orange),#ff6600);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;}
    .clues-card-title{font-size:16px;font-weight:900;color:var(--white);}
    .clues-counter{background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.4);border-radius:99px;padding:4px 12px;font-size:12px;font-weight:900;color:var(--white);}
    .clues-body{padding:16px;}

    /* Individual clue */
    .clue-item{border:2px solid var(--border-heavy);border-bottom:4px solid var(--border-heavy);border-radius:var(--rsm);margin-bottom:10px;overflow:hidden;transition:all .3s;}
    .clue-item:last-child{margin-bottom:0;}
    .clue-item.locked{background:var(--bg);opacity:.55;}
    .clue-item.revealed{animation:clueIn .35s ease both;}
    .clue-header{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:2px solid var(--border);}
    .clue-item.locked .clue-header{border-bottom:none;}
    .clue-pts{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:1px;}
    .pts-40{color:#DC2626;}
    .pts-30{color:#EA580C;}
    .pts-20{color:#CA8A04;}
    .pts-10{color:#16A34A;}
    .clue-lock-icon{margin-left:auto;font-size:18px;}
    .clue-text{padding:12px 14px;font-size:15px;font-weight:700;color:var(--ink-bold);line-height:1.6;}
    .clue-item.locked .clue-text{display:none;}

    /* Answer area */
    .answer-card{background:var(--white);border:2px solid var(--border-heavy);border-bottom:6px solid var(--border-heavy);border-radius:var(--r);padding:18px;}
    .answer-prompt{font-size:13px;font-weight:900;color:var(--ink-3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
    .answer-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
    .answer-prefix{background:var(--orange);color:var(--white);padding:12px 16px;border-radius:var(--rsm);font-size:15px;font-weight:900;flex-shrink:0;border:2px solid var(--orange-shadow);border-bottom:4px solid var(--orange-shadow);}
    .answer-input{flex:1;padding:12px 14px;border:2px solid var(--border-heavy);border-bottom:4px solid var(--border-heavy);border-radius:var(--rsm);font-size:16px;font-weight:800;font-family:inherit;color:var(--ink-bold);background:var(--bg);transition:border-color .2s;}
    .answer-input:focus{outline:none;border-color:var(--orange);background:var(--white);}
    .answer-input.shake{animation:shake .4s;}
    .action-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .btn-clue{padding:13px;background:var(--white);color:var(--ink-bold);border:2px solid var(--border-heavy);border-bottom:4px solid var(--border-heavy);border-radius:var(--rsm);font-size:14px;font-weight:900;cursor:pointer;transition:all .1s;font-family:inherit;text-align:center;}
    .btn-clue:active{border-bottom-width:2px;transform:translateY(2px);}
    .btn-clue:disabled{opacity:.4;cursor:default;}
    .btn-submit{padding:13px;background:var(--green);color:var(--white);border:2px solid var(--green-shadow);border-bottom:4px solid var(--green-shadow);border-radius:var(--rsm);font-size:14px;font-weight:900;cursor:pointer;transition:all .1s;font-family:inherit;text-align:center;}
    .btn-submit:active{border-bottom-width:2px;transform:translateY(2px);}
    .btn-menu{display:block;text-align:center;padding:10px;font-size:13px;font-weight:900;color:var(--ink-3);cursor:pointer;font-family:inherit;margin-top:4px;}

    /* ── RESULT OVERLAY ── */
    .result-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;justify-content:center;align-items:center;z-index:500;padding:20px;}
    .result-overlay.show{display:flex;animation:fadeIn .25s ease both;}
    .result-card{background:var(--white);border:3px solid var(--border-heavy);border-bottom:8px solid var(--border-heavy);border-radius:var(--r);padding:32px 24px;max-width:420px;width:100%;text-align:center;position:relative;overflow:hidden;}
    .result-icon{font-size:72px;margin-bottom:8px;display:block;animation:popin .5s cubic-bezier(.175,.885,.32,1.275) both;}
    .result-title{font-size:28px;font-weight:900;letter-spacing:-1px;margin-bottom:6px;}
    .result-msg{font-size:15px;font-weight:700;color:var(--ink-3);margin-bottom:16px;line-height:1.5;}
    .result-answer-box{background:var(--orange-light);border:2px solid rgba(255,150,0,.3);border-radius:var(--rsm);padding:14px;margin-bottom:16px;font-size:20px;font-weight:900;color:var(--orange-shadow);}
    .result-pts{background:var(--green);border:2px solid var(--green-shadow);border-bottom:6px solid var(--green-shadow);border-radius:var(--rsm);padding:16px;margin-bottom:16px;font-size:40px;font-weight:900;color:var(--white);line-height:1;}
    .result-pts-label{font-size:12px;font-weight:900;color:rgba(255,255,255,.85);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
    .result-scores{background:var(--bg);border:2px solid var(--border-heavy);border-radius:var(--rsm);padding:12px;margin-bottom:16px;text-align:left;display:none;}
    .result-score-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:14px;font-weight:800;}
    .result-score-row:last-child{border-bottom:none;}
    .result-score-name{color:var(--ink-bold);}
    .result-score-pts{color:var(--orange-shadow);}
    .result-next-btn{width:100%;padding:15px;background:var(--orange);color:var(--white);border:2px solid var(--orange-shadow);border-bottom:5px solid var(--orange-shadow);border-radius:var(--rsm);font-size:16px;font-weight:900;cursor:pointer;transition:all .1s;font-family:inherit;}
    .result-next-btn:active{border-bottom-width:2px;transform:translateY(3px);}
    .result-try-btn{width:100%;padding:13px;background:var(--white);color:var(--ink-bold);border:2px solid var(--border-heavy);border-bottom:4px solid var(--border-heavy);border-radius:var(--rsm);font-size:15px;font-weight:900;cursor:pointer;transition:all .1s;font-family:inherit;margin-top:8px;}
    .result-try-btn:active{border-bottom-width:2px;transform:translateY(2px);}

    /* ── BADGES + CONFETTI ── */
    .badge-wrap{position:fixed;top:68px;right:12px;display:flex;flex-direction:column;gap:8px;z-index:999;pointer-events:none;}
    .badge{background:var(--white);border:2px solid var(--border-heavy);border-bottom:4px solid var(--border-heavy);border-left:4px solid var(--orange);padding:10px 14px;border-radius:var(--rsm);display:flex;align-items:center;gap:8px;transform:translateX(240px);opacity:0;transition:transform .4s,opacity .4s;box-shadow:0 4px 14px rgba(0,0,0,.08);}
    .badge.show{transform:translateX(0);opacity:1;}
    .badge-icon{font-size:22px;}
    .badge-text{font-size:13px;font-weight:900;color:var(--ink-bold);}
    .confetti-dot{position:fixed;width:10px;height:10px;border-radius:3px;pointer-events:none;z-index:9999;animation:confetti .9s ease-out both;}
    .mega-conf-dot{position:fixed;pointer-events:none;z-index:9999;border-radius:4px;animation:megaConf 1.4s ease-out both;}

    /* ── LOADING ── */
    .loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.92);display:none;flex-direction:column;justify-content:center;align-items:center;z-index:600;gap:12px;}
    .loading-overlay.show{display:flex;}
    .loading-spinner{font-size:48px;animation:wiggle 1s ease-in-out infinite;}
    .loading-text{font-size:16px;font-weight:900;color:var(--ink-3);}

    /* ── WINNER ── */
    .winner-card .result-title{color:var(--yellow-shadow);}

    /* ── WRONG FLASH ── */
    .wrong-flash{background:rgba(255,75,75,.08);border-color:var(--punch);}
    </style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <a href="/breakroom/" class="logo-link">
            <div class="logo-box">😎</div>
            <span class="site-name">English For Cool Dudes</span>
        </a>
    </div>
</header>

<div class="badge-wrap" id="badge-wrap"></div>

<div class="loading-overlay" id="loading">
    <div class="loading-spinner">🤔</div>
    <div class="loading-text">Loading riddles…</div>
</div>

<div class="result-overlay" id="result-overlay">
    <div class="result-card" id="result-card">
        <span class="result-icon" id="result-icon">🎉</span>
        <div class="result-title" id="result-title">Correct!</div>
        <div class="result-msg" id="result-msg"></div>
        <div class="result-pts" id="result-pts" style="display:none">
            <div id="result-pts-num">+40</div>
            <div class="result-pts-label">Points Earned</div>
        </div>
        <div class="result-answer-box" id="result-answer" style="display:none"></div>
        <div class="result-scores" id="result-scores"></div>
        <button class="result-next-btn" id="result-next-btn" onclick="nextRound()">Next Riddle →</button>
        <button class="result-try-btn" id="result-try-btn" style="display:none" onclick="closeWrongResult()">💡 Keep Guessing</button>
    </div>
</div>

<div class="page">
    <!-- HERO -->
    <div class="hero u1">
        <div class="hero-badge">🧠 Break Room Game</div>
        <div class="hero-title">What Am I? 🤔</div>
        <div class="hero-sub">Get clues one by one · guess the mystery object · score big!</div>
    </div>

    <!-- SETUP -->
    <div class="setup-card" id="setup-card">
        <div class="setup-section">
            <span class="setup-label">Category</span>
            <div class="cat-grid" id="cat-grid"></div>
        </div>
        <div class="setup-section">
            <span class="setup-label">Level</span>
            <div class="level-grid">
                <button class="level-btn sel-beginner selected" data-level="beginner" onclick="selectLevel(this)">🌱 Beginner</button>
                <button class="level-btn" data-level="intermediate" onclick="selectLevel(this)">📘 Intermediate</button>
                <button class="level-btn" data-level="advanced" onclick="selectLevel(this)">🔴 Advanced</button>
            </div>
        </div>
        <div class="setup-section">
            <span class="setup-label">Points to Win</span>
            <div class="level-grid">
                <button class="level-btn" data-pts="50" onclick="selectPts(this)">50</button>
                <button class="level-btn selected sel-intermediate" data-pts="100" onclick="selectPts(this)">100</button>
                <button class="level-btn" data-pts="150" onclick="selectPts(this)">150</button>
            </div>
        </div>
        <div class="setup-section">
            <span class="setup-label">Game Mode</span>
            <div class="mode-grid">
                <button class="mode-btn selected" data-mode="single" onclick="selectMode(this)">👤 Solo</button>
                <button class="mode-btn" data-mode="multi" onclick="selectMode(this)">👥 Multiplayer</button>
            </div>
            <div class="player-setup" id="player-setup">
                <div class="player-input-row">
                    <input type="text" class="player-input" id="player-name-input" placeholder="Player name…" onkeypress="if(event.key==='Enter')addPlayer()">
                    <button class="add-player-btn" onclick="addPlayer()">Add</button>
                </div>
                <div class="player-chips" id="player-chips"></div>
            </div>
        </div>
        <button class="start-btn" id="start-btn" onclick="startGame()">🤔 Start Game!</button>
    </div>

    <!-- GAME AREA -->
    <div class="game-area" id="game-area">
        <div class="score-bar" id="score-bar">
            <div class="sb-item">
                <div class="sb-label">Player</div>
                <div class="sb-val player-name" id="sb-player">You</div>
            </div>

/* ══════ GAME START ══════ */
async function startGame(){
    if(G.mode==='multi' && G.players.length<2){ toast('⚠️','Add at least 2 players!'); return; }
    if(G.mode==='single') G.players=[{name:'You',score:0}];
    else G.players.forEach(p=>p.score=0);
    G.pidx=0; G.round=1; G.didx=0; G.deck=[];

    document.getElementById('loading').classList.add('show');

    let data = [];
    if(sb){
        try{
            let q = sb.from('riddles').select('*').eq('level',G.level);
            if(G.cat!=='random') q = q.eq('category',G.cat);
            const {data:d, error} = await q;
            if(!error && d?.length) data = d;
        } catch(e){}
    }

    // Merge with local riddles
    let local = LOCAL_RIDDLES.filter(r => r.level===G.level && (G.cat==='random' || r.category===G.cat));
    // Combine, deduplicate by answer
    const seen = new Set(data.map(r=>r.answer?.toLowerCase()));
    local.forEach(r=>{ if(!seen.has(r.answer?.toLowerCase())) data.push(r); });

    if(!data.length){ document.getElementById('loading').classList.remove('show'); toast('⚠️','No riddles found! Try different settings.'); return; }

    // Fisher-Yates shuffle
    for(let i=data.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [data[i],data[j]]=[data[j],data[i]]; }
    G.deck = data;

    document.getElementById('loading').classList.remove('show');
    document.getElementById('setup-card').style.display='none';
    document.getElementById('game-area').classList.add('active');

    loadRiddle();
    updateScoreBar();
}

function loadRiddle(){
    if(G.didx>=G.deck.length){
        showResult('gameover');
        return;
    }
    G.riddle = G.deck[G.didx++];
    G.clue = 1;
    document.getElementById('answer-input').value='';
    document.getElementById('answer-input').classList.remove('shake','wrong-flash');
    renderClues();
    updateClueBtn();
    updateScoreBar();
    const tb = document.getElementById('turn-banner');
    if(G.mode==='multi'){
        tb.textContent=`🎯 ${G.players[G.pidx].name}'s turn!`;
        tb.classList.add('show');
    } else { tb.classList.remove('show'); }
}

function renderClues(){
    const body = document.getElementById('clues-body');
    body.innerHTML = '';
    for(let i=1;i<=4;i++){
        const div = document.createElement('div');
        div.className = 'clue-item ' + (i===1?'revealed':'locked');
        div.id = 'clue-item-'+i;
        const hdr = document.createElement('div');
        hdr.className='clue-header';
        const lbl=document.createElement('div');
        lbl.className='clue-pts '+(i===1?'pts-40':i===2?'pts-30':i===3?'pts-20':'pts-10');
        lbl.textContent=CLUE_LABELS[i];
        hdr.appendChild(lbl);
        if(i>1){ const lock=document.createElement('span'); lock.className='clue-lock-icon'; lock.id='lock-'+i; lock.textContent='🔒'; hdr.appendChild(lock); }
        const txt=document.createElement('div');
        txt.className='clue-text';
        txt.id='clue-txt-'+i;
        txt.textContent = i===1 ? G.riddle.clue1 : '';
        div.appendChild(hdr); div.appendChild(txt);
        body.appendChild(div);
    }
    document.getElementById('clues-counter').textContent='Clue 1 of 4';
}

function nextClue(){
    if(G.clue>=4) return;
    G.clue++;
    const item=document.getElementById('clue-item-'+G.clue);
    const txt=document.getElementById('clue-txt-'+G.clue);
    const lock=document.getElementById('lock-'+G.clue);
    item.classList.remove('locked'); item.classList.add('revealed');
    txt.textContent=G.riddle['clue'+G.clue];
    if(lock) lock.style.display='none';
    document.getElementById('clues-counter').textContent=`Clue ${G.clue} of 4`;
    updateClueBtn();
}

function updateClueBtn(){
    const btn=document.getElementById('btn-clue');
    if(G.clue>=4){ btn.textContent='👁️ Reveal Answer'; btn.onclick=revealAnswer; btn.disabled=false; }
    else { btn.textContent=`💡 Next Clue (−pts)`; btn.onclick=nextClue; btn.disabled=false; }
}

function revealAnswer(){
    showResult('reveal');
}

/* ══════ ANSWER CHECKING ══════ */
function levenshtein(a,b){
    const m=[];
    for(let i=0;i<=b.length;i++) m[i]=[i];
    for(let j=0;j<=a.length;j++) m[0][j]=j;
    for(let i=1;i<=b.length;i++) for(let j=1;j<=a.length;j++){
        m[i][j]=b[i-1]===a[j-1]?m[i-1][j-1]:1+Math.min(m[i-1][j-1],m[i][j-1],m[i-1][j]);
    }
    return m[b.length][a.length];
}

function checkAnswer(){
    const raw=document.getElementById('answer-input').value.trim().toLowerCase();
    if(!raw) return;
    const correct=G.riddle.answer.toLowerCase().replace(/^(a|an|the) /,'');
    if(raw.length < correct.length*0.5){ wrongBuzz(); return; }
    const isSub = correct.includes(raw);
    const dist = levenshtein(raw,correct);
    const allowed = correct.length>8?3:correct.length>4?2:0;
    if(isSub||dist<=allowed){
        const pts=PTS[G.clue];
        G.players[G.pidx].score+=pts;
        confettiBurst();
        showResult('correct', pts);
    } else { wrongBuzz(); }
}

function wrongBuzz(){
    const inp=document.getElementById('answer-input');
    inp.classList.remove('shake');
    void inp.offsetWidth;
    inp.classList.add('shake');
    toast('❌','Not quite — keep thinking!');
}

/* ══════ RESULTS ══════ */
function showResult(type, pts=0){
    const overlay=document.getElementById('result-overlay');
    const icon=document.getElementById('result-icon');
    const title=document.getElementById('result-title');
    const msg=document.getElementById('result-msg');
    const ptsBox=document.getElementById('result-pts');
    const ptsNum=document.getElementById('result-pts-num');
    const ansBox=document.getElementById('result-answer');
    const scores=document.getElementById('result-scores');
    const nextBtn=document.getElementById('result-next-btn');
    const tryBtn=document.getElementById('result-try-btn');

    ptsBox.style.display='none'; ansBox.style.display='none';
    scores.style.display='none'; tryBtn.style.display='none';
    nextBtn.style.display='block';

    if(type==='correct'){
        icon.textContent='🎉'; title.textContent='Correct!'; title.style.color='var(--green-shadow)';
        msg.textContent=`Nice one — well done!`;
        ptsNum.textContent='+'+pts; ptsBox.style.display='block';
        ansBox.textContent='✅ I am '+G.riddle.answer; ansBox.style.display='block';
    } else if(type==='reveal'){
        icon.textContent='🔍'; title.textContent='The answer was…'; title.style.color='var(--orange-shadow)';
        msg.textContent='No points this round.';
        ansBox.textContent='💡 I am '+G.riddle.answer; ansBox.style.display='block';
    } else if(type==='gameover'){
        icon.textContent='🏆'; title.textContent='All done!'; title.style.color='var(--yellow-shadow)';
        msg.textContent="You've played every riddle in this category!";
        nextBtn.textContent='🎮 New Game'; nextBtn.onclick=backToSetup;
        overlay.classList.add('show'); return;
    }

    // Check winner
    const winner = G.players.find(p=>p.score>=G.target);
    if(winner && (type==='correct')){
        icon.textContent='🏆'; title.textContent='Winner!'; title.style.color='var(--yellow-shadow)';
        msg.textContent=`${winner.name} wins with ${winner.score} points! 🎉`;
        nextBtn.textContent='🎮 New Game'; nextBtn.onclick=backToSetup;
        megaConfettiBurst();
    }

    // Multiplayer scores
    if(G.mode==='multi' && G.players.length>1){
        scores.style.display='block';
        scores.innerHTML=G.players.map(p=>`<div class="result-score-row"><span class="result-score-name">${p.name}</span><span class="result-score-pts">${p.score} pts</span></div>`).join('');
    }

    overlay.classList.add('show');
}

function nextRound(){
    document.getElementById('result-overlay').classList.remove('show');
    document.getElementById('result-next-btn').textContent='Next Riddle →';
    document.getElementById('result-next-btn').onclick=nextRound;
    const winner=G.players.find(p=>p.score>=G.target);
    if(winner) return;
    if(G.mode==='multi'){
        G.pidx=(G.pidx+1)%G.players.length;
        if(G.pidx===0) G.round++;
    } else { G.round++; }
    loadRiddle();
}

function closeWrongResult(){
    document.getElementById('result-overlay').classList.remove('show');
}

/* ══════ SCORE BAR ══════ */
function updateScoreBar(){
    const p=G.players[G.pidx]||{name:'You',score:0};
    document.getElementById('sb-player').textContent=p.name;
    document.getElementById('sb-round').textContent=G.round;
    document.getElementById('sb-score').textContent=p.score;
    document.getElementById('sb-target').textContent=G.target;
}

/* ══════ BACK TO SETUP ══════ */
function backToSetup(){
    document.getElementById('result-overlay').classList.remove('show');
    document.getElementById('game-area').classList.remove('active');
    document.getElementById('setup-card').style.display='block';
    G.players=[];
    renderChips();
    document.getElementById('player-setup').classList.remove('show');
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('selected'));
    document.querySelector('.mode-btn[data-mode="single"]').classList.add('selected');
    G.mode='single';
}

/* ══════ CONFETTI ══════ */
function confettiBurst(){
    const colors=['#FF9600','#FFC800','#58CC02','#1CB0F6','#CE82FF','#FF4B4B'];
    for(let i=0;i<24;i++){
        const d=document.createElement('div'); d.className='confetti-dot';
        d.style.cssText=`left:${20+Math.random()*60}%;top:${20+Math.random()*30}%;background:${colors[i%colors.length]};animation-delay:${Math.random()*.3}s;animation-duration:${.7+Math.random()*.5}s;transform:rotate(${Math.random()*360}deg);z-index:9999;position:fixed;width:10px;height:10px;border-radius:3px;pointer-events:none;animation-name:confetti;`;
        document.body.appendChild(d); setTimeout(()=>d.remove(),1200);
    }
}
function megaConfettiBurst(){
    const colors=['#FF9600','#FFC800','#58CC02','#1CB0F6','#CE82FF','#FF4B4B'];
    for(let i=0;i<60;i++){
        const d=document.createElement('div'); d.className='mega-conf-dot';
        const sz=8+Math.random()*12;
        d.style.cssText=`left:${Math.random()*100}vw;top:${-10+Math.random()*20}px;width:${sz}px;height:${sz}px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-delay:${Math.random()*.8}s;animation-duration:${1+Math.random()*.8}s;border-radius:${Math.random()>.5?'50%':'3px'};transform:rotate(${Math.random()*360}deg)`;
        document.body.appendChild(d); setTimeout(()=>d.remove(),2200);
    }
}

/* ══════ TOAST ══════ */
function toast(icon,text){
    const wrap=document.getElementById('badge-wrap');
    const b=document.createElement('div'); b.className='badge';
    b.innerHTML=`<span class="badge-icon">${icon}</span><span class="badge-text">${text}</span>`;
    wrap.appendChild(b);
    setTimeout(()=>b.classList.add('show'),50);
    setTimeout(()=>{ b.classList.remove('show'); setTimeout(()=>b.remove(),500); },3500);
}
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>😎 Review Game — EFCD</title>
<link rel="preconnect" href="https://fonts.bunny.net">
<link href="https://fonts.bunny.net/css2?family=Nunito:ital,wght@0,400;0,700;0,800;0,900;1,900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/lesson-data-registry.js"></script>
<style>
:root{
  --navy:#1a2e5a; --navy2:#243f73;
  --yellow:#FFC800; --ys:#E5B400;
  --green:#58CC02;  --gs:#58A700;
  --punch:#FF4B4B;  --ps:#EA2B2B;
  --blue:#1CB0F6;   --bs:#1899D6;
  --purple:#CE82FF; --pus:#A559D9;
  --teal:#2BDECC;
  --white:#fff; --ink:#111827; --ink3:#AFAFAF;
  --r:20px; --rsm:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Nunito',sans-serif;overflow:hidden}
body{background:var(--navy);color:#fff;line-height:1.4}

@keyframes up     {from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop    {0%{transform:scale(.5) rotate(-6deg)}65%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes shake  {0%,100%{transform:translateX(0)}20%{transform:translateX(-12px)}40%{transform:translateX(12px)}60%{transform:translateX(-8px)}80%{transform:translateX(8px)}}
@keyframes spin   {from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes float  {0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes zoomIn {from{opacity:0;transform:scale(.15)}to{opacity:1;transform:scale(1)}}
@keyframes pulse  {0%,100%{opacity:1}50%{opacity:.55}}
@keyframes glow   {0%,100%{box-shadow:0 0 24px rgba(255,200,0,.4)}50%{box-shadow:0 0 70px rgba(255,200,0,.9)}}
@keyframes scoreUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-100px) scale(2.2)}}
@keyframes conf   {0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(260px) rotate(720deg)}}
@keyframes tileIn {0%{opacity:0;transform:scale(.4) rotate(-8deg)}65%{transform:scale(1.1)}100%{opacity:1;transform:scale(1)}}
@keyframes nudge  {0%,100%{transform:translateX(0)}40%{transform:translateX(6px)}}

.conf-dot{position:fixed;border-radius:3px;pointer-events:none;z-index:9999;animation:conf 1.6s ease-out both}
.score-pop{position:fixed;pointer-events:none;z-index:9998;font-size:32px;font-weight:900;color:var(--yellow);text-shadow:0 3px 0 var(--ys);animation:scoreUp 1s ease-out forwards}

/* ══ SETUP ══════════════════════════════════════════════════ */
#setup{height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(160deg,#001433 0%,#1a2e5a 100%)}
.setup-card{background:var(--white);border:3px solid var(--ink);border-bottom:7px solid var(--ink);border-radius:var(--r);max-width:540px;width:100%;padding:36px 32px;color:var(--ink);animation:up .4s ease both}
.setup-logo{font-size:56px;text-align:center;margin-bottom:6px;animation:float 3s ease-in-out infinite;display:block}
.setup-title{font-size:28px;font-weight:900;font-style:italic;text-align:center;margin-bottom:4px}
.setup-sub{font-size:13px;font-weight:700;color:var(--ink3);text-align:center;margin-bottom:26px}
.lbl{font-size:11px;font-weight:900;color:var(--ink3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:7px}
.sel{width:100%;padding:12px 14px;border:2px solid #CECECE;border-radius:12px;font-size:14px;font-weight:700;color:var(--ink);background:#fff;outline:none;cursor:pointer;font-family:inherit;margin-bottom:18px}
.sel:focus{border-color:var(--blue)}
.lesson-list{display:flex;flex-direction:column;gap:8px;max-height:250px;overflow-y:auto;margin-bottom:20px}
.l-btn{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#F4F6F8;border:2px solid #CECECE;border-bottom:3px solid #CECECE;border-radius:12px;cursor:pointer;font-family:inherit;text-align:left;transition:all .12s;width:100%}
.l-btn:hover,.l-btn.sel{border-color:var(--blue);background:#EEF8FE}
.l-icon{font-size:26px;flex-shrink:0}
.l-info{flex:1}
.l-name{font-size:14px;font-weight:900;color:var(--ink)}
.l-meta{font-size:11px;font-weight:700;color:var(--ink3);margin-top:2px}
.l-count{font-size:11px;font-weight:900;color:var(--blue);background:rgba(28,176,246,.1);border:2px solid rgba(28,176,246,.2);border-radius:99px;padding:2px 10px;flex-shrink:0}
.round-toggles{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.round-toggle{padding:7px 14px;border:2px solid #CECECE;border-radius:99px;font-size:12px;font-weight:900;color:var(--ink3);cursor:pointer;font-family:inherit;transition:all .12s;background:#fff}
.round-toggle.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn-play{width:100%;padding:16px;background:var(--navy);color:#fff;font-size:18px;font-weight:900;border-radius:99px;border:2px solid var(--navy);border-bottom:6px solid #0d1f3c;cursor:pointer;font-family:inherit;transition:all .1s}
.btn-play:active{transform:translateY(4px);border-bottom-width:2px}
.btn-play:disabled{opacity:.3;cursor:default}
.loading-msg{font-size:14px;font-weight:700;color:var(--ink3);text-align:center;padding:20px;display:flex;align-items:center;justify-content:center;gap:10px}
.spinner{width:18px;height:18px;border:3px solid #E5E5E5;border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}

/* ══ GAME ════════════════════════════════════════════════════ */
#game{height:100vh;display:none;flex-direction:column}
.prog-wrap{height:7px;background:rgba(255,255,255,.1);flex-shrink:0}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--yellow),var(--green));transition:width .6s cubic-bezier(.4,0,.2,1)}
.g-hdr{height:66px;background:rgba(0,0,0,.3);border-bottom:2px solid rgba(255,255,255,.08);padding:0 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.g-class{font-size:15px;font-weight:900}
.g-lesson-name{font-size:11px;font-weight:700;color:rgba(255,255,255,.5);margin-top:1px}
.score-pill{display:flex;align-items:center;gap:8px;background:rgba(255,200,0,.12);border:2px solid rgba(255,200,0,.25);border-radius:99px;padding:8px 20px}
.score-label{font-size:11px;font-weight:900;color:rgba(255,200,0,.6);text-transform:uppercase;letter-spacing:1px}
.score-num{font-size:24px;font-weight:900;color:var(--yellow);min-width:44px;text-align:right;transition:transform .15s}
.score-num.bump{transform:scale(1.4)}
.round-badge{text-align:right}
.round-type{font-size:12px;font-weight:900;color:rgba(255,255,255,.5)}
.round-name{font-size:14px;font-weight:900;color:#fff}
.btn-quit{padding:6px 14px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.5);font-size:12px;font-weight:900;border:2px solid rgba(255,255,255,.12);border-radius:99px;cursor:pointer;font-family:inherit}
.btn-quit:hover{color:#fff;background:rgba(255,255,255,.15)}
.g-body{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden}

/* Feedback bar */
.fb-bar{position:fixed;bottom:0;left:0;right:0;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:100;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.fb-bar.show{transform:translateY(0)}
.fb-bar.good{background:var(--green)}
.fb-bar.bad{background:var(--punch)}
.fb-msg{font-size:15px;font-weight:800;color:#fff;flex:1}
.fb-explain{font-size:13px;font-weight:700;color:rgba(255,255,255,.8);margin-top:2px}
.fb-key{font-size:12px;font-weight:700;color:rgba(255,255,255,.6)}
.btn-next{padding:10px 22px;background:rgba(255,255,255,.2);color:#fff;font-size:14px;font-weight:900;border:2px solid rgba(255,255,255,.3);border-radius:99px;cursor:pointer;font-family:inherit}
.btn-next:hover{background:rgba(255,255,255,.35)}

/* ── ROUND INTRO ── */
.r-intro{text-align:center;max-width:600px;animation:zoomIn .4s cubic-bezier(.175,.885,.32,1.275) both}
.r-num{font-size:12px;font-weight:900;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:3px;margin-bottom:10px}
.r-icon{font-size:88px;display:block;margin-bottom:16px;animation:float 2.5s ease-in-out infinite}
.r-title{font-size:clamp(36px,8vw,68px);font-weight:900;font-style:italic;letter-spacing:-2px;line-height:1;margin-bottom:12px}
.r-title .acc{color:var(--yellow)}
.r-rule{font-size:clamp(13px,2.5vw,16px);font-weight:700;color:rgba(255,255,255,.75);max-width:520px;margin:0 auto 28px;line-height:1.65;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);border-radius:var(--rsm);padding:14px 18px;text-align:left}
.r-rule strong{color:var(--yellow)}
.btn-go{padding:15px 48px;background:var(--yellow);color:var(--ink);font-size:18px;font-weight:900;border-radius:99px;border:3px solid var(--ys);border-bottom:6px solid var(--ys);cursor:pointer;font-family:inherit;transition:all .1s;animation:pulse 2s ease-in-out infinite}
.btn-go:active{transform:translateY(4px);border-bottom-width:2px}
.kb-hint{font-size:12px;font-weight:700;color:rgba(255,255,255,.3);margin-top:14px}

/* ── WORD BLITZ (definition → pick word) ── */
.blitz-wrap{max-width:720px;width:100%;animation:up .3s ease both}
.q-counter{font-size:11px;font-weight:900;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:2px;text-align:center;margin-bottom:10px}
.blitz-def{background:rgba(255,255,255,.07);border:3px solid rgba(255,255,255,.1);border-radius:var(--r);padding:32px 36px;text-align:center;margin-bottom:18px;font-size:clamp(18px,3.8vw,28px);font-weight:800;color:#fff;line-height:1.5}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.opt{padding:18px 14px;background:rgba(255,255,255,.07);border:3px solid rgba(255,255,255,.12);border-bottom:5px solid rgba(0,0,0,.2);border-radius:var(--r);font-size:clamp(16px,3.2vw,24px);font-weight:900;font-style:italic;color:#fff;cursor:pointer;font-family:inherit;transition:all .12s;text-align:center;letter-spacing:-.3px}
.opt:hover:not(:disabled){background:rgba(255,255,255,.15);transform:translateY(-2px)}
.opt:active:not(:disabled){transform:translateY(2px);border-bottom-width:2px}
.opt:disabled{cursor:default}
.opt.correct{background:var(--green)!important;border-color:var(--gs)!important;animation:pop .3s ease}
.opt.wrong{background:var(--punch)!important;border-color:var(--ps)!important;animation:shake .3s ease}
.opt.reveal{background:rgba(88,204,2,.18)!important;border-color:var(--gs)!important}

/* ── GAP FILL (sentence with missing word) ── */
.gap-wrap{max-width:740px;width:100%;animation:up .3s ease both}
.gap-sentence{background:rgba(255,255,255,.07);border:3px solid rgba(255,255,255,.1);border-radius:var(--r);padding:30px 34px;text-align:center;margin-bottom:18px;font-size:clamp(16px,3.5vw,26px);font-weight:800;color:#fff;line-height:1.65}
.gap-blank{display:inline-block;min-width:130px;border-bottom:4px solid var(--yellow);color:var(--yellow);font-style:italic;padding:0 6px;animation:pulse 1.8s ease-in-out infinite}
.gap-blank.filled{animation:none;color:#fff;border-color:rgba(255,255,255,.3)}

/* ── GRAMMAR FILL (grammar gap) ── */
/* same styles as gap fill, different colour accent */
.grammar-wrap{max-width:740px;width:100%;animation:up .3s ease both}
.grammar-topic{font-size:12px;font-weight:900;color:var(--teal);text-transform:uppercase;letter-spacing:2px;text-align:center;margin-bottom:8px}
.grammar-sentence{background:rgba(255,255,255,.07);border:3px solid rgba(255,255,255,.1);border-radius:var(--r);padding:30px 34px;text-align:center;margin-bottom:18px;font-size:clamp(16px,3.5vw,26px);font-weight:800;color:#fff;line-height:1.65}
.grammar-blank{display:inline-block;min-width:120px;border-bottom:4px solid var(--teal);color:var(--teal);font-style:italic;padding:0 6px;animation:pulse 1.8s ease-in-out infinite}
.grammar-blank.filled{animation:none;color:#fff;border-color:rgba(255,255,255,.3)}

/* ── SENTENCE BUILDER ── */
.sb-wrap{max-width:760px;width:100%;animation:up .3s ease both}
.sb-hint{font-size:13px;font-weight:700;color:rgba(255,255,255,.5);text-align:center;margin-bottom:12px;font-style:italic}
.sb-answer{min-height:64px;background:rgba(255,255,255,.05);border:3px dashed rgba(255,255,255,.15);border-radius:var(--r);padding:14px 18px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px;transition:border-color .2s}
.sb-answer.has-words{border-color:rgba(255,255,255,.25);border-style:solid}
.sb-answer.correct-flash{border-color:var(--green);background:rgba(88,204,2,.1)}
.sb-answer.wrong-flash{border-color:var(--punch);animation:shake .3s ease}
.sb-word-placed{padding:8px 14px;background:rgba(28,176,246,.2);border:2px solid var(--blue);border-radius:var(--rsm);font-size:15px;font-weight:900;color:#fff;cursor:pointer;animation:tileIn .25s cubic-bezier(.175,.885,.32,1.275) both;transition:all .1s}
.sb-word-placed:hover{background:rgba(28,176,246,.35)}
.sb-words{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.sb-word{padding:10px 16px;background:var(--white);border:2px solid #CECECE;border-bottom:4px solid #CECECE;border-radius:var(--rsm);font-size:15px;font-weight:900;color:var(--ink);cursor:pointer;font-family:inherit;transition:all .12s;animation:tileIn .3s cubic-bezier(.175,.885,.32,1.275) both}
.sb-word:hover{border-color:var(--blue);transform:translateY(-2px)}
.sb-word:active{transform:translateY(2px);border-bottom-width:2px}
.sb-word.used{opacity:.2;pointer-events:none}
.sb-actions{display:flex;gap:10px;justify-content:center;margin-top:12px}
.sb-clear{padding:10px 20px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);font-size:13px;font-weight:900;border:2px solid rgba(255,255,255,.15);border-radius:99px;cursor:pointer;font-family:inherit}
.sb-check{padding:10px 28px;background:var(--yellow);color:var(--ink);font-size:13px;font-weight:900;border:2px solid var(--ys);border-bottom:3px solid var(--ys);border-radius:99px;cursor:pointer;font-family:inherit}

/* ── TRUE / FALSE ── */
.tf-wrap{max-width:720px;width:100%;text-align:center;animation:up .3s ease both}
.tf-statement{background:rgba(255,255,255,.07);border:3px solid rgba(255,255,255,.1);border-radius:var(--r);padding:36px 32px;margin-bottom:22px;font-size:clamp(18px,4vw,30px);font-weight:900;color:#fff;line-height:1.4}
.tf-statement .hl{color:var(--yellow);font-style:italic}
.tf-btns{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.tf-btn{padding:28px;border-radius:var(--r);font-size:clamp(22px,5vw,38px);font-weight:900;cursor:pointer;font-family:inherit;transition:all .12s;border:3px solid;border-bottom:6px solid}
.tf-btn:hover:not(:disabled){filter:brightness(1.2);transform:translateY(-3px)}
.tf-btn:active:not(:disabled){transform:translateY(3px);border-bottom-width:2px}
.tf-btn:disabled{cursor:default}
.tf-true{background:rgba(0,120,42,.18);color:#7fff7f;border-color:rgba(0,120,42,.35)}
.tf-false{background:rgba(220,36,31,.18);color:#ffaaaa;border-color:rgba(220,36,31,.35)}
.tf-btn.correct{background:var(--green)!important;color:#fff!important;border-color:var(--gs)!important;animation:pop .3s ease}
.tf-btn.wrong{background:var(--punch)!important;color:#fff!important;border-color:var(--ps)!important;animation:shake .3s ease}
.tf-btn.reveal{background:rgba(88,204,2,.18)!important;border-color:var(--gs)!important}

/* ── WORD BUILDER ── */
.wb-wrap{max-width:680px;width:100%;animation:up .3s ease both}
.wb-def{background:rgba(255,255,255,.07);border:3px solid rgba(255,255,255,.1);border-left:5px solid var(--teal);border-radius:0 var(--r) var(--r) 0;padding:18px 22px;margin-bottom:18px;font-size:clamp(15px,3vw,22px);font-weight:800;color:#fff;line-height:1.5}
.wb-slots{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:16px;min-height:58px}
.wb-slot{width:46px;height:54px;border-bottom:4px solid var(--teal);background:rgba(0,152,212,.07);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:#fff;cursor:pointer;transition:all .15s}
.wb-slot.filled{background:rgba(0,152,212,.18);animation:tileIn .25s cubic-bezier(.175,.885,.32,1.275) both}
.wb-slot.correct{background:var(--teal)!important;border-color:#007aa0!important;animation:pop .35s ease}
.wb-slot.wrong{animation:shake .3s ease;border-color:var(--punch)!important}
.wb-tiles{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.wb-tile{width:46px;height:52px;background:#fff;border:2px solid #CECECE;border-bottom:5px solid #CECECE;border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:var(--ink);cursor:pointer;font-family:inherit;transition:all .12s;animation:tileIn .3s cubic-bezier(.175,.885,.32,1.275) both}
.wb-tile:hover{border-color:var(--teal);transform:translateY(-2px)}
.wb-tile:active{transform:translateY(2px);border-bottom-width:2px}
.wb-tile.used{opacity:.2;pointer-events:none}
.wb-actions{display:flex;gap:8px;justify-content:center}
.wb-clear{padding:10px 20px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);font-size:13px;font-weight:900;border:2px solid rgba(255,255,255,.15);border-radius:99px;cursor:pointer;font-family:inherit}
.wb-check{padding:10px 28px;background:var(--teal);color:var(--ink);font-size:13px;font-weight:900;border:2px solid #007aa0;border-bottom:3px solid #007aa0;border-radius:99px;cursor:pointer;font-family:inherit}

/* ══ FINISH ══════════════════════════════════════════════════ */
#finish{height:100vh;display:none;align-items:center;justify-content:center;padding:20px;background:linear-gradient(160deg,#001433,#1a2e5a)}
.fin-card{max-width:560px;width:100%;text-align:center;animation:up .5s ease both}
.fin-badge{width:160px;height:160px;border-radius:50%;background:linear-gradient(135deg,#001f52,var(--navy2));border:5px solid var(--yellow);margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:80px;animation:glow 2.5s ease-in-out infinite}
.fin-rating{font-size:44px;margin-bottom:8px}
.fin-title{font-size:44px;font-weight:900;font-style:italic;letter-spacing:-2px;margin-bottom:6px}
.fin-sub{font-size:15px;font-weight:700;color:rgba(255,255,255,.6);margin-bottom:24px}
.fin-score-box{background:rgba(255,200,0,.1);border:3px solid rgba(255,200,0,.3);border-radius:var(--r);padding:22px;margin-bottom:18px;animation:glow 3s ease-in-out infinite}
.fin-score-n{font-size:78px;font-weight:900;color:var(--yellow);line-height:1;text-shadow:0 4px 0 var(--ys)}
.fin-score-l{font-size:12px;font-weight:900;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:2px;margin-top:4px}
.fin-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
.fin-stat{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.1);border-radius:var(--r);padding:13px 8px;text-align:center}
.fin-stat-n{font-size:26px;font-weight:900;color:#fff}
.fin-stat-l{font-size:9px;font-weight:900;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;margin-top:3px}
.fin-msg{font-size:16px;font-weight:800;color:rgba(255,255,255,.75);margin-bottom:26px;line-height:1.5}
.fin-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.fin-btn{padding:13px 30px;font-size:15px;font-weight:900;border-radius:99px;border:2px solid;border-bottom:5px solid;cursor:pointer;font-family:inherit;transition:all .1s}
.fin-btn:active{transform:translateY(3px);border-bottom-width:2px}
.fin-yellow{background:var(--yellow);color:var(--ink);border-color:var(--ys)}
.fin-ghost{background:rgba(255,255,255,.08);color:#fff;border-color:rgba(255,255,255,.2)}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="setup-card">
    <span class="setup-logo">😎</span>
    <div class="setup-title">Review Game</div>
    <div class="setup-sub">Pick a class and lesson — let's revise! 🎮</div>

    <div class="lbl">Class</div>
    <select class="sel" id="class-sel" onchange="loadLessons()">
      <option value="">Choose a class…</option>
    </select>

    <div class="lbl">Lesson</div>
    <div class="lesson-list" id="lesson-list">
      <div class="loading-msg" style="color:#AFAFAF">← Pick a class first</div>
    </div>

    <div class="lbl">Rounds to include</div>

<script>
'use strict';

const SUPABASE_URL  = 'https://knwgmrgwbpchqyqxbxea.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtud2dtcmd3YnBjaHF5cXhieGVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI1MDkyODgsImV4cCI6MjA3ODA4NTI4OH0.qnp2ScwSE77_idmPhpLE98sr46WvLpKtg6refFfC7s8';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
  global: { headers: { apikey: SUPABASE_ANON, Authorization: 'Bearer ' + SUPABASE_ANON } }
});

// ── STATE ──────────────────────────────────────────────────────
let _lessonData  = null;  // from LESSON_DATA_REGISTRY
let _vocabMeta   = null;  // from Supabase efcd_lesson_vocab
let _classData   = null;

// ── SUPABASE FETCH ─────────────────────────────────────────────
async function sbFetch(path) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    headers: { apikey: SUPABASE_ANON, Authorization: 'Bearer ' + SUPABASE_ANON }
  });
  return res.json();
}

// ── BOOT ───────────────────────────────────────────────────────
async function boot(){
  const classes = await sbFetch('efcd_classes?select=id,name,emoji,team_name&order=name');
  const sel = document.getElementById('class-sel');
  (classes||[]).forEach(c => {
    const o = document.createElement('option');
    o.value = c.id;
    o.textContent = c.emoji + ' ' + (c.team_name || c.name);
    sel.appendChild(o);
  });
  // URL param auto-select
  const p = new URLSearchParams(location.search);
  if(p.get('class')){ sel.value = p.get('class'); await loadLessons(); }
}

async function loadLessons(){
  const classId = document.getElementById('class-sel').value;
  const list    = document.getElementById('lesson-list');
  _lessonData = null; _vocabMeta = null;
  document.getElementById('btn-play').disabled = true;
  if(!classId){ list.innerHTML = '<div class="loading-msg" style="color:#AFAFAF">← Pick a class first</div>'; return; }
  list.innerHTML = '<div class="loading-msg"><div class="spinner"></div>Loading…</div>';

  const data = await sbFetch(`efcd_lesson_vocab?class_id=eq.${classId}&order=completed_at.desc&limit=20`);
  if(!data?.length){ list.innerHTML = '<div class="loading-msg" style="color:#AFAFAF">No lessons saved yet for this class.</div>'; return; }

  // Deduplicate by lesson_id
  const seen = new Set();
  const unique = data.filter(v => { if(seen.has(v.lesson_id)) return false; seen.add(v.lesson_id); return true; });

  list.innerHTML = unique.map(v => {
    const reg   = window.LESSON_DATA_REGISTRY?.[v.lesson_id];
    const emoji = reg?.emoji || '📖';
    const date  = new Date(v.completed_at).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
    const vocab = Array.isArray(v.vocab) ? v.vocab : JSON.parse(v.vocab||'[]');
    const rounds = reg ? _availableRounds(reg).join(', ') : 'vocab';
    return `<button class="l-btn" onclick="selectLesson(this,'${v.lesson_id}','${v.id}')">
      <span class="l-icon">${emoji}</span>
      <div class="l-info">
        <div class="l-name">${v.lesson_title||v.lesson_id}</div>
        <div class="l-meta">${v.lesson_level||''} · ${date} · ${rounds}</div>
      </div>
      <span class="l-count">${vocab.length} words</span>
    </button>`;
  }).join('');
}

function _availableRounds(reg){
  const r = ['Word Blitz'];
  if(reg.vocab?.some(v=>v.example))    r.push('Gap Fill');
  if(reg.grammar?.exercises?.length)   r.push('Grammar');
  if(reg.grammar2?.exercises?.length)  r.push('Grammar 2');
  if(reg.word_builder?.length)         r.push('Word Builder');
  if(reg.true_false?.length)           r.push('True/False');
  if(reg.sentences?.length)            r.push('Sentences');
  return r;
}

async function selectLesson(btn, lessonId, vocabId){
  document.querySelectorAll('.l-btn').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  // Get full lesson data from registry
  _lessonData = window.LESSON_DATA_REGISTRY?.[lessonId] || null;
  // Also get vocab meta from Supabase (for vocab without registry entry)
  const data = await sbFetch(`efcd_lesson_vocab?id=eq.${vocabId}`);
  _vocabMeta = data?.[0] || null;
  if(_vocabMeta && !_lessonData){
    // Build minimal lesson data from saved vocab
    const vocab = Array.isArray(_vocabMeta.vocab) ? _vocabMeta.vocab : JSON.parse(_vocabMeta.vocab||'[]');
    _lessonData = { id: lessonId, title: _vocabMeta.lesson_title, level: _vocabMeta.lesson_level, emoji:'📖', vocab };
  }
  document.getElementById('btn-play').disabled = !_lessonData;
}

function toggleRound(btn){
  const r = btn.dataset.round;
  if(_activeRounds.has(r)) _activeRounds.delete(r);
  else _activeRounds.add(r);
  btn.classList.toggle('on', _activeRounds.has(r));
}

// ── BUILD QUESTION QUEUE ────────────────────────────────────────
function buildQuestions(){
  const ld = _lessonData;
  const q  = [];

  if(_activeRounds.has('blitz') && ld.vocab?.length >= 2){
    ld.vocab.forEach(item => {
      const wrong = ld.vocab.filter(v => v.word !== item.word)
        .sort(() => Math.random()-.5).slice(0,3).map(v => v.word);
      q.push({ round:'blitz', word:item.word, def:item.definition,
               opts:shuffle([item.word, ...wrong]), answer:item.word });
    });
  }

  if(_activeRounds.has('gap') && ld.vocab?.some(v=>v.example)){
    ld.vocab.filter(v=>v.example).forEach(item => {
      const dis = (item.distractors||[]).slice(0,3);
      while(dis.length < 3){
        const rand = ld.vocab.find(v => v.word !== item.word && !dis.includes(v.word));
        if(rand) dis.push(rand.word); else break;
      }
      q.push({ round:'gap', word:item.word, sentence:item.example,
               opts:shuffle([item.word, ...dis]), answer:item.word });
    });
  }

  if(_activeRounds.has('grammar')){
    [ld.grammar, ld.grammar2, ld.grammar3].forEach(g => {
      if(!g?.exercises?.length) return;
      g.exercises.forEach(ex => {
        q.push({ round:'grammar', topic:g.topic, rule:g.rule,
                 sentence:ex.sentence, opts:shuffle([ex.answer,...ex.wrong]),
                 answer:ex.answer, explain:ex.explain });
      });
    });
  }

  if(_activeRounds.has('builder') && ld.word_builder?.length){
    ld.word_builder.forEach(item => {
      q.push({ round:'builder', word:item.word, def:item.definition,
               letters:shuffle([...item.word]) });
    });
  }

  if(_activeRounds.has('tf') && ld.true_false?.length){
    ld.true_false.forEach(item => {
      q.push({ round:'tf', statement:item.statement,
               answer:item.correct, reveal:item.reveal });
    });
  }

  if(_activeRounds.has('sentence') && ld.sentences?.length){
    ld.sentences.forEach(item => {
      q.push({ round:'sentence', words:shuffle([...item.words]),
               answer:item.answer, hint:item.hint });
    });
  }

  return q;
}
function shuffle(arr){ return [...arr].sort(() => Math.random()-.5); }

// ── START GAME ──────────────────────────────────────────────────
function startGame(){
  if(!_lessonData) return;
  _questions = buildQuestions();
  if(!_questions.length){ alert('No questions available for selected rounds. Try enabling more rounds.'); return; }
  _qIdx = 0; _score = 0; _correct = 0; _total = 0; _answered = false;

  // Get class display name
  const selEl   = document.getElementById('class-sel');
  const selOpt  = selEl.options[selEl.selectedIndex];
  document.getElementById('g-class').textContent   = selOpt?.text || 'Class';
  document.getElementById('g-lesson').textContent  = _lessonData.title || 'Vocab Review';

  show('game');
  renderRoundIntro(_questions[0].round, true);
}

// ── ROUND INTRO ────────────────────────────────────────────────
const ROUND_META = {
  blitz:   { icon:'💬', title:'Word <span class="acc">Blitz!</span>',   desc:'Read the definition — shout the word! Teacher clicks the right answer.' },
  gap:     { icon:'✏️',  title:'Fill the <span class="acc">Gap!</span>', desc:'Read the sentence — what word goes in the blank? Four options.' },
  grammar: { icon:'📖',  title:'Grammar <span class="acc">Time!</span>', desc:'Apply the grammar rule — choose the correct form.' },
  builder: { icon:'🧱',  title:'Word <span class="acc">Builder!</span>', desc:'The letters are scrambled — tap them in the right order to build the word!' },
  tf:      { icon:'✅',  title:'True or <span class="acc">False?!</span>',desc:'Read the statement — is it TRUE or FALSE? Whole class shouts together!' },
  sentence:{ icon:'🔤',  title:'Sentence <span class="acc">Builder!</span>',desc:'The words are in the wrong order — tap them to build the correct sentence.' },
};

let _lastRound = null;
function renderRoundIntro(round, force){
  if(round === _lastRound && !force){ renderQuestion(); return; }
  _lastRound = round;
  const m  = ROUND_META[round] || ROUND_META.blitz;
  const q0 = _questions[_qIdx];
  const gm = (round === 'grammar') ? { topic: q0?.topic, rule: q0?.rule } : null;
  const body = document.getElementById('g-body');
  hideFeedback();
  updateHeader();

  body.innerHTML = `
    <div class="r-intro">
      <div class="r-num">Round: ${round.toUpperCase()}</div>
      <span class="r-icon">${m.icon}</span>
      <div class="r-title">${m.title}</div>
      ${gm ? `<div class="r-rule"><strong>📖 ${gm.topic}:</strong><br>${gm.rule}</div>` : ''}
      <p style="font-size:15px;font-weight:700;color:rgba(255,255,255,.7);margin-bottom:28px">${m.desc}</p>
      <button class="btn-go" onclick="renderQuestion()">Let's go! 🚀</button>
      <div class="kb-hint">Press SPACE to start</div>
    </div>`;
}

// ── RENDER QUESTION ────────────────────────────────────────────
function renderQuestion(){
  if(_qIdx >= _questions.length){ showFinish(); return; }
  _answered = false;
  _sbBuilt = []; _wbBuilt = []; _wbWrong = 0;
  hideFeedback();
  updateHeader();
  updateProgress();

  const q    = _questions[_qIdx];
  const body = document.getElementById('g-body');
  if(next && next !== q.round) _lastRound = null; // trigger intro for next round

  switch(q.round){
    case 'blitz':    renderBlitz(q, body);   break;
    case 'gap':      renderGap(q, body);     break;
    case 'grammar':  renderGrammar(q, body); break;
    case 'builder':  renderBuilder(q, body); break;
    case 'tf':       renderTF(q, body);      break;
    case 'sentence': renderSentence(q, body);break;
    default:         renderBlitz(q, body);
  }
}

// ── WORD BLITZ ────────────────────────────────────────────────
function renderBlitz(q, body){
  const nums = ['1','2','3','4'];
  body.innerHTML = `
    <div class="blitz-wrap">
      <div class="q-counter">Question ${_qIdx+1} of ${_questions.length}</div>
      <div class="blitz-def">${q.def}</div>
      <div class="opts-grid">
        ${q.opts.map((o,i) => `<button class="opt" onclick="answerBlitz('${o}',this)" data-answer="${o}">
          <span style="font-size:13px;opacity:.5;margin-right:4px">${nums[i]}</span> ${o}
        </button>`).join('')}
      </div>
    </div>`;
}

function answerBlitz(chosen, btn){
  if(_answered) return; _answered = true; _total++;
  const q = _questions[_qIdx];
  document.querySelectorAll('.opt').forEach(b => b.disabled = true);
  const ok = chosen === q.answer;
  btn.classList.add(ok ? 'correct' : 'wrong');
  if(!ok) document.querySelector(`.opt[data-answer="${q.answer}"]`)?.classList.add('reveal');
  handleResult(ok, `${ok ? '✅ Correct!' : '❌ Wrong!'} The answer is: <strong>${q.answer}</strong>`, `"${q.answer}" = ${q.def}`);
}

// ── GAP FILL ─────────────────────────────────────────────────
function renderGap(q, body){
  const sentence = q.sentence.replace('___', '<span class="gap-blank" id="gap-blank">___</span>');
  body.innerHTML = `
    <div class="gap-wrap">
      <div class="q-counter">Question ${_qIdx+1} of ${_questions.length}</div>
      <div class="gap-sentence">${sentence}</div>
      <div class="opts-grid">
        ${q.opts.map(o => `<button class="opt" onclick="answerGap('${o}',this)" data-answer="${o}">${o}</button>`).join('')}
      </div>
    </div>`;
}

function answerGap(chosen, btn){
  if(_answered) return; _answered = true; _total++;
  const q  = _questions[_qIdx];
  const ok = chosen === q.answer;
  document.querySelectorAll('.opt').forEach(b => b.disabled = true);
  btn.classList.add(ok ? 'correct' : 'wrong');
  if(!ok) document.querySelector(`.opt[data-answer="${q.answer}"]`)?.classList.add('reveal');
  const blank = document.getElementById('gap-blank');
  if(blank){ blank.textContent = q.answer; blank.classList.add('filled'); }
  handleResult(ok, ok ? '✅ Correct!' : `❌ The answer is: <strong>${q.answer}</strong>`, q.sentence.replace('___', `"${q.answer}"`));
}

// ── GRAMMAR FILL ─────────────────────────────────────────────
function renderGrammar(q, body){
  const sentence = q.sentence.replace('___', '<span class="grammar-blank" id="g-blank">___</span>');
  body.innerHTML = `
    <div class="grammar-wrap">
      <div class="grammar-topic">✏️ ${q.topic}</div>
      <div class="q-counter">Question ${_qIdx+1} of ${_questions.length}</div>
      <div class="grammar-sentence">${sentence}</div>
      <div class="opts-grid">
        ${q.opts.map(o => `<button class="opt" onclick="answerGrammar('${escQ(o)}',this)" data-answer="${escQ(o)}">${o}</button>`).join('')}
      </div>
    </div>`;
}

function answerGrammar(chosen, btn){
  if(_answered) return; _answered = true; _total++;
  const q  = _questions[_qIdx];
  const ok = chosen === q.answer;
  document.querySelectorAll('.opt').forEach(b => b.disabled = true);
  btn.classList.add(ok ? 'correct' : 'wrong');
  if(!ok) document.querySelector(`.opt[data-answer="${escQ(q.answer)}"]`)?.classList.add('reveal');
  const blank = document.getElementById('g-blank');
  if(blank){ blank.textContent = q.answer; blank.classList.add('filled'); }
  handleResult(ok, ok ? '✅ Correct!' : `❌ Answer: <strong>${q.answer}</strong>`, q.explain || '');
}

function escQ(s){ return (s||'').replace(/'/g,"\\'"); }

// ── WORD BUILDER ─────────────────────────────────────────────
function renderBuilder(q, body){
  body.innerHTML = `
    <div class="wb-wrap">
      <div class="q-counter">Question ${_qIdx+1} of ${_questions.length}</div>
      <div class="wb-def">💡 ${q.def}</div>
      <div class="wb-slots" id="wb-slots"></div>
      <div class="wb-tiles" id="wb-tiles">
        ${q.letters.map((l,i) => `<button class="wb-tile" id="wbt-${i}" onclick="tapWBLetter('${l}',${i})">${l.toUpperCase()}</button>`).join('')}
      </div>
      <div class="wb-actions">
        <button class="wb-clear" onclick="clearWB()">🗑️ Clear</button>
        <button class="wb-check" onclick="checkWB()">✓ Check!</button>
      </div>
    </div>`;
  renderWBSlots();
}

function renderWBSlots(){
  const q = _questions[_qIdx];
  const s = document.getElementById('wb-slots');
  if(!s) return;
  s.innerHTML = '';
  for(let i = 0; i < q.word.length; i++){
    const d = document.createElement('div');
    d.className = 'wb-slot' + (_wbBuilt[i] !== undefined ? ' filled' : '');
    d.textContent = _wbBuilt[i] !== undefined ? _wbBuilt[i].toUpperCase() : '';
    if(_wbBuilt[i] !== undefined) d.onclick = () => removeWBLetter(i);
    s.appendChild(d);
  }
}

function tapWBLetter(letter, ti){
  const q = _questions[_qIdx];
  if(_wbBuilt.length >= q.word.length) return;
  _wbBuilt.push(letter);
  document.getElementById('wbt-'+ti)?.classList.add('used');
  renderWBSlots();
}

function removeWBLetter(pos){
  const letter = _wbBuilt[pos];
  _wbBuilt.splice(pos, 1);
  const tiles = document.querySelectorAll('.wb-tile.used');
  for(const t of tiles){ if(t.textContent.toUpperCase() === letter.toUpperCase()){ t.classList.remove('used'); break; } }
  renderWBSlots();
}

function clearWB(){
  _wbBuilt = [];
  document.querySelectorAll('.wb-tile').forEach(t => t.classList.remove('used'));
  renderWBSlots();
}

function checkWB(){
  if(_answered) return;
  const q     = _questions[_qIdx];
  const built = _wbBuilt.join('').toLowerCase();
  if(built.length < q.word.length){ return; }
  _answered = true; _total++;
  const ok    = built === q.word.toLowerCase();
  const slots = document.querySelectorAll('.wb-slot');
  slots.forEach(s => s.classList.add(ok ? 'correct' : 'wrong'));
  if(ok){
    handleResult(true, `✅ Correct! <strong>${q.word.toUpperCase()}</strong>`, q.def);
  } else {
    _wbWrong++;
    if(_wbWrong < 2){ _answered = false; _total--; slots.forEach(s => { s.classList.remove('wrong'); }); setTimeout(() => { _wbBuilt=[]; document.querySelectorAll('.wb-tile').forEach(t=>t.classList.remove('used')); renderWBSlots(); },400); return; }
    handleResult(false, `❌ The word was: <strong>${q.word.toUpperCase()}</strong>`, q.def);
  }
}

// ── TRUE / FALSE ─────────────────────────────────────────────
function renderTF(q, body){
  // Highlight words in ALL CAPS for emphasis
  const stmt = q.statement.replace(/\b([A-Z]{2,})\b/g, '<span class="hl">$1</span>');
  body.innerHTML = `
    <div class="tf-wrap">
      <div class="q-counter">Question ${_qIdx+1} of ${_questions.length}</div>
      <div class="tf-statement">${stmt}</div>
      <div class="tf-btns">
        <button class="tf-btn tf-true"  onclick="answerTF(true,this)"  id="tf-t">✅ TRUE</button>
        <button class="tf-btn tf-false" onclick="answerTF(false,this)" id="tf-f">❌ FALSE</button>
      </div>
    </div>`;
}

function answerTF(chosen, btn){
  if(_answered) return; _answered = true; _total++;
  const q  = _questions[_qIdx];
  const ok = chosen === q.answer;
  document.querySelectorAll('.tf-btn').forEach(b => b.disabled = true);
  btn.classList.add(ok ? 'correct' : 'wrong');
  const other = document.getElementById(chosen ? 'tf-f' : 'tf-t');
  if(!ok && other) other.classList.add('reveal');
  handleResult(ok, ok ? '✅ Correct!' : `❌ Actually it's ${q.answer ? 'TRUE' : 'FALSE'}!`, q.reveal);
}

// ── SENTENCE BUILDER ─────────────────────────────────────────
function renderSentence(q, body){
  _sbBuilt = [];
  body.innerHTML = `
    <div class="sb-wrap">
      <div class="q-counter">Question ${_qIdx+1} of ${_questions.length}</div>
      ${q.hint ? `<div class="sb-hint">💡 ${q.hint}</div>` : ''}
      <div class="sb-answer" id="sb-answer"></div>
      <div class="sb-words" id="sb-words">
        ${q.words.map((w,i) => `<button class="sb-word" id="sbw-${i}" onclick="tapSBWord('${escQ(w)}',${i})">${w}</button>`).join('')}
      </div>
      <div class="sb-actions">
        <button class="sb-clear" onclick="clearSB()">🗑️ Clear</button>
        <button class="sb-check" onclick="checkSB()">✓ Check!</button>
      </div>
    </div>`;
}

function tapSBWord(word, idx){
  if(_answered) return;
  _sbBuilt.push({ word, idx });
  document.getElementById('sbw-'+idx)?.classList.add('used');
  renderSBAnswer();
}

function renderSBAnswer(){
  const ans = document.getElementById('sb-answer');
  if(!ans) return;
  ans.className = 'sb-answer' + (_sbBuilt.length ? ' has-words' : '');
  ans.innerHTML = _sbBuilt.map((item, i) =>
    `<span class="sb-word-placed" onclick="removeSBWord(${i})">${item.word}</span>`
  ).join('');
}

function removeSBWord(pos){
  if(_answered) return;
  const item = _sbBuilt[pos];
  _sbBuilt.splice(pos, 1);
  document.getElementById('sbw-'+item.idx)?.classList.remove('used');
  renderSBAnswer();
}

function clearSB(){
  _sbBuilt = [];
  document.querySelectorAll('.sb-word').forEach(b => b.classList.remove('used'));
  renderSBAnswer();
}

function checkSB(){
  if(_answered) return;
  const q      = _questions[_qIdx];
  const built  = _sbBuilt.map(i => i.word).join(' ').toLowerCase().replace(/[.,!?]/g,'').trim();
  const target = q.answer.toLowerCase().replace(/[.,!?]/g,'').trim();
  const ok     = built === target;
  _answered = true; _total++;
  const ans = document.getElementById('sb-answer');
  if(ans) ans.classList.add(ok ? 'correct-flash' : 'wrong-flash');
  handleResult(ok, ok ? '✅ Perfect sentence!' : `❌ Correct order: <strong>${q.answer}</strong>`, '');
}

// ── RESULT HANDLER ────────────────────────────────────────────
function handleResult(ok, msg, explain){
  if(ok){ _correct++; _score += 10; showScorePop(); }
  updateScore();
  showFeedback(ok, msg, explain);
  if(ok) fireConfettiSmall();
}

function showFeedback(ok, msg, explain){
  const bar  = document.getElementById('fb-bar');
  const msgEl = document.getElementById('fb-msg');
  const expEl = document.getElementById('fb-explain');
  bar.className = 'fb-bar show ' + (ok ? 'good' : 'bad');
  msgEl.innerHTML = msg;
  expEl.innerHTML = explain || '';
}

function hideFeedback(){
  document.getElementById('fb-bar').className = 'fb-bar';
}

function advance(){
  if(!_answered){ return; }
  _qIdx++;
  if(_qIdx < _questions.length){
    const prevQ = _questions[_qIdx - 1];
    const nextQ = _questions[_qIdx];
    const topicChanged = nextQ?.round === 'grammar' &&
                         prevQ?.round === 'grammar' &&
                         nextQ?.topic !== prevQ?.topic;
    if(nextQ.round !== prevQ.round || topicChanged){
      renderRoundIntro(nextQ.round, topicChanged);
    } else {
      renderQuestion();
    }
  } else {
    showFinish();
  }
}

// ── HEADER / PROGRESS ─────────────────────────────────────────
function updateHeader(){
  const q = _questions[_qIdx];
  if(!q) return;
  const m = ROUND_META[q.round] || ROUND_META.blitz;
  document.getElementById('g-round-type').textContent = q.round.toUpperCase();
  document.getElementById('g-round-name').innerHTML   = m.title.replace(/<[^>]+>/g,'');
}

function updateScore(){
  const el = document.getElementById('g-score');
  if(el){ el.textContent = _score; el.classList.add('bump'); setTimeout(() => el.classList.remove('bump'), 200); }
}

function updateProgress(){
  const pct = Math.round((_qIdx / _questions.length) * 100);
  const f   = document.getElementById('prog');
  if(f) f.style.width = pct + '%';
}

// ── FINISH ────────────────────────────────────────────────────
function showFinish(){
  const pct     = _total > 0 ? Math.round((_correct / _total) * 100) : 0;
  const ratings = [
    { min:90, rating:'🌟🌟🌟🌟🌟', title:'Outstanding!',    msg:'Perfect. Every question. Your class are vocab champions. ☕ Trophy time.' },
    { min:75, rating:'🌟🌟🌟🌟',   title:'Brilliant!',      msg:'Really strong work. Just a few slipped through — you\'ll nail them next time.' },
    { min:60, rating:'🌟🌟🌟',     title:'Good effort!',    msg:'Solid performance. Some of these words need a bit more practice — let\'s go again!' },
    { min:40, rating:'🌟🌟',       title:'Keep going!',     msg:'It\'s hard the first time. That\'s why we review. Play again — you\'ll improve!' },
    { min:0,  rating:'🌟',         title:'Nice try!',       msg:'English is hard. That\'s why you\'re here. Play again — every attempt counts.' },
  ];
  const r = ratings.find(x => pct >= x.min) || ratings[ratings.length-1];

  document.getElementById('fin-badge').textContent   = _lessonData?.emoji || '🏆';
  document.getElementById('fin-rating').textContent  = r.rating;
  document.getElementById('fin-title').textContent   = r.title;
  document.getElementById('fin-sub').textContent     = `${_lessonData?.title || 'Review'} — ${_lessonData?.level || ''}`;
  document.getElementById('fin-score').textContent   = _score;
  document.getElementById('fin-correct').textContent = _correct;
  document.getElementById('fin-total').textContent   = _total;
  document.getElementById('fin-pct').textContent     = pct + '%';
  document.getElementById('fin-msg').textContent     = r.msg;

  show('finish');
  fireConfetti();
}

function restartGame(){ startGame(); }
function backToSetup(){ show('setup'); }
function quitGame(){
  if(confirm('Quit the review game?')) show('setup');
}

function show(id){
  ['setup','game','finish'].forEach(s => {
    const el = document.getElementById(s);
    el.style.display = s === id ? (s === 'game' ? 'flex' : s === 'finish' ? 'flex' : 'flex') : 'none';
  });
}

// ── SCORE POP ─────────────────────────────────────────────────
function showScorePop(){
  const el = document.createElement('div');
  el.className = 'score-pop';
  el.textContent = '+10';
  el.style.cssText = `left:${40+Math.random()*20}vw;top:${20+Math.random()*20}vh`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1100);
}

// ── CONFETTI ──────────────────────────────────────────────────
function fireConfetti(){
  const c = ['#FFC800','#58CC02','#1CB0F6','#FF4B4B','#CE82FF','#FF9600','#fff'];
  for(let i=0;i<55;i++){
    const d=document.createElement('div'); d.className='conf-dot';
    const sz=7+Math.random()*11;
    d.style.cssText=`left:${Math.random()*100}vw;top:${Math.random()*20}px;width:${sz}px;height:${sz}px;background:${c[~~(Math.random()*c.length)]};animation-delay:${Math.random()*.8}s;animation-duration:${1.2+Math.random()*.8}s;border-radius:${Math.random()>.5?'50%':'3px'};transform:rotate(${Math.random()*360}deg)`;
    document.body.appendChild(d); setTimeout(()=>d.remove(),2600);
  }
}
function fireConfettiSmall(){
  const c=['#FFC800','#58CC02','#1CB0F6'];
  for(let i=0;i<14;i++){
    const d=document.createElement('div'); d.className='conf-dot';
    const sz=5+Math.random()*7;
    d.style.cssText=`left:${25+Math.random()*50}vw;top:${15+Math.random()*25}vh;width:${sz}px;height:${sz}px;background:${c[~~(Math.random()*c.length)]};animation-delay:0s;animation-duration:${.9+Math.random()*.5}s;border-radius:50%`;
    document.body.appendChild(d); setTimeout(()=>d.remove(),1500);
  }
}

// ── KEYBOARD ─────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const gs = document.getElementById('game');
  if(gs.style.display === 'none') return;
  if(e.key===' '||e.key==='ArrowRight'){ e.preventDefault(); if(_answered) advance(); }
  if(e.key==='1'||e.key==='2'||e.key==='3'||e.key==='4'){
    const opts=document.querySelectorAll('.opt:not(:disabled)');
    if(opts[parseInt(e.key)-1]) opts[parseInt(e.key)-1].click();
  }
  if(e.key==='t'||e.key==='T'){ document.getElementById('tf-t')?.click(); }
  if(e.key==='f'||e.key==='F'){ document.getElementById('tf-f')?.click(); }
  if(e.key==='Enter'){
    const sbChk = document.querySelector('.sb-check');
    const wbChk = document.querySelector('.wb-check');
    if(sbChk) sbChk.click();
    if(wbChk) wbChk.click();
  }
});

boot();
</script>

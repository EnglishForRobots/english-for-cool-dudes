<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <link rel="icon" type="image/png" href="/favicon.png" sizes="32x32">
    <title>🌍 The Nomad Trap — English For Cool Dudes</title>

    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/init-auth.js"></script>

    <style>
    /* ══════════════════════════════════════════════
       TOKENS — EFCD system + Tax track gold accent
    ══════════════════════════════════════════════ */
    :root {
        --blue:         #1CB0F6;
        --blue-shadow:  #1899D6;
        --yellow:       #FFC800;
        --yellow-shadow:#E5B400;
        --green:        #58CC02;
        --green-shadow: #58A700;
        --punch:        #FF4B4B;
        --punch-shadow: #EA2B2B;
        --purple:       #CE82FF;
        --purple-shadow:#A559D9;
        --teal:         #2BDECC;
        --teal-shadow:  #1FBFAF;
        --bg:           #F7F9FA;
        --white:        #FFFFFF;
        --ink:          #4B4B4B;
        --ink-bold:     #111827;
        --ink-3:        #AFAFAF;
        --border:       #E5E5E5;
        --border-heavy: #CECECE;
        --r:            24px;
        --rsm:          16px;
        --rxs:          10px;

        /* Tax track accent — yellow/gold */
        --accent:        var(--yellow);
        --accent-shadow: var(--yellow-shadow);
        --accent-light:  rgba(255,200,0,.13);
        --accent-border: rgba(255,200,0,.4);
        --accent-text:   #92600A;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
    body {
        background: var(--bg);
        color: var(--ink);
        font-family: 'Nunito', -apple-system, system-ui, sans-serif;
        line-height: 1.5;
        overflow-x: hidden;
        padding-bottom: 84px;
        -webkit-font-smoothing: antialiased;
    }
    @media(min-width:768px){ body { padding-bottom: 0; } }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; }

    /* ══════════════════════════════════════════════
       ANIMATIONS
    ══════════════════════════════════════════════ */
    @keyframes up      { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:translateY(0)} }
    @keyframes popin   { 0%{opacity:0;transform:scale(.88)} 70%{transform:scale(1.03)} 100%{opacity:1;transform:scale(1)} }
    @keyframes shim    { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
    @keyframes nudge   { 0%,100%{transform:translateX(0)} 30%{transform:translateX(5px)} }
    @keyframes float   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    @keyframes slideIn { from{opacity:0;transform:translateX(28px)} to{opacity:1;transform:translateX(0)} }
    @keyframes confetti{ 0%{opacity:1;transform:translateY(0) rotate(0deg)} 100%{opacity:0;transform:translateY(130px) rotate(400deg)} }
    @keyframes stamp   { 0%{transform:scale(3) rotate(-15deg);opacity:0} 60%{transform:scale(.9) rotate(3deg);opacity:1} 100%{transform:scale(1) rotate(-2deg);opacity:1} }
    @keyframes flick   { 0%,100%{transform:rotate(-4deg) scale(1)} 50%{transform:rotate(4deg) scale(1.12)} }
    @keyframes tickPop { 0%{transform:scale(0) rotate(-20deg);opacity:0} 70%{transform:scale(1.15) rotate(4deg)} 100%{transform:scale(1) rotate(0);opacity:1} }

    .u1{animation:up .44s ease both .04s} .u2{animation:up .44s ease both .14s}
    .u3{animation:up .44s ease both .24s} .u4{animation:up .44s ease both .34s}

    /* ══════════════════════════════════════════════
       HEADER
    ══════════════════════════════════════════════ */
    .header {
        background: var(--white); border-bottom: 3px solid var(--yellow-shadow);
        position: sticky; top: 0; z-index: 200;
        padding: 0 20px; height: 60px; display: flex; align-items: center;
        box-shadow: 0 4px 12px rgba(229,180,0,.15);
    }
    .hc { max-width: 900px; width: 100%; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .hl { display: flex; align-items: center; gap: 10px; }
    .logo {
        width: 40px; height: 40px; border-radius: 12px;
        background: var(--yellow); border: 2px solid var(--border-heavy);
        display: flex; align-items: center; justify-content: center;
        font-size: 22px; flex-shrink: 0; box-shadow: 0 3px 0 var(--border-heavy);
    }
    .site-title { font-size: 18px; font-weight: 900; color: var(--ink-bold); letter-spacing: -.4px; }
    @media(max-width:380px){ .site-title{display:none} }
    .hdr-stats { display: flex; align-items: center; gap: 8px; }
    .hdr-pill {
        background: var(--bg); border: 2px solid var(--border-heavy);
        border-radius: 99px; padding: 5px 12px;
        font-size: 13px; font-weight: 900; color: var(--ink-bold);
        display: flex; align-items: center; gap: 4px;
    }

    /* ══════════════════════════════════════════════
       PAGE LAYOUT
    ══════════════════════════════════════════════ */
    .page { max-width: 900px; margin: 0 auto; padding: 20px 16px 24px; display: flex; flex-direction: column; gap: 16px; }

    /* ══════════════════════════════════════════════
       LESSON BANNER
    ══════════════════════════════════════════════ */
    .lesson-banner {
        background: var(--yellow);
        border: 2px solid var(--yellow-shadow); border-bottom: 6px solid var(--yellow-shadow);
        border-radius: var(--r); padding: 24px 20px 20px;
        position: relative; overflow: hidden;
    }
    .lesson-banner::after {
        content: '🌍'; position: absolute; right: 8px; bottom: -16px;
        font-size: 120px; opacity: .12; pointer-events: none; transform: rotate(-8deg);
    }
    .lesson-eyebrow {
        display: inline-block;
        background: var(--ink-bold); color: var(--yellow);
        font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px;
        padding: 4px 12px; border-radius: 8px; border: 2px solid rgba(255,255,255,.15);
        margin-bottom: 12px;
    }
    .lesson-title {
        font-size: clamp(22px,6vw,36px); font-weight: 900; color: var(--ink-bold);
        letter-spacing: -1px; line-height: 1.1; margin-bottom: 5px;
        position: relative; z-index: 1;
        text-shadow: 0 2px 0 var(--yellow-shadow);
    }
    .lesson-sub { font-size: 14px; font-weight: 700; color: rgba(0,0,0,.65); margin-bottom: 16px;
        position: relative; z-index: 1; }
    .prog-wrap { background: rgba(0,0,0,.12); border-radius: var(--rsm); padding: 11px 13px; position: relative; z-index: 1; }
    .prog-row { display: flex; justify-content: space-between; font-size: 13px; font-weight: 800; color: var(--ink-bold); margin-bottom: 7px; }
    .prog-track { height: 14px; background: rgba(0,0,0,.15); border-radius: 99px; overflow: hidden; border: 2px solid rgba(0,0,0,.1); }
    .prog-fill  { height: 100%; width: 0%; background: var(--ink-bold); border-radius: 99px; border-top: 3px solid rgba(255,255,255,.2); transition: width .7s cubic-bezier(.4,0,.2,1); }

    /* ══════════════════════════════════════════════
       SECTION CARDS
    ══════════════════════════════════════════════ */
    .sec-label {
        font-size: 12px; font-weight: 900; color: var(--ink-3); text-transform: uppercase;
        letter-spacing: 2px; display: flex; align-items: center; gap: 12px;
    }
    .sec-label::after { content:''; flex:1; height:2px; background:var(--border); border-radius:2px; }

    .sec-card {
        background: var(--white); border: 2px solid var(--border-heavy);
        border-bottom: 6px solid var(--border-heavy); border-radius: var(--r);
        overflow: hidden; display: none;
    }
    .sec-card.visible { display: block; animation: up .4s ease both; }

    /* Coloured top strips — ::before pattern */
    .sec-card::before { content:''; display:block; height:8px; border-radius:var(--r) var(--r) 0 0; margin:-2px -2px 0; }
    .strip-gold::before   { background: var(--yellow); }
    .strip-blue::before   { background: var(--blue); }
    .strip-green::before  { background: var(--green); }
    .strip-purple::before { background: var(--purple); }
    .strip-punch::before  { background: var(--punch); }
    .strip-teal::before   { background: var(--teal); }

    .sec-head {
        padding: 16px 18px 14px; border-bottom: 2px solid var(--border);
        display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
    }
    .sec-head-left  { display: flex; align-items: flex-start; gap: 12px; flex: 1; }
    .sec-head-icon  { font-size: 32px; line-height: 1; flex-shrink: 0; margin-top: 2px; }
    .sec-head-title { font-size: 18px; font-weight: 900; color: var(--ink-bold); letter-spacing: -.3px; }
    .sec-head-sub   { font-size: 13px; font-weight: 700; color: var(--ink-3); margin-top: 2px; }
    .sec-body       { padding: 18px; }

    /* ══════════════════════════════════════════════
       TIMELINE SECTION
    ══════════════════════════════════════════════ */
    .timeline-intro {
        background: var(--bg); border: 2px solid var(--border);
        border-radius: var(--rsm); padding: 14px 16px; margin-bottom: 18px;
        font-size: 14px; font-weight: 700; color: var(--ink); line-height: 1.6;
    }
    .timeline-intro strong { color: var(--ink-bold); }

    .tl-profile {
        background: linear-gradient(135deg, #111827, #1a2744);
        border: 2px solid #2d3748; border-bottom: 4px solid #0d1117;
        border-radius: var(--rsm); padding: 16px; margin-bottom: 20px;
        display: flex; align-items: center; gap: 14px;
    }
    .tl-avatar { font-size: 44px; flex-shrink: 0; }
    .tl-name   { font-size: 18px; font-weight: 900; color: var(--white); letter-spacing: -.3px; margin-bottom: 2px; }
    .tl-role   { font-size: 12px; font-weight: 800; color: var(--yellow); text-transform: uppercase; letter-spacing: 1px; }
    .tl-company{ font-size: 13px; font-weight: 700; color: rgba(255,255,255,.65); margin-top: 2px; }

    .tl-track {
        position: relative;
        padding-left: 32px;
        display: flex; flex-direction: column; gap: 0;
    }
    .tl-track::before {
        content: ''; position: absolute; left: 10px; top: 12px; bottom: 12px;
        width: 3px; background: var(--border-heavy); border-radius: 2px;
    }

    .tl-event {
        position: relative; padding: 0 0 20px 20px;
        cursor: pointer;
    }
    .tl-event:last-child { padding-bottom: 0; }

    .tl-dot {
        position: absolute; left: -26px; top: 8px;
        width: 20px; height: 20px; border-radius: 50%;
        background: var(--border-heavy); border: 3px solid var(--white);
        box-shadow: 0 0 0 2px var(--border-heavy);
        display: flex; align-items: center; justify-content: center;
        font-size: 9px; transition: background .2s, box-shadow .2s;
        z-index: 2;
    }
    .tl-event.risk-yes .tl-dot   { background: var(--punch); box-shadow: 0 0 0 2px var(--punch-shadow); }
    .tl-event.risk-no  .tl-dot   { background: var(--green); box-shadow: 0 0 0 2px var(--green-shadow); }
    .tl-event.risk-pending .tl-dot { background: var(--yellow); box-shadow: 0 0 0 2px var(--yellow-shadow); animation: flick 1.8s ease-in-out infinite; }

    .tl-card {
        background: var(--bg); border: 2px solid var(--border);
        border-radius: var(--rsm); padding: 14px 15px;
        transition: border-color .2s, background .2s;
    }
    .tl-event:hover .tl-card { border-color: var(--yellow-shadow); background: var(--accent-light); }
    .tl-event.risk-yes .tl-card { border-color: var(--punch-shadow); background: rgba(255,75,75,.06); }
    .tl-event.risk-no  .tl-card { border-color: var(--green-shadow); background: rgba(88,204,2,.06); }

    .tl-month   { font-size: 11px; font-weight: 900; color: var(--ink-3); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 3px; }
    .tl-event-title { font-size: 14px; font-weight: 900; color: var(--ink-bold); margin-bottom: 3px; }
    .tl-event-desc  { font-size: 13px; font-weight: 700; color: var(--ink); line-height: 1.5; }
    .tl-tap-hint    { font-size: 11px; font-weight: 800; color: var(--yellow-shadow); margin-top: 6px; display: flex; align-items: center; gap: 4px; }
    .tl-tap-hint.hidden { display: none; }

    .tl-verdict {
        margin-top: 10px; padding: 10px 14px; border-radius: var(--rxs);
        font-size: 13px; font-weight: 800; border: 2px solid;
        display: none; line-height: 1.5;
    }
    .tl-verdict.show { display: block; animation: up .3s ease both; }
    .tl-verdict.correct-v   { background: rgba(88,204,2,.09);  color: var(--green-shadow); border-color: var(--green-shadow); }
    .tl-verdict.incorrect-v { background: rgba(255,75,75,.09); color: var(--punch-shadow); border-color: var(--punch-shadow); }
    .tl-verdict .ev-voc { color: var(--accent-text); font-weight: 900; border-bottom: 2px dashed var(--accent-border); cursor: pointer; }

    .tl-stamp-btns {
        display: flex; gap: 8px; margin-top: 10px;
    }
    .tl-stamp-btn {
        flex: 1; padding: 10px 12px; border-radius: var(--rsm);
        border: 2px solid; border-bottom: 4px solid;
        font-size: 13px; font-weight: 900; font-family: inherit;
        display: flex; align-items: center; justify-content: center; gap: 6px;
        transition: transform .1s, border-bottom-width .1s;
        -webkit-appearance: none;
    }
    .tl-stamp-btn:active { border-bottom-width: 2px; transform: translateY(2px); }
    .tl-stamp-btn.risk-btn  { background: rgba(255,75,75,.08); color: var(--punch-shadow); border-color: var(--punch-shadow); }
    .tl-stamp-btn.safe-btn  { background: rgba(88,204,2,.08);  color: var(--green-shadow); border-color: var(--green-shadow); }
    .tl-stamp-btn.chosen-correct   { background: var(--green)  !important; color: var(--white) !important; border-color: var(--green-shadow) !important; }
    .tl-stamp-btn.chosen-incorrect { background: var(--punch)  !important; color: var(--white) !important; border-color: var(--punch-shadow) !important; }
    .tl-stamp-btn.chosen-dim       { opacity: .3; }

    .tl-done-wrap {
        background: linear-gradient(135deg, #111827, #1a2744);
        border: 2px solid var(--yellow); border-bottom: 6px solid var(--yellow-shadow);
        border-radius: var(--rsm); padding: 18px; margin-top: 18px;
        text-align: center; display: none; animation: up .4s ease both;
    }
    .tl-done-wrap.show { display: block; }
    .tl-done-icon  { font-size: 48px; margin-bottom: 8px; }
    .tl-done-title { font-size: 20px; font-weight: 900; color: var(--white); margin-bottom: 4px; }
    .tl-done-sub   { font-size: 14px; font-weight: 700; color: rgba(255,255,255,.7); margin-bottom: 14px; }
    .tl-done-score { display: flex; gap: 10px; justify-content: center; margin-bottom: 14px; }
    .tl-done-chip  { padding: 6px 14px; border-radius: 99px; font-size: 13px; font-weight: 900; border: 2px solid; }
    .tl-done-chip.risk { background: rgba(255,75,75,.15); color: var(--punch-shadow); border-color: var(--punch-shadow); }
    .tl-done-chip.safe { background: rgba(88,204,2,.15);  color: var(--green-shadow);  border-color: var(--green-shadow); }
    .tl-done-btn {
        width: 100%; padding: 13px; background: var(--yellow); color: var(--ink-bold);
        border: 2px solid var(--yellow-shadow); border-bottom: 5px solid var(--yellow-shadow);
        border-radius: var(--rsm); font-size: 15px; font-weight: 900; font-family: inherit;
        transition: transform .1s, border-bottom-width .1s;
    }
    .tl-done-btn:active { border-bottom-width: 2px; transform: translateY(3px); }

    /* ══════════════════════════════════════════════
       RULES DOSSIER — tap-to-reveal interactive briefing
    ══════════════════════════════════════════════ */
    @keyframes revealRow { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes tickIn    { 0%{transform:scale(0) rotate(-20deg);opacity:0} 60%{transform:scale(1.2) rotate(4deg)} 100%{transform:scale(1) rotate(0);opacity:1} }
    @keyframes goAppear  { 0%{transform:scale(.85);opacity:0} 70%{transform:scale(1.04)} 100%{transform:scale(1);opacity:1} }

    .dos-hud { display:flex; align-items:center; gap:5px; background:var(--bg); border:2px solid var(--border-heavy); border-bottom:3px solid var(--border-heavy); border-radius:var(--rxs); padding:4px 10px; }
    .dos-hud-num { font-size:15px; font-weight:900; color:var(--accent-text); font-variant-numeric:tabular-nums; }
    .dos-hud-lbl { font-size:10px; font-weight:900; color:var(--ink-3); text-transform:uppercase; letter-spacing:.8px; }
    .dos-skip { font-size:12px; font-weight:900; color:var(--ink-3); background:var(--bg); border:2px solid var(--border); padding:5px 11px; border-radius:var(--rxs); cursor:pointer; transition:color .15s, border-color .15s; }
    .dos-skip:hover { color:var(--ink-bold); border-color:var(--border-heavy); }

    .dos-prog { height:5px; background:var(--border); border-radius:99px; overflow:hidden; margin:0 16px 14px; }
    .dos-prog-fill { height:100%; width:0%; background:var(--yellow-shadow); border-radius:99px; transition:width .45s cubic-bezier(.4,0,.2,1); }

    .dos-sec { display:flex; align-items:center; gap:9px; padding:2px 16px 6px; }
    .dos-sec-label { font-size:10px; font-weight:900; color:var(--ink-3); text-transform:uppercase; letter-spacing:1.8px; white-space:nowrap; }
    .dos-sec-line  { flex:1; height:2px; background:var(--border); border-radius:2px; }

    .dr { display:flex; align-items:center; gap:12px; padding:11px 16px; cursor:pointer;
          border-bottom:1px solid var(--border); position:relative; transition:background .15s;
          -webkit-tap-highlight-color:transparent; user-select:none; }
    .dr:last-of-type { border-bottom:none; }
    .dr:not(.open):hover  { background:rgba(255,200,0,.06); }
    .dr:not(.open):active { background:rgba(255,200,0,.14); }
    .dr.open { cursor:default; background:var(--bg); animation:revealRow .25s ease both; }
    .dr-icon { width:32px; height:32px; flex-shrink:0; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:15px; background:var(--bg); border:2px solid var(--border-heavy); border-bottom:3px solid var(--border-heavy); transition:all .25s; }
    .dr.open .dr-icon { background:var(--yellow); border-color:var(--yellow-shadow); animation:tickIn .35s cubic-bezier(.175,.885,.32,1.275) both; }
    .dr-body { flex:1; min-width:0; }
    .dr-lbl  { font-size:10px; font-weight:900; color:var(--ink-3); text-transform:uppercase; letter-spacing:1px; margin-bottom:2px; }
    .dr-val  { font-size:15px; font-weight:900; color:var(--ink-bold); line-height:1.25; transition:filter .3s; }
    .dr:not(.open) .dr-val { filter:blur(4.5px); color:var(--ink-3); }
    .dr.open  .dr-val { filter:none; }
    .dr-val.hot  { color:var(--punch-shadow); }
    .dr-val.warn { color:#8A6400; }
    .dr-val.cool { color:var(--green-shadow); }
    .dr-hint { font-size:11px; font-weight:900; color:var(--ink-3); animation:nudge 2.2s ease-in-out infinite; flex-shrink:0; }
    .dr.open .dr-hint { display:none; }
    .d-voc { color:var(--accent-text); font-weight:900; border-bottom:2px solid rgba(229,180,0,.5); cursor:pointer; }

    .dos-warn { background:rgba(255,200,0,.1); border:2px solid rgba(255,200,0,.4); border-left:5px solid var(--yellow-shadow); border-radius:0 var(--rsm) var(--rsm) 0; padding:12px 14px; margin:4px 16px 0; font-size:13px; font-weight:700; color:#7A5800; line-height:1.55; display:none; animation:up .3s ease both; }
    .dos-warn.show { display:block; }
    .dos-warn strong { font-weight:900; }

    .dos-go-wrap { padding:14px 16px 0; }
    .dos-go { display:none; width:100%; padding:16px; background:var(--yellow); color:var(--ink-bold); font-size:16px; font-weight:900; font-family:inherit; border:2px solid var(--yellow-shadow); border-bottom:5px solid var(--yellow-shadow); border-radius:var(--rsm); cursor:pointer; letter-spacing:-.2px; transition:transform .1s, border-bottom-width .1s; align-items:center; justify-content:center; gap:8px; }
    .dos-go.show { display:flex; animation:goAppear .5s cubic-bezier(.175,.885,.32,1.275) both; }
    .dos-go:active { border-bottom-width:2px; transform:translateY(3px); }

    /* ══════════════════════════════════════════════
       EXERCISE ELEMENTS
    ══════════════════════════════════════════════ */
    .q-box   { margin-bottom: 14px; }
    .q-text  { font-size: 15px; font-weight: 800; color: var(--ink-bold); margin-bottom: 10px; line-height: 1.45; }
    .opt-grp { display: flex; flex-direction: column; gap: 7px; }

    .opt-btn {
        display: block; width: 100%; text-align: left; padding: 13px 15px; min-height: 50px;
        background: var(--white);
        border: 2px solid var(--border-heavy); border-bottom: 5px solid var(--border-heavy);
        border-radius: var(--rsm); font-size: 14px; font-weight: 800; color: var(--ink);
        font-family: inherit; -webkit-appearance: none;
        transition: transform .1s, border-bottom-width .1s, border-color .15s;
        cursor: pointer; touch-action: manipulation;
    }
    .opt-btn:active    { border-bottom-width: 2px; transform: translateY(3px); }
    .opt-btn.selected  { border-color: var(--yellow-shadow); border-bottom-color: var(--yellow-shadow); color: var(--accent-text); background: var(--accent-light); }
    .opt-btn.correct   { background: var(--green)  !important; color: var(--white) !important; border-color: var(--green-shadow) !important; }
    .opt-btn.incorrect { background: var(--punch)  !important; color: var(--white) !important; border-color: var(--punch-shadow) !important; }

    /* word bank */

/* ══════════════════════════════════════════════════════

══════════════════════════════════════════════════════ */
const L = {
    title:      "The Nomad Trap",
    lessonId:   "nomadtrap",
    lessonLink: "/nomadtrap/",
    levelPage:  "/tax/",
    level:      "Tax English",
    badgeIcon:  "🌍",
    badgeName:  "Nomad Trap",

    vocabulary: [
        { word:"Tax Residency",         type:"noun",
          definition:"The legal status that determines which country has the right to tax your worldwide income — based on where you live, work, or have strong personal and economic ties." },
        { word:"183-Day Rule",          type:"noun phrase",
          definition:"A common threshold used in tax law — spending 183 or more days in a country within a tax year typically triggers tax residency there, though many countries have additional tests." },
        { word:"Domicile",              type:"noun",
          definition:"Your permanent legal home — the country you intend to return to and treat as your long-term base. Different from residence: you can be resident in one country but domiciled in another." },
        { word:"Tie-Breaker Test",      type:"noun",
          definition:"A sequence of criteria in a tax treaty used to resolve dual residency — where two countries both claim the same person as a tax resident. Applied in order until one country wins." },
        { word:"Habitual Abode",        type:"noun phrase",
          definition:"The country where a person normally and customarily lives — used in tie-breaker tests when neither the permanent home nor centre of vital interests test produces a clear result." },
        { word:"Centre of Vital Interests", type:"noun phrase",
          definition:"The country with which a person has the strongest personal and economic ties — covering family, work, business, social life, and assets. A key step in the OECD tie-breaker sequence." },
        { word:"Split Year",            type:"noun",
          definition:"A tax year divided into two parts — a resident period and a non-resident period — allowed under some countries' rules when a person arrives in or departs from a country mid-year." },
        { word:"Statutory Residence Test", type:"noun",
          definition:"A formal legal framework — like the UK's SRT — that uses a specific set of rules, day counts, and connection factors to determine whether an individual is tax resident in a country." },
        { word:"Treaty Relief",         type:"noun",
          definition:"A reduction or elimination of tax liability granted under a bilateral tax treaty — including tie-breaker provisions that prevent a person from being taxed as a resident in two countries at once." },
        { word:"Worldwide Income",      type:"noun phrase",
          definition:"All income earned anywhere in the world — tax residents of most countries are liable to pay tax on worldwide income, regardless of where it was earned or where the money is held." }
    ],

    /* TIMELINE — 5 events in one nomad's year. Judge each trigger point. */
    timeline: [
        {
            id:       'jan_uk',
            flag:     '🇬🇧',
            month:    'January – March',

function build() {
    const wrap = document.getElementById('sections');
    let html   = '';
    html += secCard(0, true,  'strip-gold',  buildTimeline());
    html += secCard(1, false, 'strip-blue',  buildBriefing());

    L.exercises.forEach((ex, i) => {
        const n    = i + 2;
        const body = buildExercise(ex, n);
        html += secCard(n, false, `strip-${ex.col}`,
            head(ex.icon, ex.title, ex.sub, n) +
            `<div class="sec-body">${body}</div>`);
    });

    wrap.innerHTML = html;
    updateNav(); updateProg();
    setTimeout(wireAll, 60);
}

function secCard(n, visible, strip, inner) {
    return `<div class="sec-card${visible?' visible':''} ${strip}" data-sec="${n}">${inner}</div>`;
}

function head(icon, title, sub, n, extra='') {
    return `<div class="sec-head">
        <div class="sec-head-left">
            <div class="sec-head-icon">${icon}</div>
            <div><div class="sec-head-title">${title}</div><div class="sec-head-sub">${sub}</div></div>
        </div>${extra}
    </div>`;
}

/* ── TIMELINE ─────────────────────────────────────── */
function buildTimeline() {
    const events  = L.timeline.map((ev, i) => {
        return `<div class="tl-event" id="tl-ev-${ev.id}" onclick="openTimelineEvent('${ev.id}')">

function openTimelineEvent(id) {
    const ev = L.timeline.find(x => x.id === id);
    if (!ev) return;
    const already = tlVoted[id];
    const sheetHTML = `
        <div class="rs-handle"></div>
        <div class="rs-head">
            <div style="display:flex;align-items:center">
                <span class="rs-flag">${ev.flag}</span>
                <div>
                    <div class="rs-name">${ev.month}</div>
                    <div class="rs-loc">📋 ${ev.title}</div>
                </div>
            </div>
            <button class="rs-close" onclick="closeReport()">×</button>
        </div>
        <div class="rs-body">
            <div class="field-report">
                <div class="fr-label">📄 Field Report</div>
                <div class="fr-text">${ev.report}</div>
            </div>
            <p class="rs-question">⚖️ ${ev.question}</p>
            <div class="stamp-btns">
                <button class="stamp-btn flag${already ? (tlVoted[id]==='risk'?(ev.isRisk?' chosen-correct':' chosen-incorrect'):' chosen-wrong-reveal') : ''}" onclick="castTLVote('${id}',true)" ${already?'disabled':''}>
                    <span class="stamp-btn-icon">🚨</span>
                    <span class="stamp-btn-label">${ev.stampRisk || 'Tax Risk'}</span>
                </button>
                <button class="stamp-btn safe${already ? (tlVoted[id]==='safe'?(!ev.isRisk?' chosen-correct':' chosen-incorrect'):' chosen-wrong-reveal') : ''}" onclick="castTLVote('${id}',false)" ${already?'disabled':''}>
                    <span class="stamp-btn-icon">✅</span>
                    <span class="stamp-btn-label">${ev.stampSafe || 'No Risk'}</span>
                </button>
            </div>
            <div class="rs-verdict${already?'':''}" id="rs-verd-${id}" ${already?'':'style="display:none"'}>
                ${already ? buildTLVerdictHTML(id, already === (ev.isRisk ? 'risk' : 'safe'), ev) : ''}
            </div>
        </div>`;
    document.getElementById('rs-content').innerHTML = sheetHTML;
    document.getElementById('report-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function buildTLVerdictHTML(id, correct, ev) {
    const bannerText = correct ? ev.verdict.correct : ev.verdict.wrong;
    const idx     = L.timeline.findIndex(x => x.id === id);
    const nextEv  = L.timeline[idx + 1];
    const nextBtn = nextEv
        ? `<button class="rs-next" onclick="closeReport();setTimeout(()=>openTimelineEvent('${nextEv.id}'),200)">Next: ${nextEv.flag} ${nextEv.month} →</button>`
        : `<button class="rs-next" onclick="closeReport();checkTimelineDone()">See The Full Picture 🌍</button>`;
    const bannerClass = correct ? 'correct' : 'incorrect';
    return `<div class="rs-verdict ${bannerClass}" style="display:block">
                <div class="rs-verd-banner">${bannerText}</div>
                <div class="rs-verd-explain">${ev.explain}${nextBtn}</div>
            </div>`;
}

function castTLVote(id, votedRisk) {
    const ev = L.timeline.find(x => x.id === id);
    if (!ev || tlVoted[id]) return;
    const correct  = votedRisk === ev.isRisk;
    tlVoted[id]    = votedRisk ? 'risk' : 'safe';
    const btns     = document.querySelectorAll('.stamp-btn');
    btns.forEach(b => { b.disabled = true; });
    const chosen   = votedRisk ? btns[0] : btns[1];
    const unchosen = votedRisk ? btns[1] : btns[0];
    chosen.classList.add(correct ? 'chosen-correct' : 'chosen-incorrect');
    unchosen.classList.add('chosen-wrong-reveal');
    const verd = document.getElementById(`rs-verd-${id}`);
    if (verd) { verd.innerHTML = buildTLVerdictHTML(id, correct, ev); verd.style.display = 'block'; }
    // Update timeline dot
    const dot = document.getElementById(`tl-dot-${id}`);
    const evEl = document.getElementById(`tl-ev-${id}`);
    if (dot) dot.textContent = ev.isRisk ? '🚨' : '✅';
    if (evEl) evEl.classList.add(ev.isRisk ? 'risk-yes' : 'risk-no');
    // Hide tap hint
    const hint = document.getElementById(`tl-hint-${id}`);
    if (hint) hint.classList.add('hidden');
}

function handleOverlayClick(e) {
    if (e.target === document.getElementById('report-overlay')) closeReport();
}
function closeReport() {
    document.getElementById('report-overlay').classList.remove('open');
    document.body.style.overflow = '';
}

function checkTimelineDone() {
    closeReport();
    doneSecs = Math.max(doneSecs, 1); updateProg(); burst(); showBadge(rndBadge());
    const risks = L.timeline.filter(ev => ev.isRisk).length;
    const safes = L.timeline.length - risks;
    const tldone = document.getElementById('tl-done');
    tldone.classList.add('show');
    tldone.innerHTML = `
        <div class="tl-done-icon">📅</div>
        <div class="tl-done-title">Year Complete — The Nomad Trap Revealed!</div>
        <div class="tl-done-sub">Alex triggered residency in more places than he expected. Now get the full legal framework.</div>
        <div class="tl-done-score">
            <div class="tl-done-chip risk">🚨 ${risks} residency triggers</div>
            <div class="tl-done-chip safe">✅ ${safes} safe periods</div>
        </div>
        <button class="tl-done-btn" onclick="goTo(1)">📋 Get The Legal Briefing →</button>`;
}

        ${dr('Split year','UK may allow a split year if you arrive or leave mid-year — two tax periods in one','cool')}
        ${sec('⚖️','OECD Tie-Breaker — When Two Countries Both Claim You')}
        ${dr('Step 1 — Permanent home','Which country has your permanent home? First test applied.','warn')}
        ${dr('Step 2 — Vital interests','Where are your strongest personal and economic ties? Centre of vital interests.','warn')}
        ${dr('Step 3 — Habitual abode','Where do you normally live? Applied when Steps 1 and 2 are inconclusive.','warn')}
        ${dr('Step 4 — Nationality','If still tied: your nationality decides.','warn')}
        ${dr('Step 5 — Mutual agreement','Last resort: the two governments negotiate directly.','hot')}
        ${sec('🌍','The Nomad Trap')}
        ${dr('The trap','Nomads often assume no fixed home means no residency. Wrong.','hot')}
        ${dr('Worldwide income','Tax residents must declare all worldwide income — not just local earnings','hot')}
        ${dr('Treaty relief','A tax treaty can prevent double taxation — but you must actively claim it','cool')}`;

    return head('📋', 'The Rules Dossier', 'Tap each row to unlock the rule — then tackle the exercises', 1, skipBtn) +
        `<div style="padding:0 16px 8px"><div class="dos-prog"><div class="dos-prog-fill" id="dos-bar"></div></div></div>
        <div id="dos-rows">${rows}</div>
        <div class="dos-warn" id="dos-warn">
            ⚠️ <strong>Remember:</strong> Spending 183+ days somewhere is not the only trigger. Family, home, and work connections can all establish <strong>tax residency</strong> — even if you are under the day threshold.
        </div>
        <div class="dos-go-wrap">
            <button class="dos-go" id="dos-go" onclick="completeSec(1)">Got It — Let's Practice! ⚡</button>
        </div>`;
}

function dosReveal(row) {
    if (row.classList.contains('open')) return;
    row.classList.add('open');
    const icon = row.querySelector('.dr-icon');
    if (icon) icon.textContent = '✅';
    dosOpen++;
    if (!DOS_TOTAL) DOS_TOTAL = document.querySelectorAll('.dr').length;
    const doneEl = document.getElementById('dos-done');
    if (doneEl) doneEl.textContent = dosOpen;
    const bar = document.getElementById('dos-bar');
    if (bar) bar.style.width = (dosOpen / DOS_TOTAL * 100) + '%';
    const rect = row.getBoundingClientRect();
    const el = document.createElement('div');
    el.className = 'xp-float';
    el.textContent = '+5 XP';
    el.style.left = (rect.right - 50) + 'px';
    el.style.top  = (rect.top + window.scrollY - 4) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 900);
    if (dosOpen === DOS_TOTAL) {
        setTimeout(() => { const w = document.getElementById('dos-warn'); if(w) w.classList.add('show'); }, 200);
        setTimeout(() => {
            const go = document.getElementById('dos-go');
            if (go) { go.classList.add('show'); burst(); setTimeout(() => go.scrollIntoView({ behavior:'smooth', block:'nearest' }), 300); }
        }, 500);
    }
}

function dosSkip() {
    if (!DOS_TOTAL) DOS_TOTAL = document.querySelectorAll('.dr').length;
    document.querySelectorAll('.dr:not(.open)').forEach(r => dosReveal(r));
}

/* ── EXERCISE DISPATCHER ─────────────────────────── */
function buildExercise(ex, n) {
    if (ex.type === 'trueFalse')      return buildTF(ex, n);
    if (ex.type === 'multipleChoice') return buildMC(ex, n);
    if (ex.type === 'gapFill')        return buildGF(ex, n);
    if (ex.type === 'wordForms')      return buildWF(ex, n);
    if (ex.type === 'grammar')        return buildGR(ex, n);
    return '';
}

function buildTF(ex, n) {
    const qs = ex.questions.map((q, qi) => `
        <div class="q-box">
            <p class="q-text">${qi+1}. ${q.q}</p>
            <div class="opt-grp">
                <button class="opt-btn" data-correct="${q.a===true}">👍 True</button>
                <button class="opt-btn" data-correct="${q.a===false}">👎 False</button>
            </div>
        </div>`).join('');
    return qs + btnRow(n, false);
}

function buildMC(ex, n) {
    const qs = ex.questions.map((q, qi) => {
        const opts = q.opts.map((o, oi) =>
            `<button class="opt-btn" data-correct="${oi===q.correct}">${o}</button>`).join('');
        return `<div class="q-box"><p class="q-text">${qi+1}. ${q.q}</p><div class="opt-grp">${opts}</div></div>`;
    }).join('');
    return qs + btnRow(n, false);
}

function buildGF(ex, n) {
    const bank  = ex.wordBank.map(w =>
        `<button class="wb-word" data-word="${w}">${w}</button>`).join('');
    const sents = ex.sentences.map((s, si) => {
        const pts = s.t.split('___');
        return `<p style="margin-bottom:.3em">${si+1}. ${pts[0]}<span class="gap" data-answer="${s.a}"></span>${pts[1]||''}</p>`;
    }).join('');
    return `<p style="font-size:13px;font-weight:800;color:var(--ink-3);margin-bottom:12px;">Select a word from the bank, then tap a blank</p>
        <div class="word-bank"><div class="wb-label">Word Bank</div><div class="wb-words">${bank}</div></div>
        <div class="gap-sents">${sents}</div>` + btnRow(n, false);
}

function buildWF(ex, n) {
    const items = ex.questions.map((q, qi) => {
        const hint = q.a[0] + '_'.repeat(Math.max(0, q.a.length - 1));
        return `<div class="wf-item">
            <p class="wf-prompt">${qi+1}. ${q.p}</p>
            <input type="text" class="wf-input" data-answer="${q.a}" placeholder="Type your answer…">
            <button class="hint-btn" onclick="toggleHint(this)">💡 Hint</button>
            <div class="hint-text">${hint} (${q.a.length} letters)</div>
        </div>`;
    }).join('');
    return items + btnRow(n, true);
}

function buildGR(ex, n) {
    const ex2  = ex.explanation;
    const egs  = (ex2.examples||[]).map(e =>
        `<div class="gram-ex"><strong>${e.label}</strong> ${e.text}</div>`).join('');
    const expl = `<div class="gram-expl"><h4>${ex2.heading}</h4><p>${ex2.text}</p>${egs}</div>`;
    const cards = ex.questions.map((q, qi) => {
        const opts = q.opts.map(o => `<option value="${o}">${o}</option>`).join('');
        return `<div class="gram-card">
            <div class="gc-body">
                <p class="gc-sent">${qi+1}. ${q.s}</p>
                <p class="gc-hint">💡 ${q.hint}</p>
            </div>
            <select class="gram-sel" data-answer="${q.a}"><option value="">Choose…</option>${opts}</select>
        </div>`;
    }).join('');
    return expl + cards + btnRow(n, false);
}

function btnRow(n, hasReveal) {
    return `<div class="btn-row">
        <button class="btn-check" onclick="checkSec(${n})">Check Answers</button>
        ${hasReveal ? `<button class="btn-reveal" onclick="revealWF(${n})">Reveal All</button>` : ''}
        <button class="btn-reset" onclick="resetSec(${n})">Reset</button>
    </div>
    <div id="res-${n}" class="result"></div>`;
}

/* ══════════════════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════════════════ */
function goTo(n) {
    curSec = n;
    const el = document.querySelector(`.sec-card[data-sec="${n}"]`);
    if (el) {
        el.classList.add('visible');
        requestAnimationFrame(() => {
            const top = el.getBoundingClientRect().top + window.scrollY - 8;
            window.scrollTo({top, behavior:'smooth'});
        });
    }
    updateNav();
}
function nextSec() { if (curSec < TOTAL-1) { curSec++; goTo(curSec); } else finishLesson(); }
function prevSec() { if (curSec > 0) { curSec--; goTo(curSec); } }

function completeSec(n) {
    doneSecs = Math.max(doneSecs, n);
    updateProg();
    if (n >= TOTAL-1) { finishLesson(); return; }
    const next = document.querySelector(`.sec-card[data-sec="${n+1}"]`);
    if (next) {
        next.classList.add('visible');
        requestAnimationFrame(() => {
            const top = next.getBoundingClientRect().top + window.scrollY - 8;
            window.scrollTo({top, behavior:'smooth'});
        });
    }
    if (Math.random() < .3) showBadge(rndBadge());
    curSec = n+1; updateNav();
}

function updateNav() {
    document.getElementById('bn-prev').disabled = curSec === 0;
    document.getElementById('bn-next').textContent = curSec >= TOTAL-1 ? '🏁 Finish' : 'Next →';
    document.getElementById('bn-ind').textContent  = `${curSec+1}/${TOTAL}`;
}
function updateProg() {
    const pct = Math.round((doneSecs/TOTAL)*100);
    document.getElementById('prog-fill').style.width  = pct + '%';
    document.getElementById('prog-label').textContent = `${doneSecs} / ${TOTAL} sections`;
    document.getElementById('prog-pct').textContent   = pct + '%';
}

/* ══════════════════════════════════════════════════════
   CHECKERS
══════════════════════════════════════════════════════ */
function checkSec(n) {
    const type = L.exercises[n-2]?.type;
    if (type === 'trueFalse' || type === 'multipleChoice') checkOpts(n);
    else if (type === 'gapFill')   checkGF(n);
    else if (type === 'wordForms') checkWF(n);
    else if (type === 'grammar')   checkGR(n);
}

function checkOpts(n) {
    const groups = secEl(n).querySelectorAll('.opt-grp');
    let ok = 0, blank = 0;
    groups.forEach(g => {
        const sel = g.querySelector('.opt-btn.selected');
        if (!sel) { blank++; return; }
        g.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('correct','incorrect'));
        sel.dataset.correct === 'true' ? (sel.classList.add('correct'), ok++) : sel.classList.add('incorrect');
    });
    if (blank) return showErr(n, 'Please answer all questions first!');
    showRes(n, ok, groups.length, '🎉 All correct!', 'wrong answers in red — try again!');
}

function checkGF(n) {
    const gaps = secEl(n).querySelectorAll('.gap'); let ok = 0;
    gaps.forEach(g => {
        g.classList.remove('correct','incorrect');
        const v = (g.textContent||'').trim().toLowerCase();
        if (v === g.dataset.answer.toLowerCase()) { g.classList.add('correct'); ok++; }
        else if (v) g.classList.add('incorrect');
    });
    showRes(n, ok, gaps.length, '✨ All gaps correct!', 'red gaps are wrong — click to clear and retry');
}

function checkWF(n) {
    const inputs = secEl(n).querySelectorAll('.wf-input'); let ok = 0;
    inputs.forEach(i => {
        i.classList.remove('ok','bad');
        if (!i.value.trim()) return;
        i.value.trim().toLowerCase() === i.dataset.answer.toLowerCase()
            ? (i.classList.add('ok'), ok++) : i.classList.add('bad');
    });
    showRes(n, ok, inputs.length, '🎯 Word Forms Champion!', 'red boxes are wrong — check spelling!');
}

function checkGR(n) {
    const sels = secEl(n).querySelectorAll('.gram-sel'); let ok = 0;
    sels.forEach(s => {
        s.classList.remove('correct','incorrect');
        if (!s.value) return;
        s.value === s.dataset.answer ? (s.classList.add('correct'), ok++) : s.classList.add('incorrect');
    });
    showRes(n, ok, sels.length, '⚖️ Modal Verb Master!', 'red dropdowns are wrong — try again!');
}

function revealWF(n) {
    secEl(n).querySelectorAll('.wf-input').forEach(i => {
        i.value = i.dataset.answer; i.classList.add('ok'); i.classList.remove('bad');
    });
    hideRes(n);
}

function resetSec(n) {
    const ex = L.exercises[n-2];
    if (!ex) return;
    if (ex.type === 'trueFalse' || ex.type === 'multipleChoice')
        secEl(n).querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected','correct','incorrect'));
    if (ex.type === 'gapFill') {
        secEl(n).querySelectorAll('.gap').forEach(g => { g.textContent=''; g.classList.remove('correct','incorrect'); });
        secEl(n).querySelectorAll('.wb-word').forEach(w => w.classList.remove('sel','used'));
        selWord = null;
    }
    if (ex.type === 'wordForms') secEl(n).querySelectorAll('.wf-input').forEach(i => { i.value=''; i.classList.remove('ok','bad'); });
    if (ex.type === 'grammar')   secEl(n).querySelectorAll('.gram-sel').forEach(s => { s.value=''; s.classList.remove('correct','incorrect'); });
    hideRes(n);
}

function showRes(n, ok, total, yep, nope) {
    const el = document.getElementById(`res-${n}`); if (!el) return;
    const perfect = ok === total;
    el.style.display = 'block';
    el.className     = `result ${perfect?'ok':'bad'}`;
    el.textContent   = perfect ? yep : `${ok}/${total} correct — ${nope}`;
    if (perfect) { burst(); if (Math.random() < .5) showBadge(rndBadge()); setTimeout(() => completeSec(n), 1400); }
}
function showErr(n, msg) { const e=document.getElementById(`res-${n}`); if(e){e.style.display='block';e.className='result bad';e.textContent=msg;} }
function hideRes(n)      { const e=document.getElementById(`res-${n}`); if(e){e.style.display='none';} }
function secEl(n)        { return document.querySelector(`.sec-card[data-sec="${n}"]`); }

/* ── GAP CLICK ── */
function gapClick(gap) {
    if (gap.classList.contains('correct')) return;
    if (gap.textContent.trim()) {
        const w = Array.from(gap.closest('.sec-card').querySelectorAll('.wb-word'))
            .find(b => b.dataset.word === gap.textContent.trim());
        if (w) w.classList.remove('used');
        gap.textContent = ''; gap.classList.remove('incorrect');
    } else if (selWord) {
        gap.textContent = selWord.dataset.word;
        selWord.classList.add('used'); selWord.classList.remove('sel');
        selWord = null;
    }
}

/* ══════════════════════════════════════════════════════
   WIRE ALL
══════════════════════════════════════════════════════ */
function wireAll() {
    document.querySelectorAll('.opt-grp').forEach(g => {
        g.addEventListener('click', e => {
            const btn = e.target.closest('.opt-btn');
            if (!btn || g.querySelector('.opt-btn.correct')) return;
            g.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected','incorrect'));
            btn.classList.add('selected');
        });
    });
    document.querySelectorAll('.wb-word').forEach(w => {
        w.addEventListener('click', () => {
            if (w.classList.contains('used')) return;
            if (w.classList.contains('sel')) { w.classList.remove('sel'); selWord = null; }
            else { document.querySelectorAll('.wb-word').forEach(b => b.classList.remove('sel')); w.classList.add('sel'); selWord = w; }
        });
    });
    document.querySelectorAll('.gap').forEach(g => g.addEventListener('click', () => gapClick(g)));
    document.addEventListener('click', e => {
        const voc = e.target.closest('[data-voc]');
        if (voc) { e.stopPropagation(); showVoc(voc.dataset.voc); return; }
        if (!e.target.closest('#voc-popup')) closeVoc();
    });
}

/* ══════════════════════════════════════════════════════
   VOCAB POPUP
══════════════════════════════════════════════════════ */
function showVoc(word) {
    const w = L.vocabulary.find(v => v.word.toLowerCase() === word.toLowerCase());
    if (!w) return;
    document.getElementById('vp-body').innerHTML = `
        <div class="voc-word">${w.word}</div>
        <div class="voc-type">${w.type}</div>
        <div class="voc-def">${w.definition}</div>
        <button class="voc-hear" onclick="speak('${w.word.replace(/'/g,"\\'")}')">🔊 Hear It (British English)</button>`;
    document.getElementById('voc-popup').style.display = 'block';
}
function closeVoc() { document.getElementById('voc-popup').style.display = 'none'; }
function speak(word) {
    const u = new SpeechSynthesisUtterance(word);
    u.lang = 'en-GB'; u.rate = .85;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
}

/* ══════════════════════════════════════════════════════
   CELEBRATIONS
══════════════════════════════════════════════════════ */
const COLOURS = ['#FFC800','#58CC02','#1CB0F6','#FF4B4B','#CE82FF','#2BDECC'];
function burst() {
    for (let i = 0; i < 18; i++) {
        const d = document.createElement('div');
        d.className = 'confetti-dot';
        d.style.cssText = `left:${25+Math.random()*50}vw;top:${15+Math.random()*35}vh;background:${COLOURS[Math.floor(Math.random()*COLOURS.length)]};animation-delay:${Math.random()*.35}s;animation-duration:${.65+Math.random()*.6}s;transform:rotate(${Math.random()*360}deg)`;
        document.body.appendChild(d);
        setTimeout(() => d.remove(), 1300);
    }
}
function showBadge(b) {
    const el = document.createElement('div');
    el.className = 'badge';
    el.innerHTML = `<span class="badge-icon">${b.icon}</span><span class="badge-text">${b.text}</span>`;
    document.getElementById('badge-wrap').appendChild(el);
    setTimeout(() => el.classList.add('show'), 80);
    setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 400); }, 2800);
}
function rndBadge() { return L.badges[Math.floor(Math.random()*L.badges.length)]; }

/* ══════════════════════════════════════════════════════
   FINISH LESSON
══════════════════════════════════════════════════════ */
async function finishLesson() {
    doneSecs = TOTAL; updateProg();
    if (!window.EFCD_Auth?.getCurrentUser()) {
        localStorage.setItem('efcd_last_lesson_done', 'true');
        if (confirm('🌍 Lesson complete!\n\nSign up free to save your XP, streaks and badges.\n\nOK = Sign up | Cancel = Keep browsing'))
            window.location.href = '/signup/';
        else if (typeof showWordMatchGame === 'function')
            showWordMatchGame(L.vocabulary, () => window.location.href = L.levelPage);
        else window.location.href = L.levelPage;
        return;
    }
    localStorage.setItem('efcd_last_lesson_done', 'true');
    const completionTime = Math.floor((Date.now() - performance.timing.navigationStart) / 1000);

    try {
        if (window.EFCD_Auth?.getCurrentUser()) {
            await window.EFCD_Auth.completeLesson({
                lessonId:       L.lessonId,
                lessonTitle:    L.title,
                lessonLevel:    L.level,
                lessonLink:     L.lessonLink,
                badgeIcon:      L.badgeIcon,
                badgeName:      L.badgeName,
                vocabulary:     L.vocabulary,
                grammar:        L.grammar,
                perfectScore:   true,
                completionTime: completionTime
            });
        }
    } catch(e) {}

    try {
        if (window.DailyChallenges) {
            const cr = await window.DailyChallenges.updateChallengeProgress({
                perfectScore:   true,
                vocabCount:     L.vocabulary.length,
                completionTime: completionTime,
                grammarPerfect: true
            });
            if (cr?.justCompleted) {
                setTimeout(() => window.DailyChallenges.showChallengeCompletionCelebration?.(cr.challenge), 900);
            }
            localStorage.setItem('dc_last_lesson_date', new Date().toDateString());
            localStorage.setItem('dc_last_lesson_section', 'tax');
        }
    } catch(e) {}

    if (typeof showWordMatchGame === 'function')
        showWordMatchGame(L.vocabulary, gr => showEndScreen(gr));
    else showEndScreen(null);
}

function showEndScreen(game) {
    const xp = game?.bonusXP || 0;
    const ov = document.createElement('div');
    ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;animation:up .3s ease both;';
    ov.innerHTML = `
        <div style="background:var(--white);border:2px solid var(--border-heavy);border-bottom:8px solid var(--border-heavy);border-radius:var(--r);max-width:420px;width:100%;overflow:hidden;animation:popin .4s cubic-bezier(.175,.885,.32,1.275) both;">
            <div style="background:linear-gradient(135deg,#111827 0%,#1a2744 100%);padding:28px 20px 24px;text-align:center;position:relative;">
                <button onclick="this.closest('div').parentElement.parentElement.remove()" style="position:absolute;top:10px;right:10px;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);border-radius:var(--rxs);color:rgba(255,255,255,.7);font-size:20px;font-weight:900;width:34px;height:34px;cursor:pointer;font-family:inherit;line-height:1;display:flex;align-items:center;justify-content:center;">×</button>
                <div style="font-size:68px;margin-bottom:8px;">🌍</div>
                <div style="font-size:13px;font-weight:900;color:var(--yellow);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px;">Trap Avoided</div>
                <div style="font-size:28px;font-weight:900;color:var(--white);letter-spacing:-1px;">Residency Expert!</div>
            </div>
            <div style="padding:20px;display:flex;flex-direction:column;gap:14px;">
                ${xp > 0 ? `<div style="background:var(--bg);border:2px solid var(--border-heavy);border-bottom:4px solid var(--border-heavy);border-radius:var(--rsm);padding:18px;text-align:center;">
                    <div style="font-size:48px;font-weight:900;color:var(--yellow-shadow);">+${xp} XP</div>
                </div>` : ''}
                <a href="${L.levelPage}" style="display:flex;align-items:center;justify-content:center;gap:8px;padding:15px;background:var(--yellow);color:var(--ink-bold);font-size:16px;font-weight:900;border-radius:var(--rsm);border:2px solid var(--yellow-shadow);border-bottom:5px solid var(--yellow-shadow);">More Tax Lessons →</a>
                <a href="/dashboard-gamified/" style="display:flex;align-items:center;justify-content:center;padding:13px;background:var(--bg);color:var(--ink-3);font-size:14px;font-weight:800;border-radius:var(--rsm);border:2px solid var(--border-heavy);border-bottom:3px solid var(--border-heavy);">View Dashboard</a>
            </div>
        </div>`;
    document.body.appendChild(ov);
    burst(); setTimeout(burst, 300);
}

/* ══════════════════════════════════════════════════════
   HINTS
══════════════════════════════════════════════════════ */
function toggleHint(btn) {
    const hint = btn.nextElementSibling;
    if (!hint) return;
    hint.classList.toggle('show');
    btn.textContent = hint.classList.contains('show') ? '🙈 Hide hint' : '💡 Hint';
}

/* ══════════════════════════════════════════════════════
   STATS — header XP/streak
══════════════════════════════════════════════════════ */
function initStats() {
    localStorage.setItem('efcd_last_lesson_url',  window.location.pathname);
    localStorage.setItem('efcd_last_lesson_name', 'The Nomad Trap');
    localStorage.setItem('efcd_last_lesson_done', 'false');

    function tryInit() {
        if (typeof window.efcdReady === 'undefined') { setTimeout(tryInit, 50); return; }
        window.efcdReady.then(async () => {
            if (!window.EFCD_Auth) return;
            await window.EFCD_Auth.initAuth();
            const user = window.EFCD_Auth.getCurrentUser();
            if (user) {
                const s = window.EFCD_Auth.getUserStats();
                document.getElementById('hdr-streak').textContent = s?.streak || 0;
                document.getElementById('hdr-xp').textContent     = (s?.xp || 0).toLocaleString();
                const soBtn = document.getElementById('hdr-signout');
                if (soBtn) soBtn.style.display = 'inline-flex';
            }
        }).catch(() => {});
    }
    tryInit();
}

build();
initStats();
if (window.DailyChallenges) {
    const w = document.getElementById('daily-challenge-widget');
    if (w) w.innerHTML = window.DailyChallenges.renderDailyChallengeWidget();
}
</script>
